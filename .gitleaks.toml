#
# gitleaks config. Extends the default rules; allowlists the repo's known
# non-secrets (the self-host dev defaults, build placeholders, and fixtures).
# CI scans only the PR/push diff, so historical findings don't block new PRs.

title = "Alethia gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Known non-secrets — dev defaults, placeholders, test fixtures."
regexTarget = "match"
regexes = [
  # docker-compose / .env.example self-host dev defaults (never used in prod).
  '''alethia-dev-secret''',
  '''alethia-app-dev-secret''',
  '''openfga-dev-secret''',
  '''-dev-secret''',
  '''-dev-password''',
  # ASM_SECRET_ID is the AWS Secrets Manager secret PATH (alethia/prod/env), not a
  # secret value — it's public config in the deploy/infra workflows. generic-api-key
  # flags the `ASM_SECRET_ID: alethia/prod/env` assignment; allowlist the marker.
  '''ASM_SECRET_ID''',
  # An OpenTofu variable reference (`var.<name>`) is a reference, never a literal
  # secret. generic-api-key flags idioms like `minio_password = var.hetzner_s3_secret_key`
  # in the templates; a `var.` value is safe by construction.
  '''var\.[A-Za-z0-9_]+''',
  # Azure BUILT-IN role definition IDs — public, well-known constants (not secrets). Used in the
  # connector's ABAC condition to scope roleAssignments/write to the templates' least-privilege roles.
  '''befefa01-2a29-4197-83a8-272ff33ce314''', # DNS Zone Contributor
  '''4633458b-17de-408a-b874-0445c86b69e6''', # Key Vault Secrets User
  '''b86a8fe4-44ce-4948-aee5-eccb2c155cd7''', # Key Vault Secrets Officer
  '''b1ff04bb-8a4e-4dc4-8eb5-8693973ce19b''', # AKS RBAC Cluster Admin
]
paths = [
  '''(^|/).*_test\.go$''',
  # TS/TSX unit tests hold synthetic fixtures (e.g. freshly-generated RSA keys assigned to
  # process.env in the OIDC issuer tests), which generic-api-key flags. Same policy as Go tests.
  '''(^|/).*\.test\.tsx?$''',
  '''(^|/)testdata/''',
  '''\.example$''',
  '''(^|/)\.env\.example$''',
]
