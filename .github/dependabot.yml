#
# Automated dependency updates — npm (pnpm workspace), Go modules, GitHub Actions,
# and the app Dockerfiles. Minor/patch grouped to keep PR noise down.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directories:
      - /apps/cli
      - /apps/runner
      - /packages/core
    schedule:
      interval: weekly
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directories:
      - /apps/console
      - /apps/docs
      - /apps/runner
    schedule:
      interval: weekly
