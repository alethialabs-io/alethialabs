#
# Static IaC checks for a single OpenTofu stack/template dir — fmt + lint + security.
# Credential-free by design, so it is safe on contributor PRs (the repo never puts cloud/state
# secrets on PR jobs). The caller must have already run setup-opentofu (so `tofu` is on PATH).

name: IaC checks
description: tofu fmt-check + tflint + Trivy config scan over a Terraform/OpenTofu directory.

inputs:
  working-directory:
    description: Directory to check (an OpenTofu stack or template root).
    required: true

runs:
  using: composite
  steps:
    - name: tofu fmt (check)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: tofu fmt -check -recursive

    # Install tflint DIRECTLY (pinned) instead of terraform-linters/setup-tflint@v4 — that action's
    # own default `path` input regressed ($HOME/~ not expanded), failing the job before tflint runs.
    # A direct download is immune to the action's input/tag regressions.
    - name: Setup tflint
      shell: bash
      env:
        TFLINT_VERSION: v0.54.0
      run: |
        curl -fsSL "https://github.com/terraform-linters/tflint/releases/download/${TFLINT_VERSION}/tflint_linux_amd64.zip" -o /tmp/tflint.zip
        sudo unzip -o /tmp/tflint.zip -d /usr/local/bin
        rm -f /tmp/tflint.zip
        tflint --version

    - name: tflint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TFLINT_CONFIG_FILE: ${{ github.workspace }}/infra/.tflint.hcl
      run: |
        tflint --init
        tflint --recursive --format compact

    # Install Trivy DIRECTLY (pinned) instead of aquasecurity/trivy-action / setup-trivy: those actions
    # keep deleting the sub-version tags their releases pin (setup-trivy@v0.2.1 → v0.3.1 → …), breaking
    # the job at action-RESOLUTION time before any step runs. A direct binary download never depends on
    # those tags — the definitive fix for the recurring Trivy CI breakage.
    - name: Setup Trivy
      shell: bash
      env:
        TRIVY_VERSION: v0.72.0
      run: |
        curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
        sudo tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
        rm -f /tmp/trivy.tgz
        trivy --version

    - name: Trivy config scan (Terraform misconfig)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TRIVY_CONFIG: ${{ github.workspace }}/infra/.trivy.yaml
        TRIVY_EXIT_CODE: "1"
        TRIVY_SEVERITY: HIGH,CRITICAL
        # tofu init pulls third-party modules (+ their bundled example manifests) into .terraform/ —
        # scan OUR templates only.
        TRIVY_SKIP_DIRS: "**/.terraform"
      run: trivy config .
