#
# Static IaC checks for a single OpenTofu stack/template dir — fmt + lint + security.
# Credential-free by design, so it is safe on contributor PRs (the repo never puts cloud/state
# secrets on PR jobs). The caller must have already run setup-opentofu (so `tofu` is on PATH).

name: IaC checks
description: tofu fmt-check + tflint + Trivy config scan over a Terraform/OpenTofu directory.

inputs:
  working-directory:
    description: Directory to check (an OpenTofu stack or template root).
    required: true

runs:
  using: composite
  steps:
    - name: tofu fmt (check)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: tofu fmt -check -recursive

    - name: Setup tflint
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: v0.54.0

    - name: tflint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TFLINT_CONFIG_FILE: ${{ github.workspace }}/infra/.tflint.hcl
      run: |
        tflint --init
        tflint --recursive --format compact

    # Install trivy explicitly + run it directly, instead of aquasecurity/trivy-action:
    # that action nests aquasecurity/setup-trivy@<sub-version>, and upstream deleted the
    # sub-versions its releases pin (v0.2.1/v0.2.2), so the whole job fails to RESOLVE
    # before any step runs. setup-trivy@v0.3.1 is a tag that still exists; trivy reads the
    # same params from TRIVY_* env vars (exactly what trivy-action set internally).
    - name: Setup Trivy
      uses: aquasecurity/setup-trivy@v0.3.1

    - name: Trivy config scan (Terraform misconfig)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TRIVY_CONFIG: ${{ github.workspace }}/infra/.trivy.yaml
        TRIVY_EXIT_CODE: "1"
        TRIVY_SEVERITY: HIGH,CRITICAL
      run: trivy config .
