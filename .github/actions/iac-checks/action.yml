#
# Static IaC checks for a single OpenTofu stack/template dir — fmt + lint + security.
# Credential-free by design, so it is safe on contributor PRs (the repo never puts cloud/state
# secrets on PR jobs). The caller must have already run setup-opentofu (so `tofu` is on PATH).

name: IaC checks
description: tofu fmt-check + tflint + Trivy config scan over a Terraform/OpenTofu directory.

inputs:
  working-directory:
    description: Directory to check (an OpenTofu stack or template root).
    required: true

runs:
  using: composite
  steps:
    - name: tofu fmt (check)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: tofu fmt -check -recursive

    # Install tflint LATEST via its official installer (not terraform-linters/setup-tflint@v4 — that
    # action's default `path` input regressed, $HOME/~ unexpanded, failing before tflint runs). We track
    # latest rather than pin: pinning only meant chasing version bumps, and we don't support legacy.
    - name: Setup tflint
      shell: bash
      run: |
        curl -fsSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        tflint --version

    - name: tflint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TFLINT_CONFIG_FILE: ${{ github.workspace }}/infra/.tflint.hcl
      # Gate on ERRORS only — the templates carry many style warnings (unused declarations, missing
      # version constraints); tflint exits 2 on ANY finding by default, so limit the non-zero exit to
      # real errors (matches the staging/main version; dev's copy was missing this).
      run: |
        tflint --init
        tflint --recursive --format compact --minimum-failure-severity=error

    # Install Trivy LATEST via its official installer — NOT aquasecurity/trivy-action / setup-trivy
    # (those actions keep deleting the sub-version tags their releases pin, breaking the job at
    # action-resolution time) and no longer a pinned binary either: version-pinning just meant chasing
    # bumps, and we don't support legacy. The installer fetches the current release straight to PATH.
    - name: Setup Trivy
      shell: bash
      run: |
        curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        trivy --version

    - name: Trivy config scan (Terraform misconfig)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TRIVY_CONFIG: ${{ github.workspace }}/infra/.trivy.yaml
        # Reviewed check-ID suppressions — the WORKING mechanism. The config-file
        # `misconfiguration.exclude` key is a silent no-op in current Trivy, so suppressions live in
        # a .trivyignore that Trivy actually honours. Absolute path (each stack runs from its own dir).
        TRIVY_IGNOREFILE: ${{ github.workspace }}/infra/.trivyignore
        TRIVY_EXIT_CODE: "1"
        TRIVY_SEVERITY: HIGH,CRITICAL
        # Scan OUR templates only, not third-party code: trivy v0.5x+ RESOLVES + downloads remote
        # modules (terraform-aws-modules/*) and scans them — misconfigs there aren't ours to fix and
        # broke the job. Exclude downloaded modules + skip any local .terraform. (trivy v0.28 via the
        # old action didn't resolve remote modules, so this restores that intent.)
        TRIVY_TF_EXCLUDE_DOWNLOADED_MODULES: "true"
        TRIVY_SKIP_DIRS: "**/.terraform"
      run: trivy config .
