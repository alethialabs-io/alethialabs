#
# CodeQL static analysis (SAST) for the TypeScript + Go code.

name: CodeQL

on:
  # CodeQL is NOT a required merge check — run it on pushes to main + weekly (+ manual), not on every
  # PR push, to cut per-PR Actions minutes. Security findings still gate main and get a weekly sweep.
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version: "1.25"
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
