name: Release Tendril

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: tendril-dev-tendril
  ECS_CLUSTER: tendril-dev-eu-west-1-cluster
  ECS_SERVICE: tendril-dev-eu-west-1-service
  GHCR_IMAGE: ghcr.io/bobikenobi12/tendril

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: meta
        run: echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Stage templates for Docker build
        run: |
          cp -r infra/templates/vine apps/tendril/vine-templates
          cp -r infra/templates/tendril apps/tendril/tendril-templates
          cp -r infra/templates/argocd apps/tendril/argocd-templates

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/tendril/Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.VERSION }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.VERSION }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish release metadata to Trellis
        env:
          TRELLIS_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          RELEASE_API_SECRET: ${{ secrets.RELEASE_API_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(gh release view "tendril-v${{ steps.meta.outputs.VERSION }}" --json body -q .body 2>/dev/null || echo "")
          curl -sf -X POST "${TRELLIS_URL}/api/releases/worker" \
            -H "Authorization: Bearer ${RELEASE_API_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg v "${{ steps.meta.outputs.VERSION }}" \
              --arg n "$NOTES" \
              --arg u "https://github.com/${{ github.repository }}/releases/tag/tendril-v${{ steps.meta.outputs.VERSION }}" \
              --arg s "${{ github.sha }}" \
              '{version: $v, release_notes: $n, github_release_url: $u, commit_sha: $s}')"

      - name: Force new Fargate deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "Deployment triggered for tendril v${{ steps.meta.outputs.VERSION }}"
