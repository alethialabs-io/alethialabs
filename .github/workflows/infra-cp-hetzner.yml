name: Infra - CP Hetzner

on:
  pull_request:
    paths:
      - 'infra/cp-hetzner/**'
  push:
    branches: [main]
    paths:
      - 'infra/cp-hetzner/**'

permissions:
  contents: read
  pull-requests: write

env:
  TF_DIR: infra/cp-hetzner
  TOFU_VERSION: "1.10.10"

  # S3-compatible state backend credentials (read by the s3 backend).
  # Dedicated TF_STATE_S3_* names — NOT the app's ALETHIA_STORAGE_* object store.
  AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_S3_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_S3_SECRET_ACCESS_KEY }}

  # OpenTofu variables.
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Validate (no backend, no secrets)
        working-directory: ${{ env.TF_DIR }}
        # PR plans are validate-only: no backend, no cloud/state secrets reach a
        # PR job (the repo is contributor-facing). Real plan+apply run on main.
        run: |
          tofu init -backend=false
          tofu validate

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          tofu init -upgrade \
            -backend-config="bucket=terraform-state" \
            -backend-config="key=hetzner/terraform.tfstate" \
            -backend-config="endpoint=${{ secrets.TF_STATE_S3_ENDPOINT }}" \
            -backend-config="region=${{ secrets.TF_STATE_S3_REGION }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"

      - name: OpenTofu Apply
        working-directory: ${{ env.TF_DIR }}
        run: tofu apply -auto-approve
