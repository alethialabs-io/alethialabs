#
# T2 — the real-infra nightly provisioning proof.
#
# Where T1 (ci.yml → provision-e2e) drives the real runner against a hermetic local
# `kind` cluster (no cloud, no cost, merge-queue-gated), T2 drives the SAME spine
# against a REAL cloud: a real runner binary claims a real DEPLOY job from a real
# Postgres-backed control plane and provisions a genuine ephemeral cluster from
# infra/templates/project/<provider>, then asserts the same RunDeployV2 outcomes
# (SUCCESS + cluster_ready + a signed ed25519 receipt + shipped logs + a Ready node),
# captures a committable proof, and GUARANTEES teardown.
#
# ─────────────────────────  Maintainer-gated (opt-in)  ─────────────────────────
# This provisions REAL, billable infrastructure, so it is OFF until a maintainer
# wires the cloud secret. When the required secret is absent the job SKIPS cleanly
# with a loud warning (never a false red); when the secret is present, any break is a
# HARD FAIL (never a false green). To enable Hetzner: add the repo secret
# `HCLOUD_TOKEN` (a scoped Hetzner Cloud API token). Cost per run is a single tiny
# Talos cluster (1 control plane + 1 worker, cheapest cax11 ARM) up for ~15–25 min,
# torn down at the end — on the order of a few euro-cents. See demos/proofs/README.md.
#
# SAFETY: the Hetzner account is shared with prod. Teardown is guaranteed and always
# label-scoped to THIS run's unique cluster — never an account-wide delete (see
# scripts/e2e/hcloud-cleanup.sh and the scope-destructive-cloud-ops memory).

name: E2E Nightly (T2 · real cloud)

on:
  schedule:
    # 03:17 UTC nightly (off the hour to avoid the cron stampede).
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "Cloud provider to prove (hetzner today; aws gated on vars.E2E_AWS_ROLE_ARN; azure later)."
        type: choice
        options:
          - hetzner
          - aws
        default: hetzner
      region:
        description: "Cloud region/location (hetzner: nbg1/fsn1/hel1)."
        type: string
        default: nbg1

permissions:
  contents: read

jobs:
  provision:
    name: Provision + verify + teardown (real cloud)
    runs-on: ubuntu-latest
    # `id-token: write` mints the GitHub OIDC token the AWS path exchanges for the
    # `alethia-e2e-nightly` role (aws-actions/configure-aws-credentials). This is SAFE: the
    # whole workflow triggers ONLY on `schedule` / `workflow_dispatch` — never `pull_request` /
    # `pull_request_target` — so no fork/PR can ever reach the token (program invariant 1,
    # enforced by scripts/check-workflow-oidc-isolation.mjs). `contents: read` stays the default.
    permissions:
      contents: read
      id-token: write
    # Hard cost cap: even if every finer timeout failed, the job cannot bill past this.
    # Raised 60→90 to fit the opt-in day-2 SOAK window (BYOC A0.3): the base
    # deploy→ArgoCD→teardown chain still finishes well inside the old bound (a tiny Talos
    # cluster provisions in ~10-15m), and the soak adds a bounded ~10-25m of day-2 loops on
    # that same cheap cluster (cents/hour). The finer step timeout below kills a hang first.
    timeout-minutes: 90
    # Serialize PER PROVIDER: never let two nightly runs provision into the SAME shared
    # cloud account at once — but let DIFFERENT providers run concurrently (they share no
    # account, and serializing them would stretch the nightly to the sum of every cloud).
    #
    # This MUST live on the job, not the workflow: `matrix.provider` does not exist at
    # workflow level. The old workflow-level group keyed off `github.event.inputs.provider`,
    # which is NULL on the `schedule` trigger — so on the nightly (the only run that
    # matters) every provider collapsed into the single literal fallback group, silently
    # serializing the whole matrix.
    #
    # cancel-in-progress:false so an in-flight run finishes (and tears down) before the next
    # starts — a cancelled mid-apply run would leak, and though the always() cleanup would
    # catch it, not racing is safer.
    concurrency:
      group: e2e-nightly-${{ matrix.provider }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        # On the nightly `schedule` run the full set; on a manual `workflow_dispatch` run ONLY
        # the chosen provider (so dispatching "aws" doesn't also spin up hetzner). Derived from
        # the input so the choice list is the single source of truth — when aws/azure are added,
        # extend BOTH the `options:` above and the schedule array below (and wire their secret
        # into the gate step's `case`). Removing the workflow-level concurrency block made
        # `inputs.provider` otherwise dead; this keeps it live and honest.
        provider: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.provider)) || fromJSON('["hetzner"]') }}
    services:
      # Mirrors ci.yml's integration/provision-e2e jobs: a throwaway Postgres that
      # db:migrate turns into the real control-plane schema + programmables
      # (claim_next_job / update_job_status / insert_job_log) the runner exercises.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: alethia
          POSTGRES_PASSWORD: alethia-dev-secret
          POSTGRES_DB: alethia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alethia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The gated cloud secret. Empty when a maintainer hasn't opted in → the gate
      # skips the real work. Also read directly by the T2 runner process (HCLOUD_TOKEN
      # is the env var the hcloud/imager/talos providers authenticate from).
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      # The AWS gate. A repo VARIABLE (not a secret — a role ARN is not sensitive), so it can
      # be read in a plain `if:`/`case`. Empty until a maintainer applies infra/aws-oidc and
      # sets it → the aws path green-skips (mirrors the HCLOUD_TOKEN gate). The role itself is
      # assumed via OIDC below; no long-lived AWS keys ever exist.
      E2E_AWS_ROLE_ARN: ${{ vars.E2E_AWS_ROLE_ARN }}
      ALETHIA_DATABASE_URL: postgres://alethia:alethia-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DATABASE_URL: postgres://alethia_app:alethia-app-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DB_PASSWORD: alethia-app-dev-secret
      # A missing prerequisite/token, once we've decided to run, is a HARD FAIL — never
      # a green skip. (The gate below decides WHETHER to run; this makes the run honest.)
      ALETHIA_E2E_T2_REQUIRE: "1"
    steps:
      - uses: actions/checkout@v4

      # ── Proof-scrub self-test (BYOC A0.4). Runs UNCONDITIONALLY (no cloud, no secret) so
      #    the proof-bundle secret scrub is exercised on every nightly/dispatch: it seeds a
      #    fake secret of every shape, scrubs it, and asserts the tripwire is non-vacuous.
      #    A regression in the denylist reds the workflow here, before any capture runs. ──
      - name: Proof-scrub self-test (denylist non-vacuity)
        run: bash demos/proofs/scrub.sh --self-test

      # ── Secret gate: decide whether the real proof runs. Absent secret ⇒ skip
      #    cleanly with a LOUD warning (never red). Present ⇒ run for real. Secrets
      #    can't be used in a job-level `if:`, so we gate every heavy step on this
      #    step's output instead. ──
      - name: Gate on the provider secret
        id: gate
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          case "$PROVIDER" in
            hetzner) TOKEN="$HCLOUD_TOKEN";    SECRET_NAME="HCLOUD_TOKEN" ;;
            aws)     TOKEN="$E2E_AWS_ROLE_ARN"; SECRET_NAME="E2E_AWS_ROLE_ARN (repo variable)" ;;
            # azure) TOKEN="$AZURE_CREDS";   SECRET_NAME="AZURE_CREDS"   ;;
            *) echo "::error::unknown provider '$PROVIDER'"; exit 1 ;;
          esac
          if [ -n "$TOKEN" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::T2 real-cloud proof ENABLED for $PROVIDER ($SECRET_NAME present) — provisioning a real ephemeral cluster."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::T2 real-cloud proof SKIPPED for $PROVIDER — repo secret $SECRET_NAME is not set. This nightly is a no-op (green) until a maintainer opts in. See demos/proofs/README.md."
          fi

      # ── Deterministic, unique-per-run cluster identity. `<project>-<env>` is exactly
      #    the `cluster` label the template stamps on every resource, and exactly what
      #    the teardown filters on — so the belt-and-suspenders cleanup can only ever
      #    match THIS run. ──
      - name: Compute unique cluster name
        if: steps.gate.outputs.run == 'true'
        env:
          REGION_INPUT: ${{ github.event.inputs.region }}
        run: |
          PROJECT="alethia-nl"
          ENVNAME="${{ github.run_id }}-${{ github.run_attempt }}"
          {
            echo "E2E_PROJECT=$PROJECT"
            echo "E2E_ENV=$ENVNAME"
            echo "E2E_CLUSTER=$PROJECT-$ENVNAME"
            echo "E2E_REGION=${REGION_INPUT:-nbg1}"
            # Wall-clock anchor for the proof bundle's duration_seconds (BYOC A0.4).
            echo "ALETHIA_E2E_PROOF_START_EPOCH=$(date -u +%s)"
          } >> "$GITHUB_ENV"
          echo "::notice::T2 cluster for this run: $PROJECT-$ENVNAME (region ${REGION_INPUT:-nbg1})"

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.run == 'true'
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        if: steps.gate.outputs.run == 'true'
        with:
          go-version: "1.25"
      - uses: opentofu/setup-opentofu@v1
        if: steps.gate.outputs.run == 'true'
        with:
          tofu_version: "1.9.0"
      - uses: azure/setup-helm@v4
        if: steps.gate.outputs.run == 'true'
        with:
          version: v3.16.4
      - uses: azure/setup-kubectl@v4
        if: steps.gate.outputs.run == 'true'

      - name: Install hcloud CLI (belt-and-suspenders teardown)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'hetzner'
        env:
          HCLOUD_CLI_VERSION: v1.49.1
        run: |
          curl -fsSL "https://github.com/hetznercloud/cli/releases/download/${HCLOUD_CLI_VERSION}/hcloud-linux-amd64.tar.gz" \
            | tar -xz hcloud
          sudo mv hcloud /usr/local/bin/hcloud
          hcloud version

      - name: Install workspace deps
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Migrate the control-plane database (schema + programmables/RLS + app role)
        if: steps.gate.outputs.run == 'true'
        run: pnpm -F console db:migrate

      # ── AWS: exchange the GitHub OIDC token for the ref-bound `alethia-e2e-nightly` role
      #    (no long-lived keys). Only runs for the aws provider once a maintainer has applied
      #    infra/aws-oidc and set vars.E2E_AWS_ROLE_ARN; otherwise the gate above already
      #    green-skipped the whole run. The role is region-locked + boundary-capped + budgeted
      #    (see infra/aws-oidc/e2e-nightly.tf). aws-region matches the role's locked region. ──
      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.E2E_AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 7200

      # ── The real proof. A finer step-level timeout than the job cap so a hung apply
      #    is KILLED here (the step fails) and the always() teardown below still runs
      #    normally — rather than the whole job hitting its cap. ──
      # 75m step / 80m go-timeout: the test's own ctx is 40m base (deploy wait 25m + the
      # ArgoCD Healthy+Synced convergence assertion 8m + build headroom) PLUS the opt-in soak
      # budget (window + drift/PVC bounds, BYOC A0.3), so a soak run has headroom; a non-soak
      # run still finishes far inside this. All three exceed the ctx so the ctx cancels first.
      - name: T2 — real runner provisions a real cloud cluster
        id: t2
        if: steps.gate.outputs.run == 'true'
        timeout-minutes: 75
        working-directory: test/e2e
        env:
          ALETHIA_E2E_PROVIDER: ${{ matrix.provider }}
          ALETHIA_E2E_PROJECT: ${{ env.E2E_PROJECT }}
          ALETHIA_E2E_ENV: ${{ env.E2E_ENV }}
          ALETHIA_E2E_HCLOUD_REGION: ${{ env.E2E_REGION }}
          ALETHIA_E2E_T2_RUNNER_LOG: ${{ runner.temp }}/t2-runner.log
          # ── Day-2 SOAK window (BYOC A0.3). Opt-in: default 10m on the real-apply runs,
          #    overridable via vars.E2E_SOAK (e.g. a longer window, or a short one to trim
          #    cost). Unset var ⇒ 10m. Runs AFTER the readiness+ArgoCD asserts and BEFORE the
          #    guaranteed teardown: a liveness loop, a real DETECT_DRIFT → honest posture, a
          #    1Gi PVC → Bound → cloud-side sweep-tag hard-fail, and an add-on health re-read.
          #    Its machine-readable summary is written for the A0.4 proof/verdict capture. ──
          ALETHIA_E2E_SOAK: ${{ vars.E2E_SOAK || '10m' }}
          ALETHIA_E2E_SOAK_SUMMARY: ${{ runner.temp }}/soak-summary.json
          # ── ArgoCD-WITH-REPOS + BYO Helm proof (BYOC A0.6). Opt-in, ON TOP of the base T2
          #    proof: only activates when a maintainer sets the repo VARS + the git-token SECRET.
          #    The repo URLs are non-secret vars; the git token is a SECRET consumed only via the
          #    control plane's git-token handler (never written into the persisted config_snapshot).
          #    REQUIRE is derived from the apps-repo var, so once the maintainer opts in, a
          #    half-wired config HARD-FAILS instead of silently disabling the assertion. Absent ⇒
          #    a clean skip of the repos half (base A0.1–A0.5 still proves). This whole step (and
          #    thus the secret) is schedule/dispatch-only — never reachable from pull_request
          #    (program invariant 1). ──
          ALETHIA_E2E_ARGO_APPS_REPO: ${{ vars.E2E_ARGO_APPS_REPO }}
          ALETHIA_E2E_ARGO_BYO_CHART_REPO: ${{ vars.E2E_ARGO_BYO_CHART_REPO }}
          ALETHIA_E2E_ARGO_BYO_CHART_PATH: ${{ vars.E2E_ARGO_BYO_CHART_PATH }}
          ALETHIA_E2E_ARGO_BYO_CHART_REVISION: ${{ vars.E2E_ARGO_BYO_CHART_REVISION }}
          ALETHIA_E2E_ARGO_BYO_CHART_NAMESPACE: ${{ vars.E2E_ARGO_BYO_CHART_NAMESPACE }}
          ALETHIA_E2E_GIT_TOKEN: ${{ secrets.E2E_GIT_TOKEN }}
          ALETHIA_E2E_ARGO_REPOS_REQUIRE: ${{ vars.E2E_ARGO_APPS_REPO != '' && '1' || '' }}
        run: |
          GOWORK=off go test -tags=e2e_t2 ./... \
            -run TestT2RealCloudProvisioning -count=1 -timeout 80m -v

      # ── Proof capture v2 (BYOC A0.4). Runs on ANY t2 outcome (always()) so a RED night is
      #    debuggable, not just a green one: it builds a structured, SCRUBBED proof bundle
      #    (verify receipt + provision summary + ArgoCD verdict + timings + destroy
      #    confirmation on success; the failure stage on a fail), routes everything through the
      #    A0.0 secret scrub, and FAILS this step if the finished bundle isn't grep-clean (so a
      #    leak reds the run instead of being uploaded — program invariant 2). It also writes
      #    the per-provider PASS/FAIL verdict to the job step summary. The runner wrote a
      #    host-usable kubeconfig to $HOME/.alethia/kubeconfig (read only on the success path). ──
      - name: Capture proof (scrubbed bundle + step-summary verdict)
        if: steps.gate.outputs.run == 'true' && always()
        env:
          PROVIDER: ${{ matrix.provider }}
          ALETHIA_E2E_PROOF_OUTCOME: ${{ steps.t2.outcome }}
          ALETHIA_E2E_PROOF_RUN_TAG: nightly-${{ github.run_id }}-${{ github.run_attempt }}
          ALETHIA_E2E_T2_RUNNER_LOG: ${{ runner.temp }}/t2-runner.log
          # Day-2 soak summary (BYOC A0.3), written by the T2 test; folded into the bundle +
          # step-summary verdict when present (absent ⇒ the capture is unchanged).
          ALETHIA_E2E_SOAK_SUMMARY: ${{ runner.temp }}/soak-summary.json
          # Map the GITHUB_ENV names the compute-cluster step wrote into the ALETHIA_* names
          # the capture script reads (region + the unique cluster name for the summary).
          ALETHIA_E2E_REGION: ${{ env.E2E_REGION }}
          ALETHIA_E2E_CLUSTER: ${{ env.E2E_CLUSTER }}
        run: |
          # The runner's kubeconfig only exists on the success path. Point KUBECONFIG at it
          # when present so the capture reads real cluster state; otherwise leave it unset and
          # the capture cleanly skips cluster-state and records the failure stage instead.
          if [ -f "$HOME/.alethia/kubeconfig" ]; then
            export KUBECONFIG="$HOME/.alethia/kubeconfig"
          fi
          ./demos/proofs/capture-proof.sh "${{ matrix.provider }}"

      - name: Upload proof artifact
        if: steps.gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-proof-${{ matrix.provider }}-${{ github.run_id }}
          path: demos/proofs/${{ matrix.provider }}/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload runner log
        if: steps.gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: t2-runner-log-${{ matrix.provider }}-${{ github.run_id }}
          path: ${{ runner.temp }}/t2-runner.log
          if-no-files-found: ignore
          retention-days: 14

      # ── GUARANTEED teardown. Runs on ANY outcome of the proof (pass/fail/timeout/
      #    cancel) as long as we actually started provisioning. The graceful
      #    `tofu destroy` already ran in-process on the normal path; this label-scoped
      #    hcloud sweep is the guarantee for a hard-killed test process. It only ever
      #    deletes resources labelled `cluster=$E2E_CLUSTER` — never account-wide. ──
      # Hetzner teardown guarantee. The graceful in-process `tofu destroy` already ran on the
      # normal path; this label-scoped hcloud sweep is the belt-and-suspenders for a hard-killed
      # test. Scoped to `cluster=$E2E_CLUSTER` — never account-wide. AWS gets its own always()
      # sweeper (scripts/e2e/aws-cleanup.sh) in BYOC A1.3/A1.4; until then the aws path doesn't
      # provision (harness/template wiring lands in A1.2+), so there is nothing to sweep here.
      - name: Guaranteed teardown (label-scoped hcloud cleanup)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'hetzner' && always()
        run: |
          if [ -z "${E2E_CLUSTER:-}" ]; then
            echo "::error::E2E_CLUSTER is unset — refusing to run an unscoped cleanup."
            exit 1
          fi
          ./scripts/e2e/hcloud-cleanup.sh "$E2E_CLUSTER"
