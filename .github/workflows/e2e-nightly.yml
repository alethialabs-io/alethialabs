#
# T2 — the real-infra nightly provisioning proof.
#
# Where T1 (ci.yml → provision-e2e) drives the real runner against a hermetic local
# `kind` cluster (no cloud, no cost, merge-queue-gated), T2 drives the SAME spine
# against a REAL cloud: a real runner binary claims a real DEPLOY job from a real
# Postgres-backed control plane and provisions a genuine ephemeral cluster from
# infra/templates/project/<provider>, then asserts the same RunDeployV2 outcomes
# (SUCCESS + cluster_ready + a signed ed25519 receipt + shipped logs + a Ready node),
# captures a committable proof, and GUARANTEES teardown.
#
# ─────────────────────────  Maintainer-gated (opt-in)  ─────────────────────────
# This provisions REAL, billable infrastructure, so it is OFF until a maintainer
# wires the cloud secret. When the required secret is absent the job SKIPS cleanly
# with a loud warning (never a false red); when the secret is present, any break is a
# HARD FAIL (never a false green). To enable Hetzner: add the repo secret
# `HCLOUD_TOKEN` (a scoped Hetzner Cloud API token). Cost per run is a single tiny
# Talos cluster (1 control plane + 1 worker, cheapest cax11 ARM) up for ~15–25 min,
# torn down at the end — on the order of a few euro-cents. See demos/proofs/README.md.
#
# SAFETY: the Hetzner account is shared with prod. Teardown is guaranteed and always
# label-scoped to THIS run's unique cluster — never an account-wide delete (see
# scripts/e2e/hcloud-cleanup.sh and the scope-destructive-cloud-ops memory).

name: E2E Nightly (T2 · real cloud)

on:
  schedule:
    # 03:17 UTC nightly (off the hour to avoid the cron stampede) — the cheap GREEN-FLOOR smoke
    # (base provision + cluster_ready + ArgoCD Healthy, + A0.6 repos when wired).
    - cron: "17 3 * * *"
    # 05:17 UTC Sunday — the OPT-IN FULL-BAR run (P2-F, #1068): the same matrix but with
    # ALETHIA_E2E_MAX_CONFIG=1 + ALETHIA_E2E_ALL_ADDONS=1 (11 kinds + 19 add-ons — heavy/costly,
    # so weekly not nightly). Resolved from this exact cron string in "Resolve full-bar dimension".
    - cron: "17 5 * * 0"
  workflow_dispatch:
    inputs:
      provider:
        description: "Cloud to prove. Each green-skips until a maintainer wires its gate secret/var (hetzner: HCLOUD_TOKEN; aws: vars.E2E_AWS_ROLE_ARN; gcp: vars.E2E_GCP_WIF_PROVIDER; azure: vars.E2E_AZURE_CLIENT_ID; alibaba: vars.E2E_ALIBABA_ROLE_ARN) + applies its OIDC/WIF/RAM stack."
        type: choice
        options:
          - hetzner
          - aws
          - gcp
          - azure
          - alibaba
        default: hetzner
      region:
        description: "Cloud region/location override (blank ⇒ the per-provider cheap default: hetzner nbg1, aws us-east-1, gcp europe-west3, azure germanywestcentral, alibaba eu-central-1). hetzner: nbg1/fsn1/hel1."
        type: string
        default: ""
      full_bar:
        description: "Run the FULL-BAR dimension (max-config: 11 kinds + all 19 add-ons) instead of the cheap green-floor smoke. Heavy + costly — uses the raised cost ceiling. Also auto-on for the weekly Sunday cron."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  provision:
    name: Provision + verify + teardown (real cloud)
    runs-on: ubuntu-latest
    # `id-token: write` mints the GitHub OIDC token the AWS path exchanges for the
    # `alethia-e2e-nightly` role (aws-actions/configure-aws-credentials). This is SAFE: the
    # whole workflow triggers ONLY on `schedule` / `workflow_dispatch` — never `pull_request` /
    # `pull_request_target` — so no fork/PR can ever reach the token (program invariant 1,
    # enforced by scripts/check-workflow-oidc-isolation.mjs). `contents: read` stays the default.
    permissions:
      contents: read
      id-token: write
    # Hard cost cap: even if every finer timeout failed, the job cannot bill past this.
    # Raised 60→90 to fit the opt-in day-2 SOAK window (BYOC A0.3): the base
    # deploy→ArgoCD→teardown chain still finishes well inside the old bound (a tiny Talos
    # cluster provisions in ~10-15m), and the soak adds a bounded ~10-25m of day-2 loops on
    # that same cheap cluster (cents/hour). The finer step timeout below kills a hang first.
    timeout-minutes: 90
    # Serialize PER PROVIDER: never let two nightly runs provision into the SAME shared
    # cloud account at once — but let DIFFERENT providers run concurrently (they share no
    # account, and serializing them would stretch the nightly to the sum of every cloud).
    #
    # This MUST live on the job, not the workflow: `matrix.provider` does not exist at
    # workflow level. The old workflow-level group keyed off `github.event.inputs.provider`,
    # which is NULL on the `schedule` trigger — so on the nightly (the only run that
    # matters) every provider collapsed into the single literal fallback group, silently
    # serializing the whole matrix.
    #
    # cancel-in-progress:false so an in-flight run finishes (and tears down) before the next
    # starts — a cancelled mid-apply run would leak, and though the always() cleanup would
    # catch it, not racing is safer.
    concurrency:
      group: e2e-nightly-${{ matrix.provider }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      # Never run more than 3 real provisions at once (cost + shared-account API pressure);
      # the per-provider concurrency group already serializes same-cloud runs (BYOC A3.2).
      max-parallel: 3
      matrix:
        # On the nightly `schedule` run the full set; on a manual `workflow_dispatch` run ONLY
        # the chosen provider (so dispatching "aws" doesn't also spin up hetzner). Derived from
        # the input so the choice list is the single source of truth. Every provider is in the
        # schedule set but each GREEN-SKIPS until a maintainer sets its gate secret/var (the
        # established inert pattern) — so setting the gate IS the "enable on cron" action, by
        # design, and only happens AFTER that cloud's manual dispatch + kill-drill. To add a
        # cloud: extend the `options:` above, this array, the gate `case`, the credential step,
        # and the sweeper `case` in teardown.
        provider: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.provider)) || fromJSON('["hetzner","aws","gcp","azure","alibaba"]') }}
    services:
      # Mirrors ci.yml's integration/provision-e2e jobs: a throwaway Postgres that
      # db:migrate turns into the real control-plane schema + programmables
      # (claim_next_job / update_job_status / insert_job_log) the runner exercises.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: alethia
          POSTGRES_PASSWORD: alethia-dev-secret
          POSTGRES_DB: alethia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alethia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The gated cloud secret. Empty when a maintainer hasn't opted in → the gate
      # skips the real work. Also read directly by the T2 runner process (HCLOUD_TOKEN
      # is the env var the hcloud/imager/talos providers authenticate from).
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      # The AWS gate. A repo VARIABLE (not a secret — a role ARN is not sensitive), so it can
      # be read in a plain `if:`/`case`. Empty until a maintainer applies infra/aws-oidc and
      # sets it → the aws path green-skips (mirrors the HCLOUD_TOKEN gate). The role itself is
      # assumed via OIDC below; no long-lived AWS keys ever exist.
      E2E_AWS_ROLE_ARN: ${{ vars.E2E_AWS_ROLE_ARN }}
      # The GCP/Azure/Alibaba gates — all keyless, all repo VARIABLES (an OIDC/WIF handle is not
      # sensitive). Empty until a maintainer applies that cloud's e2e stack (infra/gcp-e2e /
      # infra/azure-e2e / infra/alibaba-e2e) and sets the var → that path green-skips. GCP uses
      # Workload Identity Federation (no key file); Azure a federated Entra app; Alibaba a RAM
      # OIDC role. The gate var is the WIF provider / client id / role ARN respectively.
      E2E_GCP_WIF_PROVIDER: ${{ vars.E2E_GCP_WIF_PROVIDER }}
      E2E_GCP_SA_EMAIL: ${{ vars.E2E_GCP_SA_EMAIL }}
      E2E_AZURE_CLIENT_ID: ${{ vars.E2E_AZURE_CLIENT_ID }}
      E2E_AZURE_TENANT_ID: ${{ vars.E2E_AZURE_TENANT_ID }}
      E2E_AZURE_SUBSCRIPTION_ID: ${{ vars.E2E_AZURE_SUBSCRIPTION_ID }}
      E2E_ALIBABA_ROLE_ARN: ${{ vars.E2E_ALIBABA_ROLE_ARN }}
      E2E_ALIBABA_OIDC_PROVIDER_ARN: ${{ vars.E2E_ALIBABA_OIDC_PROVIDER_ARN }}
      ALETHIA_DATABASE_URL: postgres://alethia:alethia-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DATABASE_URL: postgres://alethia_app:alethia-app-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DB_PASSWORD: alethia-app-dev-secret
      # A missing prerequisite/token, once we've decided to run, is a HARD FAIL — never
      # a green skip. (The gate below decides WHETHER to run; this makes the run honest.)
      ALETHIA_E2E_T2_REQUIRE: "1"
    steps:
      - uses: actions/checkout@v4

      # ── Proof-scrub self-test (BYOC A0.4). Runs UNCONDITIONALLY (no cloud, no secret) so
      #    the proof-bundle secret scrub is exercised on every nightly/dispatch: it seeds a
      #    fake secret of every shape, scrubs it, and asserts the tripwire is non-vacuous.
      #    A regression in the denylist reds the workflow here, before any capture runs. ──
      - name: Proof-scrub self-test (denylist non-vacuity)
        run: bash demos/proofs/scrub.sh --self-test

      # ── Secret gate: decide whether the real proof runs. Absent secret ⇒ skip
      #    cleanly with a LOUD warning (never red). Present ⇒ run for real. Secrets
      #    can't be used in a job-level `if:`, so we gate every heavy step on this
      #    step's output instead. ──
      - name: Gate on the provider secret
        id: gate
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          case "$PROVIDER" in
            hetzner) TOKEN="$HCLOUD_TOKEN";              SECRET_NAME="HCLOUD_TOKEN (repo secret)" ;;
            aws)     TOKEN="$E2E_AWS_ROLE_ARN";          SECRET_NAME="E2E_AWS_ROLE_ARN (repo variable)" ;;
            gcp)     TOKEN="$E2E_GCP_WIF_PROVIDER";      SECRET_NAME="E2E_GCP_WIF_PROVIDER (repo variable)" ;;
            azure)   TOKEN="$E2E_AZURE_CLIENT_ID";       SECRET_NAME="E2E_AZURE_CLIENT_ID (repo variable)" ;;
            alibaba) TOKEN="$E2E_ALIBABA_ROLE_ARN";      SECRET_NAME="E2E_ALIBABA_ROLE_ARN (repo variable)" ;;
            *) echo "::error::unknown provider '$PROVIDER'"; exit 1 ;;
          esac
          if [ -n "$TOKEN" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::T2 real-cloud proof ENABLED for $PROVIDER ($SECRET_NAME present) — provisioning a real ephemeral cluster."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::T2 real-cloud proof SKIPPED for $PROVIDER — repo secret $SECRET_NAME is not set. This nightly is a no-op (green) until a maintainer opts in. See demos/proofs/README.md."
          fi

      # ── Deterministic, unique-per-run cluster identity + region. `<project>-<env>` is the
      #    logical run identity: for hetzner it IS the `cluster` label every resource carries;
      #    for the managed clouds the unique handle is the `alethia:environment-id=<env>` tag
      #    (env = run_id-attempt) that label-at-source stamps and every sweeper filters on — so
      #    the belt-and-suspenders cleanup can only ever match THIS run either way. Region:
      #    the dispatch input wins; otherwise the per-provider cheap default. AWS MUST be
      #    us-east-1 — the alethia-e2e-nightly role is region-locked there (infra/aws-oidc),
      #    and eu-central-1 is a prod region the role forbids. Exported as the generalized
      #    ALETHIA_E2E_REGION (the T2 harness reads this for every provider). ──
      - name: Compute unique cluster name + region
        if: steps.gate.outputs.run == 'true'
        env:
          REGION_INPUT: ${{ github.event.inputs.region }}
          PROVIDER: ${{ matrix.provider }}
        run: |
          PROJECT="alethia-nl"
          ENVNAME="${{ github.run_id }}-${{ github.run_attempt }}"
          case "$PROVIDER" in
            hetzner) DEFAULT_REGION="nbg1" ;;
            aws)     DEFAULT_REGION="us-east-1" ;;
            gcp)     DEFAULT_REGION="europe-west3" ;;
            azure)   DEFAULT_REGION="germanywestcentral" ;;
            alibaba) DEFAULT_REGION="eu-central-1" ;;
            *) echo "::error::unknown provider '$PROVIDER'"; exit 1 ;;
          esac
          REGION="${REGION_INPUT:-$DEFAULT_REGION}"
          {
            echo "E2E_PROJECT=$PROJECT"
            echo "E2E_ENV=$ENVNAME"
            echo "E2E_CLUSTER=$PROJECT-$ENVNAME"
            echo "E2E_REGION=$REGION"
            # Generalized region the T2 harness resolves for every provider (resolveT2Region).
            echo "ALETHIA_E2E_REGION=$REGION"
            # Wall-clock anchor for the proof bundle's duration_seconds (BYOC A0.4).
            echo "ALETHIA_E2E_PROOF_START_EPOCH=$(date -u +%s)"
          } >> "$GITHUB_ENV"
          echo "::notice::T2 cluster for this run: $PROJECT-$ENVNAME ($PROVIDER, region $REGION)"

      # ── Cheapest-shape override (BYOC F4). The managed-cloud templates default to LARGE nodes
      #    (AWS m5a.4xlarge×2 SPOT ≈ $0.30/run); the harness cost guard HARD-FAILS a managed run
      #    that inherits that default, so we pin a small node shape per provider here. Merged
      #    into the snapshot `cluster` block (t2MergeClusterJSON): small instance ×1, min disk.
      #    Hetzner keeps its proven cents/run default (no override). Per-cloud SKUs/disk floors
      #    are validated in each cloud's wave. ──
      - name: Compute cheapest cluster shape
        if: steps.gate.outputs.run == 'true'
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          # NET = per-provider network-block override (t2MergeNetworkJSON → snapshot `network`).
          # AWS folds single_nat_gateway=true into the FULL snapshot (one NAT vs one-per-AZ ≈ halves
          # the run's NAT cost); the A0.5 fidelity base is untouched. Other clouds leave it unset.
          NET=""
          case "$PROVIDER" in
            hetzner) SHAPE="" ;;
            aws)     SHAPE='{"instance_types":["t3.large"],"node_min_size":1,"node_max_size":2,"node_desired_size":1,"node_disk_size_gb":20,"provider_config":{"enable_karpenter":true}}'; NET='{"single_nat_gateway":true}' ;;
            gcp)     SHAPE='{"instance_types":["e2-small"],"node_min_size":1,"node_max_size":2,"node_desired_size":1,"node_disk_size_gb":20}' ;;
            # Standard_B2s (v1) is NOT offered by AKS on a modern subscription: a real apply fails with
            # "The VM size of Standard_B2s is not allowed in your subscription" — only the v2/v3+
            # generations are served. (`az vm list-skus` disagrees and reports B2s unrestricted; AKS is
            # authoritative.) D2s_v3 = 2 vCPU/8GiB, DSv3 family, broadly available. Verified on a real AKS apply.
            azure)   SHAPE='{"instance_types":["Standard_D2s_v3"],"node_min_size":1,"node_max_size":2,"node_desired_size":1,"node_disk_size_gb":32}' ;;
            alibaba) SHAPE='{"instance_types":["ecs.e-c1m2.large"],"node_min_size":1,"node_max_size":2,"node_desired_size":1,"node_disk_size_gb":40}' ;;
            *) echo "::error::unknown provider '$PROVIDER'"; exit 1 ;;
          esac
          if [ -n "$SHAPE" ]; then
            echo "ALETHIA_E2E_CLUSTER_JSON=$SHAPE" >> "$GITHUB_ENV"
            echo "::notice::T2 cheapest shape for $PROVIDER: $SHAPE"
          fi
          if [ -n "$NET" ]; then
            echo "ALETHIA_E2E_NETWORK_JSON=$NET" >> "$GITHUB_ENV"
            echo "::notice::T2 network override for $PROVIDER: $NET"
          fi

      # ── Resolve the FULL-BAR dimension (P2-F, #1068). Off by default (the nightly stays the cheap
      #    green-floor smoke); ON for the weekly Sunday cron OR a workflow_dispatch with full_bar=true.
      #    When on, export ALETHIA_E2E_MAX_CONFIG=1 + ALETHIA_E2E_ALL_ADDONS=1 (the T2 harness reads
      #    these from the process env — $GITHUB_ENV carries them into the go-test step) so the run
      #    proves all 11 resource kinds land in tofu state AND all 19 marketplace add-ons converge.
      #    E2E_FULL_BAR gates the raised cost ceiling below; E2E_DIMENSION labels the rollup's ledger
      #    row (full vs floor). Both are also read by the rollup job, which recomputes the same way. ──
      - name: Resolve full-bar dimension
        if: steps.gate.outputs.run == 'true'
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_FULL: ${{ github.event.inputs.full_bar }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          full="false"
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$DISPATCH_FULL" = "true" ]; then full="true"; fi
          # The weekly Sunday cron (05:17 UTC) is the scheduled full-bar run.
          if [ "$EVENT" = "schedule" ] && [ "$SCHEDULE" = "17 5 * * 0" ]; then full="true"; fi
          if [ "$full" = "true" ]; then
            {
              echo "E2E_FULL_BAR=true"
              echo "E2E_DIMENSION=full"
              echo "ALETHIA_E2E_MAX_CONFIG=1"
              echo "ALETHIA_E2E_ALL_ADDONS=1"
            } >> "$GITHUB_ENV"
            echo "::notice::FULL-BAR dimension ENABLED — max-config (11 kinds) + all-add-ons (19) on this run (raised cost ceiling)."
          else
            {
              echo "E2E_FULL_BAR=false"
              echo "E2E_DIMENSION=floor"
            } >> "$GITHUB_ENV"
            echo "::notice::green-floor dimension (base provision + ArgoCD Healthy; + A0.6 repos when wired)."
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.run == 'true'
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        if: steps.gate.outputs.run == 'true'
        with:
          go-version: "1.25"
      - uses: opentofu/setup-opentofu@v1
        if: steps.gate.outputs.run == 'true'
        with:
          tofu_version: "1.9.0"
      - uses: azure/setup-helm@v4
        if: steps.gate.outputs.run == 'true'
        with:
          version: v3.16.4
      - uses: azure/setup-kubectl@v4
        if: steps.gate.outputs.run == 'true'

      - name: Install hcloud CLI (belt-and-suspenders teardown)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'hetzner'
        env:
          HCLOUD_CLI_VERSION: v1.49.1
        run: |
          curl -fsSL "https://github.com/hetznercloud/cli/releases/download/${HCLOUD_CLI_VERSION}/hcloud-linux-amd64.tar.gz" \
            | tar -xz hcloud
          sudo mv hcloud /usr/local/bin/hcloud
          hcloud version

      - name: Install workspace deps
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Migrate the control-plane database (schema + programmables/RLS + app role)
        if: steps.gate.outputs.run == 'true'
        run: pnpm -F console db:migrate

      # ── AWS: exchange the GitHub OIDC token for the ref-bound `alethia-e2e-nightly` role
      #    (no long-lived keys). Only runs for the aws provider once a maintainer has applied
      #    infra/aws-oidc and set vars.E2E_AWS_ROLE_ARN; otherwise the gate above already
      #    green-skipped the whole run. The role is region-locked + boundary-capped + budgeted
      #    (see infra/aws-oidc/e2e-nightly.tf). aws-region MUST equal the role's locked region
      #    (E2E_REGION defaults to us-east-1 for aws — set in the compute step). ──
      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.E2E_AWS_ROLE_ARN }}
          aws-region: ${{ env.E2E_REGION }}
          role-duration-seconds: 7200

      # ── Signal to the T2 harness that AWS creds are configured. The provider table's
      #    credsPresent() for aws requires ALETHIA_E2E_AWS_READY=1 AND a concrete handle
      #    (AWS_ROLE_ARN/AWS_ACCESS_KEY_ID, exported by configure-aws-credentials above) — so a
      #    missing/failed configure step surfaces as a HARD FAIL (under ALETHIA_E2E_T2_REQUIRE),
      #    never a green skip. Without this, the aws run would ALWAYS fail the cred gate. ──
      - name: Mark AWS ready for the T2 harness
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'aws'
        run: echo "ALETHIA_E2E_AWS_READY=1" >> "$GITHUB_ENV"

      # ── GCP: exchange the GitHub OIDC token for the Workload-Identity-Federated service account
      #    (no key file). Only runs for the gcp provider once a maintainer has applied infra/gcp-e2e
      #    and set vars.E2E_GCP_WIF_PROVIDER + vars.E2E_GCP_SA_EMAIL; otherwise the gate above already
      #    green-skipped the whole run. google-github-actions/auth mints/exports the short-lived
      #    federated credentials; setup-gcloud puts `gcloud` on PATH for the T2 harness + sweeper.
      #    This uses the job's `id-token: write` — SAFE because the workflow is schedule/dispatch-only
      #    (program invariant 1), never reachable from a PR. ──
      - name: Configure GCP credentials (WIF / OIDC)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.E2E_GCP_WIF_PROVIDER }}
          service_account: ${{ vars.E2E_GCP_SA_EMAIL }}
      - name: Install gcloud CLI
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'gcp'
        uses: google-github-actions/setup-gcloud@v2

      # ── Azure: federated (OIDC) login — no client secret. Only runs for the azure provider once a
      #    maintainer has applied infra/azure-e2e + set the three E2E_AZURE_* vars; otherwise the gate
      #    green-skipped. `az` is preinstalled on the runner. We ALSO export ARM_USE_OIDC +
      #    ARM_CLIENT_ID/TENANT_ID/SUBSCRIPTION_ID to the job env so OpenTofu's azurerm provider
      #    authenticates from the SAME federated token (the T2 harness reads ARM_*). Uses the job's
      #    `id-token: write` — schedule/dispatch-only, never PR-reachable (invariant 1). ──
      - name: Configure Azure credentials (OIDC)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.E2E_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.E2E_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.E2E_AZURE_SUBSCRIPTION_ID }}
      - name: Export ARM_* for the azurerm OpenTofu provider (federated OIDC)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'azure'
        run: |
          {
            echo "ARM_USE_OIDC=true"
            echo "ARM_CLIENT_ID=${{ vars.E2E_AZURE_CLIENT_ID }}"
            echo "ARM_TENANT_ID=${{ vars.E2E_AZURE_TENANT_ID }}"
            echo "ARM_SUBSCRIPTION_ID=${{ vars.E2E_AZURE_SUBSCRIPTION_ID }}"
          } >> "$GITHUB_ENV"

      # ── Alibaba: keyless RAM OIDC. Install aliyun-cli (release tgz, like the hcloud step) for the
      #    sweeper, then fetch a GitHub OIDC token (audience sts.aliyuncs.com) to a file and export the
      #    RAM-OIDC trio that BOTH the aliyun CLI sweeper AND the alicloud OpenTofu provider read:
      #    ALICLOUD_OIDC_TOKEN_FILE + ALICLOUD_ROLE_ARN + ALICLOUD_OIDC_PROVIDER_ARN. Only runs for the
      #    alibaba provider once a maintainer has applied infra/alibaba-e2e + set the two E2E_ALIBABA_*
      #    vars; otherwise the gate green-skipped. The OIDC token comes from the job's `id-token: write`
      #    (ACTIONS_ID_TOKEN_REQUEST_* are injected into the step) — schedule/dispatch-only (invariant 1). ──
      - name: Configure Alibaba credentials (RAM OIDC)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'alibaba'
        env:
          ALIYUN_CLI_VERSION: "3.0.263"
          ROLE_ARN: ${{ vars.E2E_ALIBABA_ROLE_ARN }}
          OIDC_PROVIDER_ARN: ${{ vars.E2E_ALIBABA_OIDC_PROVIDER_ARN }}
        run: |
          curl -fsSL "https://github.com/aliyun/aliyun-cli/releases/download/v${ALIYUN_CLI_VERSION}/aliyun-cli-linux-${ALIYUN_CLI_VERSION}-amd64.tgz" \
            | tar -xz aliyun
          sudo mv aliyun /usr/local/bin/aliyun
          aliyun version
          # Fetch the GitHub OIDC token (RAM audience) to a file the CLI + tofu provider both read.
          TOKEN_FILE="${RUNNER_TEMP}/alibaba-oidc-token"
          curl -fsSL "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.aliyuncs.com" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            | jq -r '.value' > "$TOKEN_FILE"
          if [ ! -s "$TOKEN_FILE" ]; then
            echo "::error::failed to mint the Alibaba RAM OIDC token — refusing to continue."
            exit 1
          fi
          {
            echo "ALICLOUD_OIDC_TOKEN_FILE=$TOKEN_FILE"
            echo "ALICLOUD_ROLE_ARN=$ROLE_ARN"
            echo "ALICLOUD_OIDC_PROVIDER_ARN=$OIDC_PROVIDER_ARN"
          } >> "$GITHUB_ENV"

      # ── Stale-cluster preflight (BYOC A1.4). BEFORE provisioning, sweep any leaked e2e
      #    orphans from PRIOR runs — a nightly hard-killed before both its graceful destroy AND
      #    its always() sweep keeps billing until something notices. PREFLIGHT=1 discovers every
      #    OTHER e2e-<env> handle in the region and sweeps it scope-locked (never this run, never
      #    prod). Best-effort + loud: it warns on residual but exits 0, so a flaky tag/API call
      #    can't red an otherwise-healthy provisioning night (the always() teardown stays the
      #    fail-closed guarantee for THIS run). Same-cloud runs are serialized by the concurrency
      #    group, so any other e2e-* handle is genuinely an orphan. aws-only (its sweeper). ──
      - name: Stale-cluster preflight (sweep prior-run e2e orphans)
        if: steps.gate.outputs.run == 'true' && matrix.provider == 'aws'
        env:
          PREFLIGHT: "1"
          ALETHIA_E2E_ENV: ${{ env.E2E_ENV }}
          ALETHIA_E2E_REGION: ${{ env.E2E_REGION }}
        run: ./scripts/e2e/aws-cleanup.sh

      # ── The real proof. A finer step-level timeout than the job cap so a hung apply
      #    is KILLED here (the step fails) and the always() teardown below still runs
      #    normally — rather than the whole job hitting its cap. ──
      # 75m step / 80m go-timeout: the test's own ctx is 40m base (deploy wait 25m + the
      # ArgoCD Healthy+Synced convergence assertion 8m + build headroom) PLUS the opt-in soak
      # budget (window + drift/PVC bounds, BYOC A0.3), so a soak run has headroom; a non-soak
      # run still finishes far inside this. All three exceed the ctx so the ctx cancels first.
      - name: T2 — real runner provisions a real cloud cluster
        id: t2
        if: steps.gate.outputs.run == 'true'
        timeout-minutes: 75
        working-directory: test/e2e
        env:
          ALETHIA_E2E_PROVIDER: ${{ matrix.provider }}
          ALETHIA_E2E_PROJECT: ${{ env.E2E_PROJECT }}
          ALETHIA_E2E_ENV: ${{ env.E2E_ENV }}
          # Generalized region (the compute step also exports this to $GITHUB_ENV; explicit here
          # for clarity). resolveT2Region reads ALETHIA_E2E_REGION for every provider.
          ALETHIA_E2E_REGION: ${{ env.E2E_REGION }}
          ALETHIA_E2E_T2_RUNNER_LOG: ${{ runner.temp }}/t2-runner.log
          # ── Day-2 SOAK window (BYOC A0.3). Opt-in: default 10m on the real-apply runs,
          #    overridable via vars.E2E_SOAK (e.g. a longer window, or a short one to trim
          #    cost). Unset var ⇒ 10m. Runs AFTER the readiness+ArgoCD asserts and BEFORE the
          #    guaranteed teardown: a liveness loop, a real DETECT_DRIFT → honest posture, a
          #    1Gi PVC → Bound → cloud-side sweep-tag hard-fail, and an add-on health re-read.
          #    Its machine-readable summary is written for the A0.4 proof/verdict capture. ──
          ALETHIA_E2E_SOAK: ${{ vars.E2E_SOAK || '10m' }}
          ALETHIA_E2E_SOAK_SUMMARY: ${{ runner.temp }}/soak-summary.json
          # ── ArgoCD-WITH-REPOS + BYO Helm proof (BYOC A0.6). Opt-in, ON TOP of the base T2
          #    proof: only activates when a maintainer sets the repo VARS + the git-token SECRET.
          #    The proof is cloud-agnostic (it works over ArgoCD CRs, never an ingress URL), so it
          #    runs on every gate-enabled leg — aws, gcp, azure (P2-D, #1066), with the per-cloud
          #    repo overrides below. The repo URLs are non-secret vars; the git token is a SECRET
          #    consumed only via the control plane's git-token handler (never written into the
          #    persisted config_snapshot). REQUIRE is derived from the apps-repo var (shared or a
          #    per-cloud override), so once the maintainer opts in, a half-wired config HARD-FAILS
          #    instead of silently disabling the assertion. Absent ⇒ a clean skip of the repos half
          #    (base A0.1–A0.5 still proves). This whole step (and thus the secret) is
          #    schedule/dispatch-only — never reachable from pull_request (program invariant 1). ──
          ALETHIA_E2E_ARGO_APPS_REPO: ${{ vars.E2E_ARGO_APPS_REPO }}
          ALETHIA_E2E_ARGO_BYO_CHART_REPO: ${{ vars.E2E_ARGO_BYO_CHART_REPO }}
          ALETHIA_E2E_ARGO_BYO_CHART_PATH: ${{ vars.E2E_ARGO_BYO_CHART_PATH }}
          ALETHIA_E2E_ARGO_BYO_CHART_REVISION: ${{ vars.E2E_ARGO_BYO_CHART_REVISION }}
          ALETHIA_E2E_ARGO_BYO_CHART_NAMESPACE: ${{ vars.E2E_ARGO_BYO_CHART_NAMESPACE }}
          ALETHIA_E2E_GIT_TOKEN: ${{ secrets.E2E_GIT_TOKEN }}
          # ── Per-cloud A0.6 repo overrides (P2-D, #1066). GCP + Azure often can't reuse the aws
          #    apps-repo / BYO chart: the manifests differ per cloud AND, per #687, the service-binding
          #    resolves against THAT cloud's tofu outputs. The T2 harness (t2ArgoEnvForProvider) prefers
          #    the "<var>_<PROVIDER>" sibling for the running leg, else the shared cross-cloud var above —
          #    so aws stays on its proven shared repo untouched, and a leg green-skips at the gate if its
          #    cloud secret isn't wired. The git token stays the single shared secret (it crosses only via
          #    the git-token API), so its account must grant read to every per-cloud repo. Parity: aws uses
          #    the shared vars (already proven); alibaba/hetzner add their siblings in their own waves. ──
          ALETHIA_E2E_ARGO_APPS_REPO_GCP: ${{ vars.E2E_ARGO_APPS_REPO_GCP }}
          ALETHIA_E2E_ARGO_BYO_CHART_REPO_GCP: ${{ vars.E2E_ARGO_BYO_CHART_REPO_GCP }}
          ALETHIA_E2E_ARGO_BYO_CHART_REVISION_GCP: ${{ vars.E2E_ARGO_BYO_CHART_REVISION_GCP }}
          ALETHIA_E2E_ARGO_APPS_REPO_AZURE: ${{ vars.E2E_ARGO_APPS_REPO_AZURE }}
          ALETHIA_E2E_ARGO_BYO_CHART_REPO_AZURE: ${{ vars.E2E_ARGO_BYO_CHART_REPO_AZURE }}
          ALETHIA_E2E_ARGO_BYO_CHART_REVISION_AZURE: ${{ vars.E2E_ARGO_BYO_CHART_REVISION_AZURE }}
          # REQUIRED whenever ANY apps-repo (shared OR a per-cloud gcp/azure override) is set — so a
          # half-wired per-cloud config HARD-FAILS at decide() (fail-closed) instead of silently skipping.
          ALETHIA_E2E_ARGO_REPOS_REQUIRE: ${{ (vars.E2E_ARGO_APPS_REPO != '' || vars.E2E_ARGO_APPS_REPO_GCP != '' || vars.E2E_ARGO_APPS_REPO_AZURE != '') && '1' || '' }}
          # ── NAMESPACE-PLACEMENT proof (#959 · wave:fabric). Opt-in, ON TOP of the base T2 proof:
          #    after the base run provisions a real cluster (the Fabric) and ArgoCD is Healthy, the
          #    harness layers a SECOND DEPLOY onto the SAME cluster with placement_mode=namespace and
          #    asserts the tenant app landed in <ns> on that cluster — no new cluster provisioned,
          #    ArgoCD not reinstalled, hardened per-namespace isolation applied (the #955+#956+#957
          #    activation). aws-first (a clean skip on the other clouds, whose keyless re-mint is a
          #    follow-up) and REQUIRES the A0.6 apps repo above (E2E_ARGO_APPS_REPO) — the tenant-app
          #    routing assertion needs an apps destination to deliver into. Absent ⇒ a clean skip of
          #    this layer (the base T2 proof is unchanged). Real-apply is main-gated, so this
          #    exercises meaningfully only from `main`. Set the repo VARIABLE E2E_NAMESPACE_TENANT
          #    (truthy) to enable once the apps repo is wired. ──
          ALETHIA_E2E_NAMESPACE_TENANT: ${{ vars.E2E_NAMESPACE_TENANT }}
          # ── Pre-apply cost ceiling (BYOC A1.4). The in-process runner reads INFRACOST_API_KEY to
          #    price the apply's plan and ALETHIA_COST_CEILING_MONTHLY_USD to fail-closed a real
          #    apply whose estimated monthly cost exceeds the ceiling (or that can't be priced).
          #    Both are aws-relevant: the secret enables the estimate, the var (default $300/mo, a
          #    monthly-estimate guard dominated by the always-on EKS control plane + single NAT ⇒ a
          #    cheap run ≈ $150–200/mo) catches a runaway shape. Enabling the ceiling REQUIRES the
          #    secret — without it the guard fail-closes (a ceiling with no estimate refuses). For
          #    non-aws providers the ceiling is unset ⇒ no cost gate (their waves add their own).
          #    On a FULL-BAR run (P2-F, #1068) the 11-kind + 19-add-on surface bills more (extra
          #    managed resources + add-on scale-up), so the ceiling is raised to the full-bar var
          #    (default $600/mo) — E2E_FULL_BAR was set to `true` in $GITHUB_ENV by the resolve step. ──
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
          ALETHIA_COST_CEILING_MONTHLY_USD: ${{ matrix.provider == 'aws' && (env.E2E_FULL_BAR == 'true' && (vars.E2E_AWS_COST_CEILING_FULL_USD || '600') || (vars.E2E_AWS_COST_CEILING_USD || '300')) || '' }}
        run: |
          GOWORK=off go test -tags=e2e_t2 ./... \
            -run TestT2RealCloudProvisioning -count=1 -timeout 80m -v

      # ── Proof capture v2 (BYOC A0.4). Runs on ANY t2 outcome (always()) so a RED night is
      #    debuggable, not just a green one: it builds a structured, SCRUBBED proof bundle
      #    (verify receipt + provision summary + ArgoCD verdict + timings + destroy
      #    confirmation on success; the failure stage on a fail), routes everything through the
      #    A0.0 secret scrub, and FAILS this step if the finished bundle isn't grep-clean (so a
      #    leak reds the run instead of being uploaded — program invariant 2). It also writes
      #    the per-provider PASS/FAIL verdict to the job step summary. The runner wrote a
      #    host-usable kubeconfig to $HOME/.alethia/kubeconfig (read only on the success path). ──
      - name: Capture proof (scrubbed bundle + step-summary verdict)
        if: steps.gate.outputs.run == 'true' && always()
        env:
          PROVIDER: ${{ matrix.provider }}
          ALETHIA_E2E_PROOF_OUTCOME: ${{ steps.t2.outcome }}
          ALETHIA_E2E_PROOF_RUN_TAG: nightly-${{ github.run_id }}-${{ github.run_attempt }}
          ALETHIA_E2E_T2_RUNNER_LOG: ${{ runner.temp }}/t2-runner.log
          # Day-2 soak summary (BYOC A0.3), written by the T2 test; folded into the bundle +
          # step-summary verdict when present (absent ⇒ the capture is unchanged).
          ALETHIA_E2E_SOAK_SUMMARY: ${{ runner.temp }}/soak-summary.json
          # Map the GITHUB_ENV names the compute-cluster step wrote into the ALETHIA_* names
          # the capture script reads (region + the unique cluster name for the summary).
          ALETHIA_E2E_REGION: ${{ env.E2E_REGION }}
          ALETHIA_E2E_CLUSTER: ${{ env.E2E_CLUSTER }}
        run: |
          # The runner's kubeconfig only exists on the success path. Point KUBECONFIG at it
          # when present so the capture reads real cluster state; otherwise leave it unset and
          # the capture cleanly skips cluster-state and records the failure stage instead.
          if [ -f "$HOME/.alethia/kubeconfig" ]; then
            export KUBECONFIG="$HOME/.alethia/kubeconfig"
          fi
          ./demos/proofs/capture-proof.sh "${{ matrix.provider }}"

      - name: Upload proof artifact
        if: steps.gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-proof-${{ matrix.provider }}-${{ github.run_id }}
          path: demos/proofs/${{ matrix.provider }}/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload runner log
        if: steps.gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: t2-runner-log-${{ matrix.provider }}-${{ github.run_id }}
          path: ${{ runner.temp }}/t2-runner.log
          if-no-files-found: ignore
          retention-days: 14

      # ── GUARANTEED teardown. Runs on ANY outcome of the proof (pass/fail/timeout/cancel) as
      #    long as we actually started provisioning. The graceful in-process `tofu destroy`
      #    already ran on the normal path; this scope-locked cloud sweep is the belt-and-
      #    suspenders for a hard-killed test process. Every sweeper filters on THIS run's unique
      #    handle — hetzner: label `cluster=$E2E_CLUSTER`; the managed clouds: the
      #    `alethia:project-id=e2e-$E2E_ENV` tag (the always-emitted, unique-per-run sweep handle;
      #    + per-cloud belt filters for out-of-band resources) — NEVER account-wide (the
      #    shared-account near-wipe; see scope-destructive-cloud-ops).
      #
      #    FAIL-CLOSED: a provider that provisioned but has no sweeper script is a HARD ERROR,
      #    never a silent skip — so a cloud can never be enabled (its gate set) without its
      #    sweeper shipped alongside. Each cloud's sweeper lands in its wave (aws A1.3, gcp/azure
      #    A2, alibaba A3.1); until then that cloud green-skips at the gate (run=false) and never
      #    reaches here. ──
      - name: Guaranteed teardown (scope-locked cloud sweep)
        if: steps.gate.outputs.run == 'true' && always()
        env:
          PROVIDER: ${{ matrix.provider }}
          # The managed sweepers read their scope from these ALETHIA_E2E_* names (the compute
          # step wrote E2E_* to $GITHUB_ENV; map them here). ALETHIA_E2E_REGION is already in
          # $GITHUB_ENV; ENV/PROJECT are mapped explicitly.
          ALETHIA_E2E_ENV: ${{ env.E2E_ENV }}
          ALETHIA_E2E_PROJECT: ${{ env.E2E_PROJECT }}
        run: |
          if [ -z "${E2E_CLUSTER:-}" ] || [ -z "${E2E_ENV:-}" ]; then
            echo "::error::E2E_CLUSTER/E2E_ENV is unset — refusing to run an unscoped cleanup."
            exit 1
          fi
          case "$PROVIDER" in
            hetzner) SCRIPT="./scripts/e2e/hcloud-cleanup.sh" ;;
            aws)     SCRIPT="./scripts/e2e/aws-cleanup.sh" ;;
            gcp)     SCRIPT="./scripts/e2e/gcp-cleanup.sh" ;;
            azure)   SCRIPT="./scripts/e2e/azure-cleanup.sh" ;;
            alibaba) SCRIPT="./scripts/e2e/alibaba-cleanup.sh" ;;
            *) echo "::error::unknown provider '$PROVIDER'"; exit 1 ;;
          esac
          if [ ! -x "$SCRIPT" ]; then
            echo "::error::$PROVIDER provisioned but $SCRIPT is missing/not executable — refusing to leave resources unswept. Ship the sweeper before enabling this cloud's gate."
            exit 1
          fi
          # hetzner takes the cluster label as arg1; the managed sweepers read the scope
          # (ALETHIA_E2E_ENV / _PROJECT / _REGION) from the environment. Passing $E2E_CLUSTER is
          # harmless for the managed scripts (they ignore positional args).
          "$SCRIPT" "$E2E_CLUSTER"

  # ── A3.2 verdict rollup. The `provision` matrix is fail-fast:false, so every cloud runs to its
  #    own verdict; this fan-in job (always()) reads each leg's uploaded proof bundle, prints ONE
  #    5-row (hetzner/aws/gcp/azure/alibaba) PASS/FAIL/SKIP table to the run's step summary, and on
  #    ANY red opens a title-deduped tracking issue. Per-leg outcome is NOT available from a matrix
  #    `needs.*.result` (that's only the aggregate), so we derive it from each leg's
  #    provision-summary.json (present ⇒ ran: outcome==success is PASS, else FAIL; absent ⇒ the leg
  #    green-skipped at the gate ⇒ SKIP). A wholesale matrix failure that produced NO per-leg bundle
  #    (infra died before capture) is still surfaced as red so it can't hide. The `gh issue create`
  #    is guarded to schedule/dispatch runs only (never a fork/PR — invariant 1; the job holds no
  #    cloud privilege regardless, only `issues: write`). ──
  rollup:
    name: Nightly verdict rollup (5-cloud table + dedup issue)
    needs: [provision]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all per-provider proof artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: e2e-proof-*-${{ github.run_id }}
          path: proofs
          merge-multiple: false
      - name: Roll up per-provider verdicts (+ dedup issue on red)
        env:
          GH_TOKEN: ${{ github.token }}
          MATRIX_RESULT: ${{ needs.provision.result }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          providers="hetzner aws gcp azure alibaba"
          reds=""
          {
            echo "## E2E nightly — 5-cloud verdict rollup"
            echo
            echo "matrix result: \`${MATRIX_RESULT}\` · [run](${RUN_URL})"
            echo
            echo "| cloud | status | detail |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          for p in $providers; do
            summary="$(find "proofs/e2e-proof-${p}-${RUN_ID}" -type f -name provision-summary.json 2>/dev/null | head -1 || true)"
            if [ -z "$summary" ]; then
              # No proof bundle for this leg ⇒ it green-skipped at the gate (no secret/var wired).
              status="SKIP"
              detail="gate off — no secret/var wired"
            else
              outcome="$(jq -r '.outcome // "unknown"' "$summary" 2>/dev/null || echo unknown)"
              verdict="$(jq -r '.verdict // ""' "$summary" 2>/dev/null || echo "")"
              detail="${verdict:-$outcome}"
              if [ "$outcome" = "success" ]; then
                status="PASS"
              else
                status="FAIL"
                reds="$reds $p"
              fi
            fi
            # Escape the pipe so a verdict string can't break the markdown table.
            detail="${detail//|/\\|}"
            echo "| ${p} | ${status} | ${detail} |" >> "$GITHUB_STEP_SUMMARY"
          done
          # A wholesale matrix failure that produced no per-leg bundle (e.g. infra died before the
          # always() capture) is still red — surface it so a leg that never emitted a bundle can't hide.
          if [ "$MATRIX_RESULT" = "failure" ] && [ -z "${reds// /}" ]; then
            echo "| (job) | FAIL | provision matrix failed with no per-leg proof bundle |" >> "$GITHUB_STEP_SUMMARY"
            reds="$reds job"
          fi
          echo "reds:${reds:-<none>}"
          # Dedup tracking issue on ANY red — schedule/dispatch runs only.
          if [ -z "${reds// /}" ]; then
            echo "::notice::nightly rollup all-green (no FAIL legs) — no issue filed."
            exit 0
          fi
          if [ "$EVENT_NAME" != "schedule" ] && [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            echo "::warning::red legs (${reds}) but event=${EVENT_NAME} — skipping issue creation (schedule/dispatch only)."
            exit 0
          fi
          for cloud in $reds; do
            title="e2e nightly: ${cloud} RED"
            existing="$(gh issue list --state open --search "${title} in:title" --json title \
              --jq "[.[] | select(.title == \"${title}\")] | length" 2>/dev/null || echo 0)"
            if [ "${existing:-0}" -gt 0 ]; then
              echo "::notice::an open issue titled '${title}' already exists — skipping create (deduped)."
              continue
            fi
            body_file="${RUNNER_TEMP}/issue-body-${cloud}.md"
            {
              printf '%s\n\n' "The T2 real-cloud nightly went **RED** for \`${cloud}\`."
              printf '%s\n\n' "Run: ${RUN_URL}"
              printf '%s\n' "See the run's step-summary rollup + the \`e2e-proof-${cloud}-${RUN_ID}\` artifact for the failing stage (deploy stage / cost / leak / stale sweep)."
              printf '%s\n' "_Auto-created by the e2e-nightly rollup and deduped by title — close it once \`${cloud}\` is green again._"
            } > "$body_file"
            gh issue create --title "$title" --body-file "$body_file" \
              && echo "::notice::filed tracking issue: ${title}" \
              || echo "::warning::could not create issue '${title}' (continuing)."
          done

      # ── Provisioning-parity ledger append (P2-F, #1068). Every scheduled/dispatched run auto-records
      #    one append-only row PER LEG THAT RAN into demos/proofs/provisioning-e2e-log.md, via the
      #    scripts/e2e/provisioning-e2e.sh RECORD_ONLY path (the same engine the parity board uses) —
      #    verdict derived from each leg's provision-summary.json (success⇒PASS, else FAIL), dimension
      #    from the same full-bar resolution as the provision job (full vs floor). Gate-off legs produced
      #    no bundle (nothing ran) so they contribute no row. The updated ledger is uploaded as an
      #    artifact for a maintainer to commit — CI never pushes to the repo. ──
      - name: Append provisioning-e2e ledger rows (RECORD_ONLY)
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_FULL: ${{ github.event.inputs.full_bar }}
          SCHEDULE: ${{ github.event.schedule }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          dim="floor"
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$DISPATCH_FULL" = "true" ]; then dim="full"; fi
          if [ "$EVENT" = "schedule" ] && [ "$SCHEDULE" = "17 5 * * 0" ]; then dim="full"; fi
          sha="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
          for p in hetzner aws gcp azure alibaba; do
            summary="$(find "proofs/e2e-proof-${p}-${RUN_ID}" -type f -name provision-summary.json 2>/dev/null | head -1 || true)"
            # No bundle ⇒ the leg green-skipped at the gate (nothing ran) ⇒ no ledger row.
            [ -z "$summary" ] && continue
            outcome="$(jq -r '.outcome // "unknown"' "$summary" 2>/dev/null || echo unknown)"
            verdict_detail="$(jq -r '.verdict // ""' "$summary" 2>/dev/null || echo "")"
            if [ "$outcome" = "success" ]; then v="PASS"; else v="FAIL"; fi
            RECORD_ONLY=1 RECORD_VERDICT="$v" RECORD_BUNDLE="e2e-proof-${p}-${RUN_ID}" \
              RECORD_DETAIL="${verdict_detail:-$outcome}" RECORD_SHA="$sha" \
              ./scripts/e2e/provisioning-e2e.sh "$p" "$dim" \
              || echo "::warning::ledger RECORD_ONLY failed for ${p}/${dim} (continuing)."
          done
          echo "::notice::appended provisioning-e2e ledger rows (dimension=${dim}) — upload for a maintainer to commit."

      - name: Upload updated provisioning-e2e ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provisioning-e2e-log-${{ github.run_id }}
          path: demos/proofs/provisioning-e2e-log.md
          if-no-files-found: warn
          retention-days: 30
