name: Infra - Project Templates

on:
  pull_request:
    paths:
      - 'infra/templates/**'
      - 'infra/.tflint.hcl'
      - 'infra/.trivy.yaml'
      - '.github/actions/iac-checks/**'
  push:
    branches: [main]
    paths:
      - 'infra/templates/**'

# The customer project templates (infra/templates/project/{aws,gcp,azure,hetzner,alibaba}) are
# applied at provision time by the runner, NOT by this repo's CI. So this workflow gates them with
# credential-free static checks: fmt + validate + tflint + Trivy misconfig + the plan-out-safety
# guard (below). No apply.

permissions:
  contents: read

env:
  TOFU_VERSION: "1.10.10"

jobs:
  # The runner deploys via `tofu plan -out` → apply that saved plan. A provider configured from
  # a cluster's own known-after-apply kubeconfig can't resolve at plan, so the runner can never
  # deploy such a template — this shipped undetected on Hetzner (#295) because CI only ran
  # `tofu validate` (which never evaluates provider configs). This guard makes that bug class
  # non-regressable, credential-free.
  plan-out-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Project templates must be plan-out-safe (no in-tofu k8s-apply resources)
        run: bash scripts/check-templates-plan-safe.sh

  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, gcp, azure, hetzner, alibaba, local]
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Validate (no backend, no creds)
        working-directory: infra/templates/project/${{ matrix.cloud }}
        run: |
          tofu init -backend=false
          tofu validate

      - name: IaC checks (fmt + tflint + Trivy)
        uses: ./.github/actions/iac-checks
        with:
          working-directory: infra/templates/project/${{ matrix.cloud }}
