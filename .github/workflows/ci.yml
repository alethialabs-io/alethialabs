# SPDX-License-Identifier: AGPL-3.0-only
#
# Continuous integration — validates every PR + push to main. The CD/release/infra
# workflows are separate. (The enterprise package @alethia/ee is verified at standup,
# not here — community CI checks the open-source build.)

name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Merge queue: the heavy real-runner provisioning keystone (job `provision-e2e`)
  # runs ONLY on merge_group events (see its `if:`), so a kind boot + provider/image
  # pulls don't tax every PR. Adding this trigger also lets the required per-PR checks
  # re-validate the queued merge result — standard merge-queue behavior.
  merge_group:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — mutation testing (slow, non-blocking)
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Which surfaces does this PR touch? The heavy browser E2Es below stay OFF most PRs (Actions
  # minutes), but a PR that changes a surface an E2E covers turns that E2E into a PR gate — because
  # the alternative is what keeps happening: a suite that only runs post-merge lets a break ship
  # green. A whole Lexical composer rewrite shipped that way (→ `agent`); the "Org evidence" heading
  # the hero path waited for was deleted in an Evidence redesign and rotted for weeks (→ `console`,
  # below). Cheap (~15s) and dependency-free.
  detect-changes:
    name: Detect PR surface changes
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      console: ${{ steps.filter.outputs.console }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "agent=false" >> "$GITHUB_OUTPUT"
            echo "console=false" >> "$GITHUB_OUTPUT"
            echo "docs=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # THREE-dot (merge-base): the PR's OWN changes only. Two-dot (`git diff base head`)
          # false-positives every filter the moment this branch falls behind base — it then lists
          # every file the base advanced past, so an unrelated PR would run the E2Es. (That is a
          # pre-existing bug this job carried; it over-ran, never under-ran, so it hid.)
          changed=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")
          # `agent` — the narrow Elench/agent surface the Elench AI E2E drives.
          if echo "$changed" | grep -qE '^apps/console/(components/(agent|ui/message-scroller)|lib/(ai|stores/use-(elench|artifact|widget-grid))|app/api/agent|app/server/actions/(agent|artifacts|mentions)|e2e/elench)'; then
            echo "agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "agent=false" >> "$GITHUB_OUTPUT"
          fi
          # `console` — the hero happy-path threads through nearly the whole console (auth → org →
          # connectors → canvas → evidence → clusters), so the filter is DELIBERATELY broad: any
          # console or shared-UI change can break it. The Evidence break proves narrow is a trap —
          # a page nobody thought of as "hero-related" broke the sellable flow. Better to run the
          # hero on a console PR that turns out not to touch it than to miss the one that does.
          if echo "$changed" | grep -qE '^(apps/console/|packages/@repo/)'; then
            echo "console=true" >> "$GITHUB_OUTPUT"
          else
            echo "console=false" >> "$GITHUB_OUTPUT"
          fi
          # `docs` — the Vale prose lint. Gate on the whole docs app so a change to the
          # .vale.ini / Alethia style / vocab re-runs the lint too, not just content edits.
          if echo "$changed" | grep -qE '^apps/docs/'; then
            echo "docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs=false" >> "$GITHUB_OUTPUT"
          fi

  typescript:
    name: TypeScript (lint · types · test · docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Persist Turbo's local cache across runs. Before this, only the pnpm store was cached, so every run
      # re-ran check-types/lint/test/build for EVERY package cold. Keyed per-sha with an os restore fallback,
      # so a PR restores the previous run's cache and Turbo only re-executes the packages that actually
      # changed (it replays cached logs for the rest). This is the single biggest CI-time win.
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      # Turbo fans these out across EVERY workspace project that defines the script
      # (console, marketing, docs, blog, @alethia/ee, @repo/{ui,brand,plan-catalog}),
      # so new apps/packages are covered automatically — no hardcoded list to drift.
      - name: Type-check + lint (all workspace projects)
        run: pnpm exec turbo run check-types lint
      - name: Unit tests
        run: pnpm exec turbo run test
      # Coverage is merged into the self-hosted README badge by the `coverage-badge` job
      # (push-to-main); no third-party service. See scripts/coverage-badge.mjs + TESTING.md.
      # Build smoke for the split-affected apps — catches transpilePackages /
      # standalone breakage on PRs. Build-only placeholder env so the console's
      # strict zod config modules pass validation (mirrors apps/console/Dockerfile;
      # nothing is contacted — postgres-js + the S3 client connect lazily).
      - name: App build smoke (console · marketing · docs)
        run: pnpm exec turbo run build --filter=console --filter=marketing --filter=docs
        env:
          BETTER_AUTH_SECRET: build-time-placeholder
          BETTER_AUTH_URL: http://localhost:3000
          ALETHIA_DATABASE_URL: postgres://build:build@localhost:5432/build
          ALETHIA_APP_DATABASE_URL: postgres://build:build@localhost:5432/build
          ALETHIA_STORAGE_ENDPOINT: http://localhost:8333
          ALETHIA_STORAGE_ACCESS_KEY_ID: build
          ALETHIA_STORAGE_SECRET_ACCESS_KEY: build

  integration:
    name: Integration (real Postgres + RLS)
    runs-on: ubuntu-latest
    # A throwaway Postgres mirroring the dev stack (compose uses postgres:17-alpine with the
    # same superuser/db). db:migrate then creates the least-priv `alethia_app` role + RLS, so
    # the suite exercises the real SQL query builders and the multi-tenant isolation boundary.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: alethia
          POSTGRES_PASSWORD: alethia-dev-secret
          POSTGRES_DB: alethia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alethia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Point at the CI service (the suite's setup.ts defaults to :5433 — these win).
      ALETHIA_DATABASE_URL: postgres://alethia:alethia-dev-secret@localhost:5432/alethia
      # A DISTINCT app-role URL so the RLS isolation assertion actually runs (not skipped).
      ALETHIA_APP_DATABASE_URL: postgres://alethia_app:alethia-app-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DB_PASSWORD: alethia-app-dev-secret
      # OpenFGA (started as a step below — service containers can't override the image command, and
      # OpenFGA needs `run`). Makes the community↔enterprise PDP-parity suite actually execute
      # per-commit; REQUIRE=1 turns an OpenFGA-absent skip into a hard failure so parity can't
      # silently go dark (SOC2 CC6.1).
      OPENFGA_TEST_API_URL: http://localhost:8082
      ALETHIA_PDP_PARITY_REQUIRE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # In-memory OpenFGA for the PDP-parity test (it provisions its own store/model/tuples and
      # deletes them after — no datastore migration needed). Started via docker run so we can pass
      # the `run` command; HTTP 8080 → host 8082 (what OPENFGA_TEST_API_URL points at).
      - name: Start OpenFGA (in-memory) for PDP parity
        run: |
          docker run -d --name openfga -p 8082:8080 \
            -e OPENFGA_DATASTORE_ENGINE=memory openfga/openfga:v1.8.4 run
          for i in $(seq 1 40); do
            curl -sf http://localhost:8082/healthz && { echo "openfga up"; break; }
            [ "$i" = "40" ] && { echo "::error::OpenFGA did not become healthy"; docker logs openfga; exit 1; }
            sleep 1
          done
      - name: Migrate the test database (schema + programmables/RLS + app role)
        run: pnpm -F console db:migrate
      - name: Integration tests (real SQL query builders + RLS isolation + PDP parity)
        run: pnpm -F console test:integration

  e2e-browser:
    name: E2E (browser · Playwright hero path)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    # Heavy (console build + Playwright), so it stays OFF most PRs to cut Actions minutes — but it
    # now RUNS on any PR that touches the console surface (detect-changes.console), because that is
    # the only pre-merge signal the hero path has. There is NO nightly hero run (e2e-nightly is
    # maintainer-gated real-cloud provisioning; e2e-ai-nightly drives the Elench journeys), and the
    # merge queue is off — so before this, a console change could break the sellable flow and only a
    # post-merge push would notice. That is exactly how the "Org evidence" assertion rotted for weeks.
    # Still runs on the merge queue, pushes, and manual dispatch as before.
    if: >-
      github.event_name == 'merge_group' || github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || needs.detect-changes.outputs.console == 'true'
    # Own parallel job, OFF the fast path: builds + boots the real console against a real Postgres
    # and drives the sellable happy-path in a headless browser (sign-in → org → connect-a-cloud
    # surface → design → Deploy/pending-changes → evidence/clusters). Fully hermetic: email-OTP with
    # the code scraped from the console log — no SES, no OAuth, no cloud creds. OpenFGA is left UNSET
    # so the community PostgresRbacPDP is the authz engine (no extra service). Same postgres:17 +
    # db:migrate as the Integration job above.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: alethia
          POSTGRES_PASSWORD: alethia-dev-secret
          POSTGRES_DB: alethia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alethia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Real Postgres service (superuser + least-priv app role created by db:migrate, for RLS).
      ALETHIA_DATABASE_URL: postgres://alethia:alethia-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DATABASE_URL: postgres://alethia_app:alethia-app-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DB_PASSWORD: alethia-app-dev-secret
      # Auth: a non-secret placeholder + same-origin base URL. Email-OTP only (no OAuth, no SES) →
      # the OTP is logged, which is the hermetic seam the spec reads.
      BETTER_AUTH_SECRET: e2e-browser-placeholder-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Storage placeholders (the S3 client connects lazily; the hero path uploads nothing).
      ALETHIA_STORAGE_ENDPOINT: http://localhost:8333
      ALETHIA_STORAGE_ACCESS_KEY_ID: e2e
      ALETHIA_STORAGE_SECRET_ACCESS_KEY: e2e
      # The Playwright webServer boots `next start` and tees stdout here; the OTP helper reads it.
      DEV_CONSOLE_LOG: /tmp/alethia-e2e-console.log
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Migrate the test database (schema + programmables/RLS + app role)
        run: pnpm -F console db:migrate
      - name: Build the console (production image the browser drives)
        run: pnpm -F console build
      - name: Install Playwright (Chromium + OS deps)
        run: pnpm -F console exec playwright install --with-deps chromium
      # Guard against a vacuous green: if the hero spec is ever renamed without updating the
      # project's testMatch, `playwright test --project=hero` would match 0 tests and could exit 0.
      # Fail loudly instead.
      - name: Guard — hero project must match at least one test
        run: |
          list=$(pnpm -F console exec playwright test --project=hero --list 2>&1) || { echo "$list"; exit 1; }
          echo "$list"
          echo "$list" | grep -qE "Total: [1-9][0-9]* test" || { echo "::error::--project=hero matched 0 tests (testMatch drift?)"; exit 1; }
      - name: Run the hero happy-path (Playwright boots `next start` via webServer)
        run: pnpm -F console exec playwright test --project=hero
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/console/playwright-report/
          retention-days: 7

  e2e-elench-ai:
    name: E2E (browser · Elench AI journeys · scripted model)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    # Heavy (console build + Playwright), so it stays OFF most PRs to cut Actions minutes — but it
    # now RUNS on any PR that touches the agent surface. It is the only test that drives the real
    # composer/rail/grid in a browser, and skipping it on PRs is how a broken Lexical composer
    # shipped green. Still runs on the merge queue, pushes, and manual dispatch as before.
    if: >-
      github.event_name == 'merge_group' || github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || needs.detect-changes.outputs.agent == 'true'
    # The Elench AI journeys end-to-end with a SCRIPTED model (ALETHIA_AI_MOCK=1 → the
    # MockLanguageModelV3 in lib/config/ai-mock). Only the model is deterministic: the agent
    # route, extended thinking, orchestration markers, TOOL EXECUTION (PDP-gated reads against
    # this real Postgres), metering, transcript persistence, widget auto-pin into thread_widgets,
    # artifacts and RLS all run for real. No API key, no flake, no cost. The real-model run is
    # the separate (non-gating) e2e-ai-nightly workflow.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: alethia
          POSTGRES_PASSWORD: alethia-dev-secret
          POSTGRES_DB: alethia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alethia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ALETHIA_DATABASE_URL: postgres://alethia:alethia-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DATABASE_URL: postgres://alethia_app:alethia-app-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DB_PASSWORD: alethia-app-dev-secret
      BETTER_AUTH_SECRET: not-a-secret-e2e-placeholder
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ALETHIA_STORAGE_ENDPOINT: http://localhost:8333
      ALETHIA_STORAGE_ACCESS_KEY_ID: e2e
      ALETHIA_STORAGE_SECRET_ACCESS_KEY: e2e
      DEV_CONSOLE_LOG: /tmp/alethia-e2e-console.log
      # The scripted model. NEVER set anywhere but an E2E console (unit-tested: the gate is
      # off by default and only the literal "1" engages it).
      ALETHIA_AI_MOCK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Migrate the test database (schema + programmables/RLS + app role)
        run: pnpm -F console db:migrate
      - name: Build the console (production image the browser drives)
        run: pnpm -F console build
      - name: Install Playwright (Chromium + OS deps)
        run: pnpm -F console exec playwright install --with-deps chromium
      # Guard against a vacuous green (renamed spec → testMatch drift → 0 tests → exit 0).
      - name: Guard — elench-ai project must match at least one test
        run: |
          list=$(pnpm -F console exec playwright test --project=elench-ai --list 2>&1) || { echo "$list"; exit 1; }
          echo "$list"
          echo "$list" | grep -qE "Total: [1-9][0-9]* test" || { echo "::error::--project=elench-ai matched 0 tests (testMatch drift?)"; exit 1; }
      - name: Run the Elench AI journeys (scripted model, real pipeline)
        run: pnpm -F console exec playwright test --project=elench-ai
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-elench-ai
          path: apps/console/playwright-report/
          retention-days: 7

  coverage-badge:
    name: Coverage badge (self-hosted)
    runs-on: ubuntu-latest
    # Only on push to main: regenerate coverage and commit the shields.io badge JSON the README
    # renders. No third-party service. `[skip ci]` on the commit avoids a run loop.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run unit suites (produces per-project coverage summaries)
        run: pnpm exec turbo run test
      - name: Compute merged coverage → badge JSON
        run: node scripts/coverage-badge.mjs
      - name: Commit the badge if it changed
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "Coverage badge unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges/coverage.json
            git commit -m "chore(ci): update coverage badge [skip ci]"
            git push || echo "::warning::badge push skipped (branch protection?)"
          fi

  guards:
    name: Authz / open-core guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Open-core boundary (core must not import ee/)
        run: pnpm -F console check:ee-boundary
      - name: No Supabase
        run: pnpm -F console check:no-supabase
      - name: Authz scope (PDP, not ad-hoc user_id)
        run: pnpm -F console check:authz-scope
      - name: Marketing routes ⇄ reservation ⇄ Caddy in sync
        run: pnpm -F console check:marketing-routes
      - name: Drizzle migration history is unforked (linear snapshot chain)
        run: pnpm -F console check:migrations
      - name: CLI contract fixtures are in sync with the Zod contract
        run: |
          pnpm -F console gen:cli-fixtures
          git diff --exit-code -- packages/core/api/testdata \
            || { echo "::error::CLI fixtures are stale — run 'pnpm -F console gen:cli-fixtures' and commit (the Go contract test will then name any struct field to update)."; exit 1; }
      - name: Go enum constants are in sync with the drizzle enums
        run: |
          pnpm -F console gen:go-enums
          git diff --exit-code -- packages/core/types/enums_gen.go \
            || { echo "::error::Go enum constants are stale — run 'pnpm -F console gen:go-enums' and commit. The Go build + exhaustive lint then flag any switch/map to update."; exit 1; }
      - name: Tests exercise real source (anti-vacuous-test tripwire)
        run: node scripts/check-test-imports.mjs
      - name: Go tests exercise real source (anti-vacuous-test tripwire, verify + runner)
        run: node scripts/check-go-test-imports.mjs
      - name: Connector setup artifacts in sync (infra/connector ⇄ console public)
        run: node scripts/check-connector-assets.mjs
      - name: SPDX headers are legal-form-agnostic (Alethia Labs, no OÜ/DPK)
        run: node scripts/check-license-headers.mjs
      - name: Cloud privilege (OIDC / creds) never reachable from a PR (BYOC invariant 1)
        run: node scripts/check-workflow-oidc-isolation.mjs

  go:
    name: Go (build · vet · test · lint)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [apps/cli, apps/runner, packages/core]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ${{ matrix.module }}/go.sum
      # packages/core's untagged provisioning-wiring E2E (deploy_wiring_test.go) runs a real
      # `tofu` against a provider-less module — it self-skips without tofu on PATH, which
      # would make the keystone's per-PR signal hollow. Install it so the test actually runs.
      - uses: opentofu/setup-opentofu@v1
        if: matrix.module == 'packages/core'
        with:
          tofu_version: "1.9.0"
      - name: Build · vet · test (with coverage)
        working-directory: ${{ matrix.module }}
        run: |
          go build ./...
          go vet ./...
          go test -coverprofile=cover.out ./...
      # Compile-check the docker-gated e2e_local keystone (it's excluded from the default
      # build tags, so a break in deploy_e2e_test.go would otherwise escape all of CI).
      - name: Vet e2e_local keystone (compile check)
        if: matrix.module == 'packages/core'
        working-directory: ${{ matrix.module }}
        run: go vet -tags=e2e_local ./provisioner/
      # Compile-check the T1/T2 harness (test/e2e — a SEPARATE module outside go.work, run
      # only by the merge-queue provision-e2e job / the nightly). Without this, a break in
      # controlplane.go / t1_provision_test.go would escape every per-PR check and only
      # surface in the merge queue, blocking it for everyone rather than failing the
      # offending PR (parity with the e2e_local keystone above). The untagged `go test` runs
      # the harness's PURE unit tests (argocd_assert_test.go — the ArgoCD health assertion's
      # parse/evaluate/derive negative paths; no docker/kind/postgres needed).
      - name: Vet + unit-test e2e harness (compile check + pure logic)
        if: matrix.module == 'packages/core'
        run: |
          cd test/e2e
          GOWORK=off go vet -tags=e2e_t1 ./...
          GOWORK=off go vet -tags=e2e_t2 ./...
          GOWORK=off go vet -tags=e2e_b6 ./...
          GOWORK=off go test ./...
      - name: CLI logic-scope coverage gate (≥90%)
        if: matrix.module == 'apps/cli'
        working-directory: ${{ matrix.module }}
        run: ./scripts/coverage.sh 90
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}

  provision-e2e:
    name: Provisioning E2E (T1 · real runner → kind)
    # MERGE-QUEUE ONLY. A real runner PROCESS claims a QUEUED job from a real
    # Postgres-backed control plane and drives the full RunDeployV2 spine against a
    # genuine `kind` cluster — kind boot + provider/image pulls are heavy, so this
    # keystone runs when a PR enters the merge queue, not on every push. The `e2e_t1`
    # build tag keeps it out of the fast per-PR Go suite; ALETHIA_E2E_T1_REQUIRE=1
    # turns a missing prerequisite (docker/kind/tofu) into a HARD FAIL, never a green
    # skip, so the signal can't hollow out. Extends the in-process T0 (which stays in
    # the `go` job as a compile check).
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    services:
      # Mirrors the `integration` job: a throwaway Postgres that db:migrate turns into
      # the real control-plane schema + programmables (claim_next_job / update_job_status
      # / insert_job_log) the runner's claim + callbacks + log-shipping exercise.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: alethia
          POSTGRES_PASSWORD: alethia-dev-secret
          POSTGRES_DB: alethia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alethia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ALETHIA_DATABASE_URL: postgres://alethia:alethia-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DATABASE_URL: postgres://alethia_app:alethia-app-dev-secret@localhost:5432/alethia
      ALETHIA_APP_DB_PASSWORD: alethia-app-dev-secret
      # kind is slower than the in-process T0 — give the reachability gate room.
      ALETHIA_CLUSTER_READY_TIMEOUT: 3m
      # In the merge queue a missing prerequisite is a HARD FAIL, never a green skip.
      ALETHIA_E2E_T1_REQUIRE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - uses: azure/setup-kubectl@v4
      - name: Install kind CLI (independent kubeconfig + cluster-leak cleanup)
        run: |
          go install sigs.k8s.io/kind@v0.30.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: pnpm install --frozen-lockfile
      - name: Migrate the control-plane database (schema + programmables/RLS + app role)
        run: pnpm -F console db:migrate
      # B6.1 — the gated-promotion chain is console + DB logic (no cloud, no kind), so it runs here
      # first (fast feedback) against the SAME migrated Postgres: it drives the REAL exported console
      # actions (advancePromotionOnPlan → applyPromotionApproval → finalizeDeployment +
      # finalizePromotionOnDeploy) via the tsx shim and asserts the classification gate blocks, the
      # approval clears it, the DEPLOY reaches SUCCESS through the update_job_status SSOT, and the
      # promotion finalizes. ALETHIA_E2E_B6_REQUIRE=1 makes a missing prereq a hard fail (never a skip).
      - name: B6.1 — gated dev→staging promotion (classification gate → approval → deploy → finalize)
        working-directory: test/e2e
        env:
          ALETHIA_E2E_B6_REQUIRE: "1"
        run: GOWORK=off go test -tags=e2e_b6 ./... -run TestB6GatedPromotion -count=1 -timeout 8m -v
      # 25m: the test's own ctx is 20m (deploy wait 8m + ArgoCD Healthy+Synced
      # convergence assertion 8m + build/boot headroom) plus teardown margin.
      - name: T1 — real runner claims from the control plane and provisions kind
        working-directory: test/e2e
        run: GOWORK=off go test -tags=e2e_t1 ./... -run TestT1RealRunnerKindProvisioning -count=1 -timeout 25m -v
      - name: Teardown any leaked kind clusters (safety net)
        if: always()
        run: kind delete clusters --all || true

  go-coverage-badge:
    name: Go coverage badge (self-hosted)
    runs-on: ubuntu-latest
    # Push-to-main only: aggregate the three Go modules' coverage into one badge JSON the README
    # renders, and commit it. `[skip ci]` avoids a run loop.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cover each Go module
        run: |
          for m in apps/cli apps/runner packages/core; do
            (cd "$m" && go test -coverprofile=cover.out ./...)
          done
      - name: Compute aggregate Go coverage → badge JSON
        run: node scripts/go-coverage-badge.mjs
      - name: Commit the badge if it changed
        run: |
          if git diff --quiet -- .github/badges/go-coverage.json; then
            echo "Go coverage badge unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges/go-coverage.json
            git commit -m "chore(ci): update go coverage badge [skip ci]"
            git push || echo "::warning::badge push skipped (branch protection?)"
          fi

  mutation:
    name: Mutation testing (Stryker + Gremlins)
    # The objective "are the tests real" check. Slow — runs WEEKLY + on manual dispatch only,
    # never on PRs. Report-only for now (|| true); ratchet to a hard threshold as scores climb.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: pnpm install --frozen-lockfile
      - name: TS mutation (Stryker — lib + actions)
        run: pnpm -F console mutate || true
      - name: Go mutation (Gremlins — all modules)
        run: |
          go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
          scripts/go-mutation.sh || true

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks-action@v2 requires a paid license for ORG-owned repos, so we run the
      # open-source gitleaks binary directly (MIT). Scan only the PR/push diff — the
      # .gitleaks.toml is authored for diff-only scanning so pre-existing history findings
      # don't block new PRs (see that file's header).
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan new commits for secrets
        env:
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -n "$BASE" ] && git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "scanning ${BASE}..${HEAD}"
            gitleaks git . --redact --log-opts="${BASE}..${HEAD}"
          else
            echo "base commit unavailable — scanning latest commit only"
            gitleaks git . --redact --log-opts="-1"
          fi

  docs-prose:
    name: Docs prose (Vale · Diátaxis + plain-language)
    needs: detect-changes
    # This job ALWAYS runs so it always reports its status check — that is what makes it safe to
    # mark REQUIRED (infra/github). A job whose steps all skip still reports success, so on a
    # non-docs PR / promotion / merge_group it passes green without spinning up Vale. The real work
    # is gated per-step on the `docs` filter; the final step is the explicit no-op pass.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.detect-changes.outputs.docs == 'true'
      - uses: actions/setup-node@v4
        if: needs.detect-changes.outputs.docs == 'true'
        with:
          node-version: 22
      # Vale shells out to `mdx2vast` to parse .mdx (prose only — it drops fenced code,
      # code spans, URLs, JSX/ESM); it must be on $PATH.
      - name: Install the MDX preprocessor
        if: needs.detect-changes.outputs.docs == 'true'
        run: npm i -g mdx2vast
      # Vale is a single Go binary — install the pinned release, mirroring the gitleaks job.
      - name: Install Vale
        if: needs.detect-changes.outputs.docs == 'true'
        run: |
          curl -sSfL https://github.com/errata-ai/vale/releases/download/v3.15.1/vale_3.15.1_Linux_64-bit.tar.gz \
            | sudo tar -xz -C /usr/local/bin vale
          vale --version
      # Downloads the Google style package into styles/ (gitignored); the Alethia style + vocab
      # are vendored in the repo.
      - name: Sync Vale packages
        if: needs.detect-changes.outputs.docs == 'true'
        working-directory: apps/docs
        run: vale sync
      # `vale` exits non-zero ONLY on error-level alerts (the Alethia.Terminology rule). Warnings
      # (plain-language swaps, long sentences) and suggestions print for visibility but never red
      # the build — matches the green-CI / self-merge flow.
      - name: Lint docs prose
        if: needs.detect-changes.outputs.docs == 'true'
        working-directory: apps/docs
        run: vale content
      # No apps/docs changes — nothing to lint, but the job still reports success so the required
      # check is satisfied on non-docs PRs and promotions.
      - name: No docs changes
        if: needs.detect-changes.outputs.docs != 'true'
        run: echo "No apps/docs changes in this PR — prose lint not required."
