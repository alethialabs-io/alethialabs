#
# Continuous integration — validates every PR + push to main. The CD/release/infra
# workflows are separate. (The enterprise package @alethia/ee is verified at standup,
# not here — community CI checks the open-source build.)

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript (lint · types · test · docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type-check (console + docs)
        run: |
          pnpm -F console check-types
          pnpm -F docs types:check
      - name: Lint (console + docs)
        run: |
          pnpm -F console lint
          pnpm -F docs lint
      - name: Unit tests (console)
        run: pnpm -F console test
      - name: Docs build (MDX + links)
        run: pnpm -F docs build

  guards:
    name: Authz / open-core guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Open-core boundary (core must not import ee/)
        run: pnpm -F console check:ee-boundary
      - name: No Supabase
        run: pnpm -F console check:no-supabase
      - name: Authz scope (PDP, not ad-hoc user_id)
        run: pnpm -F console check:authz-scope
      - name: CLI contract fixtures are in sync with the Zod contract
        run: |
          pnpm -F console gen:cli-fixtures
          git diff --exit-code -- packages/core/api/testdata \
            || { echo "::error::CLI fixtures are stale — run 'pnpm -F console gen:cli-fixtures' and commit (the Go contract test will then name any struct field to update)."; exit 1; }

  go:
    name: Go (build · vet · test · lint)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [apps/cli, apps/runner, packages/core]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Build · vet · test
        working-directory: ${{ matrix.module }}
        run: |
          go build ./...
          go vet ./...
          go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
