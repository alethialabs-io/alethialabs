name: Infra - Email SES

on:
  pull_request:
    paths:
      - 'infra/email-ses/**'
  push:
    branches: [main]
    paths:
      - 'infra/email-ses/**'

permissions:
  contents: read

env:
  TF_DIR: infra/email-ses
  TOFU_VERSION: "1.10.10"

  # OpenTofu variables.
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Validate (no backend, no creds)
        working-directory: ${{ env.TF_DIR }}
        # PR plans are validate-only: no backend, no cloud/state creds reach a PR
        # job (the repo is contributor-facing). Real plan+apply run on main.
        run: |
          tofu init -backend=false
          tofu validate

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # assume the deploy role via GitHub OIDC — no stored AWS keys
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      # Least-privilege deploy role from infra/email-ses/bootstrap (its ARN is a
      # non-secret Actions variable). Sets AWS_* env for the OpenTofu provider.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.SES_DEPLOYER_ROLE_ARN }}
          aws-region: eu-central-1

      - name: OpenTofu Init
        working-directory: ${{ env.TF_DIR }}
        # Backend (state store) auth is the TF_STATE_S3_* keys, independent of the
        # assumed deploy role used for the AWS provider.
        run: |
          tofu init -upgrade \
            -backend-config="bucket=terraform-state" \
            -backend-config="key=ses/terraform.tfstate" \
            -backend-config="endpoint=${{ secrets.TF_STATE_S3_ENDPOINT }}" \
            -backend-config="region=${{ secrets.TF_STATE_S3_REGION }}" \
            -backend-config="access_key=${{ secrets.TF_STATE_S3_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.TF_STATE_S3_SECRET_ACCESS_KEY }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"

      - name: OpenTofu Apply
        working-directory: ${{ env.TF_DIR }}
        run: tofu apply -auto-approve
