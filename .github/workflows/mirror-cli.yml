name: Mirror CLI

# Continuously publishes a read-only source mirror of the CLI (apps/cli + its shared packages/core)
# to the public alethialabs-io/alethia-cli repo, so the CLI's own repo is a current, browsable front
# door + focused issue target. Development happens here in the monorepo.
#
# RELEASES are cut by release-cli.yml, which builds + publishes the GitHub Release, binaries, Homebrew
# formula, Scoop manifest and packages directly on alethia-cli (its own release home). This workflow
# only keeps the SOURCE current between releases — release-cli owns the release commit + tag.
#
# The two dirs keep their monorepo-relative layout, so apps/cli/go.mod's
# `replace …/packages/core => ../../packages/core` resolves with zero file edits — the mirror is a
# pure copy, not a transform (see .github/mirror/build-stage.sh).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror-cli
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum

      - name: Mint mirror token (GitHub App)
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: alethialabs-io
          repositories: alethia-cli

      - name: Build staging tree
        run: |
          set -euo pipefail
          bash .github/mirror/build-stage.sh "$RUNNER_TEMP/mirror"
          echo "STAGE=$RUNNER_TEMP/mirror" >> "$GITHUB_ENV"

      - name: Sanity build (the mirror must compile standalone)
        run: |
          set -euo pipefail
          cd "$STAGE/apps/cli"
          go build ./...

      - name: Push to mirror
        env:
          # GitHub App token scoped to the alethia-cli mirror repo (minted above).
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/alethialabs-io/alethia-cli.git" "$RUNNER_TEMP/repo"
          cd "$RUNNER_TEMP/repo"
          # Replace the working tree with the staging snapshot (keep .git).
          find . -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +
          cp -a "$STAGE/." .
          git config user.name "alethialabs-io"
          git config user.email "contact@borislav.me"
          git add -A
          if git diff --cached --quiet; then
            echo "Mirror already up to date — nothing to push."
          else
            git commit -m "Sync from alethialabs-io/alethialabs@${GITHUB_SHA:0:12}"
            git push origin HEAD:main
          fi
