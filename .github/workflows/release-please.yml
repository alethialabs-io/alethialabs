name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger for testing the release pipeline

permissions:
  contents: write
  pull-requests: write
  packages: write
  # The reusable release-runner.yml / release-cli.yml request `id-token: write` (OIDC into the
  # AWS deploy/vault roles). A called workflow can never exceed the caller's granted permissions,
  # so omitting it here made every run fail at STARTUP (0 jobs) — grant it at the caller.
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      runner-released: ${{ steps.release.outputs['apps/runner--release_created'] }}
      runner-version: ${{ steps.release.outputs['apps/runner--version'] }}
      runner-tag: ${{ steps.release.outputs['apps/runner--tag_name'] }}
    steps:
      # Create the release PRs with a GitHub App token, NOT the default GITHUB_TOKEN. PRs opened by
      # GITHUB_TOKEN do NOT trigger other workflows, so the protect-main required checks (CI +
      # branch-flow-guard) never run on a release PR → it's permanently BLOCKED and unmergeable.
      # An App-installation token makes the PR App-authored, so those checks run (and pass — the
      # branch-flow-guard exempts release-please--* heads). Prereq: the "Alethia Labs CI" App must be
      # installed on THIS repo (alethialabs-io/alethialabs) with contents+pull-requests+issues write.
      - name: Mint release-please token (GitHub App)
        id: rp_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: alethialabs-io
          repositories: alethialabs
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.rp_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-runner:
    needs: release-please
    if: needs.release-please.outputs.runner-released == 'true'
    uses: ./.github/workflows/release-runner.yml
    with:
      version: ${{ needs.release-please.outputs.runner-version }}
    secrets: inherit

  # NOTE: the CLI release is NOT a downstream job here. release-please creates the cli-v* tag (with
  # the App token, which triggers workflows), and .github/workflows/release-cli.yml runs on that tag
  # push — so publishing survives a release-please post-step failure (e.g. commenting on a locked PR).
