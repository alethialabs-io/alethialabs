name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger for testing the release pipeline

permissions:
  contents: write
  pull-requests: write
  packages: write
  # The reusable release-runner.yml / release-cli.yml request `id-token: write` (OIDC into the
  # AWS deploy/vault roles). A called workflow can never exceed the caller's granted permissions,
  # so omitting it here made every run fail at STARTUP (0 jobs) — grant it at the caller.
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      runner-released: ${{ steps.release.outputs['apps/runner--release_created'] }}
      runner-version: ${{ steps.release.outputs['apps/runner--version'] }}
      runner-tag: ${{ steps.release.outputs['apps/runner--tag_name'] }}
      cli-released: ${{ steps.release.outputs['apps/cli--release_created'] }}
      cli-version: ${{ steps.release.outputs['apps/cli--version'] }}
      cli-tag: ${{ steps.release.outputs['apps/cli--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-runner:
    needs: release-please
    if: needs.release-please.outputs.runner-released == 'true'
    uses: ./.github/workflows/release-runner.yml
    with:
      version: ${{ needs.release-please.outputs.runner-version }}
    secrets: inherit

  release-cli:
    needs: release-please
    if: needs.release-please.outputs.cli-released == 'true'
    uses: ./.github/workflows/release-cli.yml
    with:
      version: ${{ needs.release-please.outputs.cli-version }}
      tag: ${{ needs.release-please.outputs.cli-tag }}
    secrets: inherit
