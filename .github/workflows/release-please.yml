name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      node-released: ${{ steps.release.outputs['apps/node--release_created'] }}
      node-version: ${{ steps.release.outputs['apps/node--version'] }}
      node-tag: ${{ steps.release.outputs['apps/node--tag_name'] }}
      vtx-released: ${{ steps.release.outputs['apps/vtx--release_created'] }}
      vtx-version: ${{ steps.release.outputs['apps/vtx--version'] }}
      vtx-tag: ${{ steps.release.outputs['apps/vtx--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-node:
    needs: release-please
    if: needs.release-please.outputs.node-released == 'true'
    uses: ./.github/workflows/release-node.yml
    with:
      version: ${{ needs.release-please.outputs.node-version }}
    secrets: inherit

  release-vtx:
    needs: release-please
    if: needs.release-please.outputs.vtx-released == 'true'
    uses: ./.github/workflows/release-vtx.yml
    with:
      version: ${{ needs.release-please.outputs.vtx-version }}
    secrets: inherit
