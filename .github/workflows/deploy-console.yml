name: Deploy Console

# Continuous deploy of the alethialabs.io self-host bundle to the control-plane
# VM (Hetzner or AWS — host-agnostic via DEPLOY_HOST): build the images → push
# to GHCR (public) → SSH in and `compose pull && up -d`.

on:
  push:
    branches: [main]
    paths:
      - 'apps/console/**'
      - 'apps/marketing/**'
      - 'apps/admin/**'
      - 'apps/docs/**'
      - 'apps/blog/**'
      - 'apps/runner/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - 'deploy/prod/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/alethialabs-io

jobs:
  # Native per-arch builds — NO QEMU. The control-plane box is Hetzner CX (x86) so its
  # images are linux/amd64 (built natively on ubuntu-latest); the fleet VMs are Hetzner
  # CAX (arm64) so the per-cloud runner images are linux/arm64 (built natively on the arm
  # host). `runner` runs on BOTH (co-located on the box + the fleet), so it's built once
  # per arch BY DIGEST and stitched into one multi-arch tag by `merge-runner`. Native
  # builds keep the runner's build-time `tofu init` provider/module cache on EVERY arch
  # (emulated tofu crashed `lfstack.push`, which is why the old QEMU path had to skip it).

  # amd64 box images (single-arch, tagged) — native x86.
  build-amd64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: console
            file: apps/console/Dockerfile
            target: runner
          - image: console-migrate
            file: apps/console/Dockerfile
            target: migrate
          - image: docs
            file: apps/docs/Dockerfile
            target: ""
          - image: blog
            file: apps/blog/Dockerfile
            target: ""
          # Marketing public site — hosted alethialabs.io serves this behind the tunnel.
          - image: marketing
            file: apps/marketing/Dockerfile
            target: ""
          # Admin internal staff dashboard — served behind Cloudflare Access.
          - image: admin
            file: apps/admin/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.image }} (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # arm64 fleet-only per-cloud runner images (single-arch, tagged) — native arm. Never
  # pulled by the x86 box; lean per-cloud CLI + cache.
  build-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        include:
          - image: runner-aws
            file: apps/runner/Dockerfile.aws
          - image: runner-gcp
            file: apps/runner/Dockerfile.gcp
          - image: runner-azure
            file: apps/runner/Dockerfile.azure
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.image }} (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # `runner` amd64 half — native x86, pushed BY DIGEST (no tag) for the manifest merge.
  runner-amd64:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build runner (amd64) by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runner/Dockerfile
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/runner,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=runner-amd64
          cache-to: type=gha,mode=max,scope=runner-amd64

  # `runner` arm64 half — native arm, pushed BY DIGEST.
  runner-arm64:
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build runner (arm64) by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runner/Dockerfile
          platforms: linux/arm64
          build-args: |
            VERSION=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/runner,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=runner-arm64
          cache-to: type=gha,mode=max,scope=runner-arm64

  # Stitch the two runner digests into one multi-arch tag (amd64 for the box, arm64 for the fleet).
  merge-runner:
    needs: [runner-amd64, runner-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch runner manifest
        run: |
          for tag in latest "${{ github.sha }}"; do
            docker buildx imagetools create \
              -t "${IMAGE_PREFIX}/runner:${tag}" \
              "${IMAGE_PREFIX}/runner@${{ needs.runner-amd64.outputs.digest }}" \
              "${IMAGE_PREFIX}/runner@${{ needs.runner-arm64.outputs.digest }}"
          done

  deploy:
    needs: [build-amd64, build-arm64, merge-runner]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # assume the read-only vault role via GitHub OIDC — no stored secrets
    env:
      IMAGE_TAG: ${{ github.sha }}
      ASM_SECRET_ID: alethia/prod/env
      ASM_REGION: eu-central-1
    steps:
      # Read-only OIDC role (infra/aws-oidc → alethia-deploy-reader): GetSecretValue on
      # the one secret. GitHub stores NO secrets; the box never sees AWS creds.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_READER_ROLE_ARN }}
          aws-region: ${{ env.ASM_REGION }}

      - name: Assemble .env from the vault and deploy
        run: |
          set -euo pipefail
          json="$(aws secretsmanager get-secret-value --secret-id "$ASM_SECRET_ID" --region "$ASM_REGION" --query SecretString --output text)"
          val() { printf '%s' "$json" | jq -r --arg k "$1" '.[$k] // ""'; }

          HOST="$(val DEPLOY_HOST)"
          [ -n "$HOST" ] || { echo "::error::DEPLOY_HOST not in $ASM_SECRET_ID yet — run infra-cp-hetzner (provision) first."; exit 1; }
          APP_URL="$(val PUBLIC_APP_URL)"; APP_URL="${APP_URL:-https://alethialabs.io}"
          SERVER_TYPE="$(val HCLOUD_SERVER_TYPE)"; SERVER_TYPE="${SERVER_TYPE:-cax21}"

          # SSH private key from the vault (never touches the runner env / logs).
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          val DEPLOY_SSH_PRIVATE_KEY > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Assemble .env locally, then scp it to the box. Internal service URLs
          # (Postgres/SeaweedFS) come from the compose files, not here.
          umask 077
          emit() { printf '%s=%s\n' "$1" "$(val "${2:-$1}")"; }
          {
            echo "NEXT_PUBLIC_APP_URL=$APP_URL"
            echo "BETTER_AUTH_URL=$APP_URL"
            echo "NEXT_PUBLIC_SITE_URL=$APP_URL"
            echo "NEXT_PUBLIC_LEGAL_URL=$APP_URL"
            # This IS the hosted control plane. Without it deploymentMode() defaults to "self-managed"
            # (lib/billing/config.ts), which hides the feedback widget and exposes self-managed runner /
            # fleet UI to customers. Constant here — the box is always hosted.
            echo "ALETHIA_DEPLOYMENT_MODE=hosted"
            emit BETTER_AUTH_SECRET
            emit CLI_JWT_SECRET
            emit ALETHIA_CRED_ENCRYPTION_KEY
            echo "ALETHIA_DB_USER=alethia"
            echo "ALETHIA_DB_NAME=alethia"
            emit ALETHIA_DB_PASSWORD
            emit ALETHIA_APP_DB_PASSWORD
            emit OPENFGA_DB_PASSWORD
            emit ALETHIA_STORAGE_ACCESS_KEY_ID
            emit ALETHIA_STORAGE_SECRET_ACCESS_KEY
            echo "ALETHIA_STORAGE_AUTO_CREATE_BUCKETS=true"
            emit TUNNEL_TOKEN
            # Self-hosted analytics — OpenReplay (optional OSS session replay). The console's
            # analytics layer no-ops on any empty NEXT_PUBLIC_* value.
            emit NEXT_PUBLIC_OPENREPLAY_PROJECT_KEY
            emit NEXT_PUBLIC_OPENREPLAY_INGEST
            # PostHog — the all-in-one suite (analytics + replay + web vitals). One external project key;
            # host defaults to eu.i.posthog.com. When set, the console runs PostHog (leave Umami unset).
            emit NEXT_PUBLIC_POSTHOG_KEY
            emit NEXT_PUBLIC_POSTHOG_HOST
            echo "FLEET_PROVIDER=hcloud"
            echo "HCLOUD_TOKEN=$(val HCLOUD_FLEET_TOKEN)"   # runtime fleet token (not the CP token)
            emit HCLOUD_SSH_KEYS
            echo "HCLOUD_SERVER_TYPE=$SERVER_TYPE"
            echo "FLEET_RUNNER_IMAGE_TAG=latest"
            echo "FLEET_RUNNER_SLOTS=1"
            emit ALETHIA_RUNNER_BOOTSTRAP_TOKEN
            emit ALETHIA_CRON_SECRET
            emit RELEASE_API_SECRET
            # Workload-identity OIDC issuer signing key (lib/oidc/issuer.ts) — powers keyless Azure +
            # Alibaba federation. Auto-generated by bootstrap-secrets.sh; served via /api/oidc JWKS.
            emit ALETHIA_OIDC_SIGNING_KEY
            emit GITHUB_CLIENT_ID
            emit GITHUB_CLIENT_SECRET
            emit GOOGLE_CLIENT_ID
            emit GOOGLE_CLIENT_SECRET
            # GitLab + Bitbucket go through the genericOAuth plugin; without these the
            # plugin isn't mounted and /api/auth/sign-in/oauth2 404s. Names match what
            # lib/config/auth.ts reads (GitLab = APPLICATION_ID, Bitbucket = KEY).
            emit GITLAB_APPLICATION_ID
            emit GITLAB_SECRET
            emit BITBUCKET_KEY
            emit BITBUCKET_SECRET
            # Platform cloud creds for SERVER-SIDE connection health + inventory (the console
            # assumes the customer's role / federates). Managed clouds only; token clouds
            # (Hetzner/DO/Civo) need none. Empty when unset → the connectors board shows
            # "not enabled on this instance".
            emit ALETHIA_AWS_ACCESS_KEY_ID
            emit ALETHIA_AWS_SECRET_ACCESS_KEY
            # The whole managed-cloud model hubs through the platform AWS identity. Export it under the
            # standard AWS_* names too so google-auth-library can mint the GCP Workload-Identity subject
            # token (the customer's WIF pool trusts an AWS provider; the `--aws` cred source reads these
            # env vars). Without this, GCP connections can't verify on the box (they worked in dev only
            # because the dev machine had ambient AWS creds). Same value as ALETHIA_AWS_*.
            emit AWS_ACCESS_KEY_ID ALETHIA_AWS_ACCESS_KEY_ID
            emit AWS_SECRET_ACCESS_KEY ALETHIA_AWS_SECRET_ACCESS_KEY
            echo "AWS_REGION=us-east-1"
            # Platform AWS account id (the account every managed cloud federates through). The connect
            # UI shows it in the customer setup templates. Configurable; defaults to the live account.
            AWS_ACCT="$(val ALETHIA_AWS_ACCOUNT_ID)"; AWS_ACCT="${AWS_ACCT:-270587882865}"
            echo "NEXT_PUBLIC_ALETHIA_AWS_ACCOUNT_ID=$AWS_ACCT"
            emit ALETHIA_AZURE_TENANT_ID
            emit ALETHIA_AZURE_CLIENT_ID
            emit ALETHIA_AZURE_CLIENT_SECRET
            emit ALETHIA_ALIBABA_ACCESS_KEY_ID
            emit ALETHIA_ALIBABA_ACCESS_KEY_SECRET
            # GCP needs NO separate secret — it federates through the platform AWS identity above
            # (customer WIF pool trusts AWS acct ALETHIA_AWS_ACCOUNT_ID; console mints the subject token
            # from the AWS_* creds). Availability tracks the AWS creds (cloud-connect-setup.ts).
            # NOTE: AI (AI_GATEWAY_API_KEY) is DELIBERATELY not wired on hosted — the AI tier isn't
            # monetized yet, so the agent/assistant/Ask-AI features stay off in prod ON PURPOSE. Do
            # not add the emit without the pricing decision. (lib/config/ai.ts isAiConfigured.)
            emit STRIPE_SECRET_KEY
            emit STRIPE_WEBHOOK_SECRET
            emit NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
            emit STRIPE_PRICE_TEAM
            # Metered (usage-based) prices for managed-runner minutes — without these the usage is
            # metered but never charged through Stripe (lib/billing/config.ts meterPriceIdForPlan).
            emit STRIPE_PRICE_METER_TEAM
            emit STRIPE_PRICE_METER_ENTERPRISE
            emit ALETHIA_SES_REGION
            emit ALETHIA_SES_ACCESS_KEY_ID
            emit ALETHIA_SES_SECRET_ACCESS_KEY
            # Support: staff Slack ping on a new case/reply (lib/support/slack-notify.ts). Unset → no-op.
            emit SUPPORT_SLACK_WEBHOOK_URL
            # Community card link on the support page (app/(private)/[org]/~/support). Unset → "coming soon".
            emit NEXT_PUBLIC_COMMUNITY_URL
            echo "AUTH_EMAIL_FROM=Alethia <no-reply@auth.alethialabs.io>"
            echo "EMAIL_FROM=Alethia <hello@mail.alethialabs.io>"
            echo "ALETHIA_IMAGE_TAG=$IMAGE_TAG"
          } > env.deploy

          SSHOPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          scp $SSHOPTS env.deploy "root@${HOST}:/opt/alethia/.env.new"
          rm -f env.deploy

          # On the box: checkout the built SHA, swap in .env, render s3.json from the
          # same storage creds (checkout -f resets that tracked file), compose up behind
          # the tunnel. `bash -s` gets IMAGE_TAG from the ssh env.
          ssh $SSHOPTS "root@${HOST}" "IMAGE_TAG='${IMAGE_TAG}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/alethia
          git fetch origin main
          git checkout -f "$IMAGE_TAG"
          mv -f .env.new .env
          AK="$(grep -m1 '^ALETHIA_STORAGE_ACCESS_KEY_ID=' .env | cut -d= -f2-)"
          SK="$(grep -m1 '^ALETHIA_STORAGE_SECRET_ACCESS_KEY=' .env | cut -d= -f2-)"
          cat > deploy/seaweedfs/s3.json <<JSON
          { "identities": [ { "name": "alethia", "credentials": [ { "accessKey": "${AK}", "secretKey": "${SK}" } ], "actions": ["Admin", "Read", "Write", "List", "Tagging"] } ] }
          JSON
          cf="-f docker-compose.yml -f deploy/prod/docker-compose.prod.yml -f deploy/prod/docker-compose.tunnel.yml"
          docker compose $cf pull
          docker compose $cf up -d --remove-orphans
          docker image prune -f
          REMOTE
