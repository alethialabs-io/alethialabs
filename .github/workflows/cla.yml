# Contributor License Agreement enforcement.
#
# This uses the free, self-hosted "CLA Assistant Lite" GitHub Action
# (contributor-assistant/github-action). Signatures are stored as a JSON file in
# this repo at cla/signatures/. Alternatively, you can install the hosted app at
# https://cla-assistant.io and delete this workflow.
name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'cla/signatures/v1.0.json'
          path-to-document: 'https://github.com/alethialabs-io/alethialabs/blob/main/cla/ICLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],github-actions[bot],renovate[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
