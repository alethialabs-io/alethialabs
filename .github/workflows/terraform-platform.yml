name: Terraform Platform

on:
  pull_request:
    paths:
      - 'infra/platform/**'
  push:
    branches: [main]
    paths:
      - 'infra/platform/**'

permissions:
  contents: read
  pull-requests: write

env:
  TF_DIR: infra/platform
  TF_VERSION: "1.10.3"

  # Backend (Supabase S3)
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # Terraform variables — reuse existing secret names from Vercel/.env
  TF_VAR_vertex_api_secret: ${{ secrets.RELEASE_API_SECRET }}
  TF_VAR_supabase_url: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  TF_VAR_supabase_service_role_key: ${{ secrets.SERVICE_ROLE_SECRET }}
  TF_VAR_supabase_storage_key_id: ${{ secrets.SUPABASE_STORAGE_KEY_ID }}
  TF_VAR_supabase_storage_secret_key: ${{ secrets.SUPABASE_STORAGE_SECRET_KEY }}
  TF_VAR_supabase_s3_endpoint: ${{ secrets.SUPABASE_S3_ENDPOINT }}
  TF_VAR_supabase_s3_region: ${{ secrets.SUPABASE_S3_REGION }}
  TF_VAR_infracost_api_key: ${{ secrets.INFRACOST_API_KEY }}
  TF_VAR_nodes: '{"prod-eu-west-1":{"region":"eu-west-1","vertex_url":"https://adp.prod.itgix.eu"},"beta-eu-west-1":{"region":"eu-west-1","vertex_url":"https://beta.adp.itgix.com"},"dev-eu-west-1":{"region":"eu-west-1","vertex_url":"https://summer-disconsolate-jaquelyn.ngrok-free.dev"},"dev-eu-central-1":{"region":"eu-central-1","vertex_url":"https://summer-disconsolate-jaquelyn.ngrok-free.dev"}}'

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=terraform-state" \
            -backend-config="key=platform/terraform.tfstate" \
            -backend-config="endpoint=https://egzejziajjmjmdjplmii.storage.supabase.co/storage/v1/s3" \
            -backend-config="region=eu-north-1" \
            -backend-config="access_key=${{ secrets.SUPABASE_STORAGE_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.SUPABASE_STORAGE_SECRET_KEY }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n\n... truncated ...' : plan;
            const outcome = '${{ steps.plan.outcome }}';
            const body = `### Terraform Plan \`${outcome}\`

            <details><summary>Show plan</summary>

            \`\`\`
            ${truncated}
            \`\`\`
            </details>

            *Pushed by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=terraform-state" \
            -backend-config="key=platform/terraform.tfstate" \
            -backend-config="endpoint=https://egzejziajjmjmdjplmii.storage.supabase.co/storage/v1/s3" \
            -backend-config="region=eu-north-1" \
            -backend-config="access_key=${{ secrets.SUPABASE_STORAGE_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.SUPABASE_STORAGE_SECRET_KEY }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve
