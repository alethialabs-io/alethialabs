name: Release runner

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write # assume the runner-release deploy role via GitHub OIDC — no stored AWS keys

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: alethia-runner-dev-runner
  ECS_CLUSTER: alethia-runner-dev-eu-west-1-cluster
  ECS_SERVICE: alethia-runner-dev-eu-west-1-service
  GHCR_IMAGE: ghcr.io/alethialabs-io/runner

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: meta
        run: echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Stage templates for Docker build
        run: |
          cp -r infra/templates/project apps/runner/project-templates
          cp -r infra/templates/runner apps/runner/runner-templates
          cp -r infra/templates/argocd apps/runner/argocd-templates

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Least-privilege OIDC role (infra/aws-oidc → alethia-runner-release-deployer):
      # ECR push to the runner repo + ecs:UpdateService on the one service. No keys.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.RUNNER_RELEASE_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runner/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.VERSION }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.VERSION }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish release metadata to Alethia
        env:
          # URL is a non-secret repo variable; the bearer comes from the vault (the same
          # OIDC role assumed above for ECR/ECS also has GetSecretValue).
          ALETHIA_URL: ${{ vars.PUBLIC_APP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_API_SECRET="$(aws secretsmanager get-secret-value --secret-id alethia/prod/env --region eu-central-1 --query SecretString --output text | jq -r '.RELEASE_API_SECRET // ""')"
          echo "::add-mask::$RELEASE_API_SECRET"
          NOTES=$(gh release view "runner-v${{ steps.meta.outputs.VERSION }}" --json body -q .body 2>/dev/null || echo "")
          curl -sf -X POST "${ALETHIA_URL}/api/releases/runner" \
            -H "Authorization: Bearer ${RELEASE_API_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg v "${{ steps.meta.outputs.VERSION }}" \
              --arg n "$NOTES" \
              --arg u "https://github.com/${{ github.repository }}/releases/tag/runner-v${{ steps.meta.outputs.VERSION }}" \
              --arg s "${{ github.sha }}" \
              '{version: $v, release_notes: $n, github_release_url: $u, commit_sha: $s}')"

      - name: Force new Fargate deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "Deployment triggered for runner v${{ steps.meta.outputs.VERSION }}"
