name: Validate runner build

# Actually BUILD the runner images on a PR that touches runner sources — the check that was missing
# (deploy-console only builds them on a main push, and they can't be built on a laptop: the full image is
# 16GB+). GitHub's hosted runners have the disk/RAM, so this proves the runner-base refactor (and any future
# runner Dockerfile change) builds — installs every cloud CLI + runs `tofu init` for all templates — BEFORE
# it can reach main. Build-only: nothing is pushed.

on:
  pull_request:
    paths:
      - 'apps/runner/**'
      - 'packages/core/**'
      - 'go.work'
      # Re-run when the workflow itself changes, so an edit to the build steps self-tests.
      - '.github/workflows/validate-runner.yml'
  workflow_dispatch:

jobs:
  build-runner:
    name: Build runner images (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The full runner is 16GB+; reclaim the ~25-30GB of pre-installed toolchains we don't need so the
      # build has headroom on the standard runner.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Build runner-base
        run: |
          # The base build's `FROM golang` pulls from Docker Hub, which throttles transiently — a
          # flaky pull would otherwise red the whole job. Retry it (the later steps are FROM the
          # local runner-base, so this is the only Docker Hub-pulling step). Fails hard only if all
          # attempts fail, so a genuine build error still breaks the build.
          ok=""
          for attempt in 1 2 3; do
            if docker build -f apps/runner/Dockerfile.base \
                --build-arg VERSION="${{ github.sha }}" \
                -t runner-base:pr .; then
              ok=1; break
            fi
            echo "::warning::runner-base build attempt ${attempt} failed (likely a transient Docker Hub pull); retrying..."
            sleep $((attempt * 20))
          done
          [ -n "$ok" ] || { echo "::error::runner-base build failed after 3 attempts"; exit 1; }

      # Full multi-cloud runner (the box image) — CLI-free (cluster auth is minted in-process by the runner
      # `kube-token` exec-plugin); runs `tofu init` for all five templates, so a green build proves the base
      # + every template's provider resolution + the FROM mechanism.
      - name: Build full runner (FROM runner-base)
        run: |
          # `tofu init` for all five templates pulls providers over the network, which flakes; retry.
          ok=""
          for attempt in 1 2 3; do
            if docker build -f apps/runner/Dockerfile \
                --build-arg RUNNER_BASE=runner-base:pr \
                --build-arg VERSION="${{ github.sha }}" \
                -t runner:pr .; then
              ok=1; break
            fi
            echo "::warning::full runner build attempt ${attempt} failed (transient network/pull); retrying..."
            sleep $((attempt * 20))
          done
          [ -n "$ok" ] || { echo "::error::full runner build failed after 3 attempts"; exit 1; }
          # Free the 16GB full image before building the lean variant.
          docker image rm runner:pr

      # A per-cloud (fleet) variant — validates the lean FROM-base path the fleet actually ships.
      - name: Build runner-aws (FROM runner-base)
        run: |
          ok=""
          for attempt in 1 2 3; do
            if docker build -f apps/runner/Dockerfile.aws \
                --build-arg RUNNER_BASE=runner-base:pr \
                --build-arg VERSION="${{ github.sha }}" \
                -t runner-aws:pr .; then
              ok=1; break
            fi
            echo "::warning::runner-aws build attempt ${attempt} failed (transient network/pull); retrying..."
            sleep $((attempt * 20))
          done
          [ -n "$ok" ] || { echo "::error::runner-aws build failed after 3 attempts"; exit 1; }

      # The two CLI-less lean variants — no cloud CLI to install, but a green build proves their template
      # `tofu init` resolves every provider (incl. the third-party hcloud-talos/imager + alekc/kubectl).
      - name: Build runner-alibaba (FROM runner-base)
        run: |
          ok=""
          for attempt in 1 2 3; do
            if docker build -f apps/runner/Dockerfile.alibaba \
                --build-arg RUNNER_BASE=runner-base:pr \
                --build-arg VERSION="${{ github.sha }}" \
                -t runner-alibaba:pr .; then
              ok=1; break
            fi
            echo "::warning::runner-alibaba build attempt ${attempt} failed (transient network/pull); retrying..."
            sleep $((attempt * 20))
          done
          [ -n "$ok" ] || { echo "::error::runner-alibaba build failed after 3 attempts"; exit 1; }
          docker image rm runner-alibaba:pr

      - name: Build runner-hetzner (FROM runner-base)
        run: |
          ok=""
          for attempt in 1 2 3; do
            if docker build -f apps/runner/Dockerfile.hetzner \
                --build-arg RUNNER_BASE=runner-base:pr \
                --build-arg VERSION="${{ github.sha }}" \
                -t runner-hetzner:pr .; then
              ok=1; break
            fi
            echo "::warning::runner-hetzner build attempt ${attempt} failed (transient network/pull); retrying..."
            sleep $((attempt * 20))
          done
          [ -n "$ok" ] || { echo "::error::runner-hetzner build failed after 3 attempts"; exit 1; }
          docker image rm runner-hetzner:pr

      - name: Smoke-check the toolchain in the built image
        run: |
          docker run --rm --entrypoint sh runner-aws:pr -c '
            set -e
            tofu version
            kubectl version --client 2>/dev/null || kubectl version --client=true
            helm version --short
            infracost --version
            test -x /usr/local/bin/runner && echo "runner binary present"
            # CLI-free invariant: the cloud CLIs must be ABSENT — cluster auth is minted in-process
            # by the runner kube-token exec-plugin (unit-tested in packages; exercised end-to-end by
            # the real-VM canary). Fail loudly if any CLI crept back into the image.
            for cli in aws aws-iam-authenticator gcloud gke-gcloud-auth-plugin az kubelogin; do
              if command -v "$cli" >/dev/null 2>&1; then
                echo "ERROR: $cli present in CLI-free runner image" >&2; exit 1
              fi
            done
            echo "toolchain OK (CLI-free)"
          '
