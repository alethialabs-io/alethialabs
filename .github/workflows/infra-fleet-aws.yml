name: Infra - Fleet AWS

on:
  pull_request:
    paths:
      - 'infra/fleet-aws/**'
  push:
    branches: [main]
    paths:
      - 'infra/fleet-aws/**'

permissions:
  contents: read
  pull-requests: write

env:
  TF_DIR: infra/fleet-aws
  TOFU_VERSION: "1.10.10"

  # AWS provider credentials (manages ECR / ECS / Lambda).
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # OpenTofu variables.
  TF_VAR_alethia_api_secret: ${{ secrets.RELEASE_API_SECRET }}
  TF_VAR_storage_access_key_id: ${{ secrets.ALETHIA_STORAGE_ACCESS_KEY_ID }}
  TF_VAR_storage_secret_access_key: ${{ secrets.ALETHIA_STORAGE_SECRET_ACCESS_KEY }}
  TF_VAR_storage_endpoint: ${{ secrets.ALETHIA_STORAGE_ENDPOINT }}
  TF_VAR_storage_region: ${{ secrets.ALETHIA_STORAGE_REGION }}
  TF_VAR_infracost_api_key: ${{ secrets.INFRACOST_API_KEY }}
  TF_VAR_runners: ${{ secrets.RUNNER_FLEET_NODES }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          tofu init -upgrade \
            -backend-config="bucket=terraform-state" \
            -backend-config="key=platform/terraform.tfstate" \
            -backend-config="endpoint=${{ secrets.ALETHIA_STORAGE_ENDPOINT }}" \
            -backend-config="region=${{ secrets.ALETHIA_STORAGE_REGION }}" \
            -backend-config="access_key=${{ secrets.ALETHIA_STORAGE_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.ALETHIA_STORAGE_SECRET_ACCESS_KEY }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"

      - name: OpenTofu Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: tofu plan -no-color -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n\n... truncated ...' : plan;
            const outcome = '${{ steps.plan.outcome }}';
            const body = `### OpenTofu Plan \`${outcome}\`

            <details><summary>Show plan</summary>

            \`\`\`
            ${truncated}
            \`\`\`
            </details>

            *Pushed by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          tofu init -upgrade \
            -backend-config="bucket=terraform-state" \
            -backend-config="key=platform/terraform.tfstate" \
            -backend-config="endpoint=${{ secrets.ALETHIA_STORAGE_ENDPOINT }}" \
            -backend-config="region=${{ secrets.ALETHIA_STORAGE_REGION }}" \
            -backend-config="access_key=${{ secrets.ALETHIA_STORAGE_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.ALETHIA_STORAGE_SECRET_ACCESS_KEY }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"

      - name: OpenTofu Apply
        working-directory: ${{ env.TF_DIR }}
        run: tofu apply -auto-approve
