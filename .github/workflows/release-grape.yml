name: Release Grape CLI

on:
  push:
    tags:
      - 'grape-v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/grape/go.sum

      - name: Prepare Clean Tag for GoReleaser
        id: prepare_tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          CLEAN_TAG=${TAG_NAME#grape-}
          echo "CLEAN_TAG=$CLEAN_TAG" >> $GITHUB_ENV
          # Create a local tag on HEAD so GoReleaser OSS validation passes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $CLEAN_TAG

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean -f apps/grape/.goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.CLEAN_TAG }}

