name: Deploy Fleet AWS (dev)

# Manual escape hatch for dev/hotfix deploys. For production releases,
# use conventional commits → release-please → release-runner.yml.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

permissions:
  contents: read
  packages: write
  id-token: write # assume the runner-release deploy role via GitHub OIDC — no stored AWS keys

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: alethia-runner-dev-runner
  ECS_CLUSTER: alethia-runner-dev-eu-west-1-cluster
  ECS_SERVICE: alethia-runner-dev-eu-west-1-service
  GHCR_IMAGE: ghcr.io/alethialabs-io/runner

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage templates for Docker build
        run: |
          cp -r infra/templates/project apps/runner/project-templates
          cp -r infra/templates/runner apps/runner/runner-templates
          cp -r infra/templates/argocd apps/runner/argocd-templates

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Least-privilege OIDC role (infra/aws-oidc → alethia-runner-release-deployer). No keys.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.RUNNER_RELEASE_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runner/Dockerfile
          push: true
          build-args: |
            VERSION=dev
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force new Fargate deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "Deployment triggered. Fargate will roll to the new image."
