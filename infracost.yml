version: 0.1

projects:
    # Platform infrastructure (enforced — this is what we deploy)
    - path: infra/platform
      name: infra-platform

    # Spec templates (cost visibility only — applied by nodes into user accounts)
    - path: infra/templates/project/aws
      name: spec-template-aws
    - path: infra/templates/project/gcp
      name: spec-template-gcp
    - path: infra/templates/project/azure
      name: spec-template-azure

    # Runner self-hosted template
    - path: infra/templates/runner/aws
      name: runner-template-aws

    # Seed template (embedded in core)
    - path: packages/core/assets/terraform/seed
      name: seed-template
