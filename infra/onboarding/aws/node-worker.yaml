AWSTemplateFormatVersion: '2010-09-09'
Description: 'Node Worker: Fargate Task for Infrastructure Provisioning'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Worker Configuration"
        Parameters:
          - WorkerMode
          - WorkerId
          - WorkerToken
          - VertexUrl
          - NodeVersion
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcId
          - SubnetIds
    ParameterLabels:
      WorkerMode:
        default: "Worker Mode"
      WorkerId:
        default: "Worker ID"
      WorkerToken:
        default: "Worker Token"
      VertexUrl:
        default: "Vertex URL"
      NodeVersion:
        default: "Node Image Tag"

Parameters:
  WorkerMode:
    Type: String
    Default: 'self-hosted'
    AllowedValues: ['self-hosted', 'cloud-hosted']
    Description: 'self-hosted: worker uses native AWS permissions. cloud-hosted: worker assumes roles into customer accounts.'

  WorkerId:
    Type: String
    Description: 'Worker ID from `vtx worker register`.'

  WorkerToken:
    Type: String
    NoEcho: true
    Description: 'Worker token from `vtx worker register`.'

  VertexUrl:
    Type: String
    Default: 'https://adp.prod.itgix.eu'
    Description: 'URL of the Vertex control plane.'

  NodeVersion:
    Type: String
    Default: 'latest'
    Description: 'Docker image tag for the Node worker.'

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC where the Fargate task will run.'

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'Subnets for the Fargate task (must have internet access).'

Resources:
  WorkerCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'node-worker-${AWS::StackName}'
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/node-worker-${AWS::StackName}'
      RetentionInDays: 30

  WorkerTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'node-worker-token-${AWS::StackName}'
      Description: 'Node worker authentication token'
      SecretString: !Ref WorkerToken

  WorkerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'node-worker-exec-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref WorkerTokenSecret

  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'node-worker-task-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !If
          - IsSelfHosted
          - arn:aws:iam::aws:policy/AdministratorAccess
          - !Ref AWS::NoValue
      Policies:
        - !If
          - IsCloudHosted
          - PolicyName: AssumeCustomerRoles
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: sts:AssumeRole
                  Resource: 'arn:aws:iam::*:role/VertexProvisionerRole-*'
          - !Ref AWS::NoValue

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Node worker - outbound only'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: 'Allow all outbound (HTTPS to Vertex, git, registries, AWS APIs)'

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'node-worker-${AWS::StackName}'
      Cpu: '1024'
      Memory: '4096'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt WorkerExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      ContainerDefinitions:
        - Name: node-worker
          Image: !Sub 'ghcr.io/bobikenobi12/node:${NodeVersion}'
          Command:
            - node
            - worker
            - start
          Environment:
            - Name: VTX_WORKER_MODE
              Value: !Ref WorkerMode
            - Name: VTX_WEB_ORIGIN
              Value: !Ref VertexUrl
            - Name: VTX_WORKER_ID
              Value: !Ref WorkerId
          Secrets:
            - Name: VTX_WORKER_TOKEN
              ValueFrom: !Ref WorkerTokenSecret
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: node-worker
          Essential: true

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub 'node-worker-${AWS::StackName}'
      Cluster: !Ref WorkerCluster
      TaskDefinition: !Ref WorkerTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref SecurityGroup
          Subnets: !Ref SubnetIds
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100

Conditions:
  IsSelfHosted: !Equals [!Ref WorkerMode, 'self-hosted']
  IsCloudHosted: !Equals [!Ref WorkerMode, 'cloud-hosted']

Outputs:
  ClusterArn:
    Description: 'ECS Cluster ARN'
    Value: !GetAtt WorkerCluster.Arn

  ServiceName:
    Description: 'ECS Service Name'
    Value: !GetAtt WorkerService.Name

  LogGroupName:
    Description: 'CloudWatch Log Group'
    Value: !Ref LogGroup
