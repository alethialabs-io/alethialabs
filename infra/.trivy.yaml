#
# Shared Trivy config for infra/ misconfiguration scanning (referenced by
# .github/actions/iac-checks). Trivy absorbed tfsec; `scan-type: config` runs its
# Terraform misconfiguration checks.

misconfiguration:
  # Scan OUR template code only, not the internals of downloaded third-party modules
  # (e.g. terraform-aws-modules/eks's egress-all security-group rule) — we can't fix
  # upstream, and `tofu init` (run for `tofu validate`) pulls them into .terraform/.
  terraform:
    exclude-downloaded-modules: true

# Suppressions for deliberate, reviewed design decisions live in infra/.trivyignore
# (TRIVY_IGNOREFILE) — the mechanism trivy actually honors. A `misconfiguration.exclude:`
# list here is silently ignored by trivy, so keep all accepted findings in .trivyignore.
