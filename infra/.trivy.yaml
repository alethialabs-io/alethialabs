#
# Shared Trivy config for infra/ misconfiguration scanning (referenced by
# .github/actions/iac-checks). Trivy absorbed tfsec; `scan-type: config` runs its
# Terraform misconfiguration checks.
#
# NOTE: reviewed check-ID suppressions do NOT live here — the config-file
# `misconfiguration.exclude` key is a silent no-op in current Trivy. They live in
# infra/.trivyignore (the mechanism Trivy actually honours), wired via TRIVY_IGNOREFILE.

misconfiguration:
  # Report only real failures (the suppressed IDs are in infra/.trivyignore).
  include-non-failures: false
