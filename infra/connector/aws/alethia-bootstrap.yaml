AWSTemplateFormatVersion: '2010-09-09'
Description: 'Alethia Platform: keyless cross-account IAM role, federated directly from the Alethia OIDC issuer (no access keys, no external id).'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Trust configuration"
        Parameters:
          - IssuerUrl
          - IssuerAudience
          - WorkloadSubject
      - Label:
          default: "Resource customization"
        Parameters:
          - RoleName
    ParameterLabels:
      IssuerUrl:
        default: "Alethia OIDC Issuer URL"
      IssuerAudience:
        default: "Token Audience"
      WorkloadSubject:
        default: "Workload Subject"
      RoleName:
        default: "IAM Role Name"

Parameters:
  IssuerUrl:
    Type: String
    Default: 'https://alethialabs.io/api/oidc'
    Description: 'The Alethia control-plane OIDC issuer this account will trust. Override only for a self-hosted Alethia.'

  IssuerAudience:
    Type: String
    Default: 'sts.amazonaws.com'
    Description: 'The audience the minted assertion carries (pinned in the trust policy). Do not change.'

  WorkloadSubject:
    Type: String
    Default: 'alethia-connector'
    Description: 'The fixed workload subject Alethia mints (pinned in the trust policy). Do not change.'

  RoleName:
    Type: String
    Default: 'AlethiaProvisionerRole'
    Description: 'The name of the IAM role to be created.'

Resources:
  # The Alethia issuer as an IAM OIDC identity provider. AWS validates each assertion's signature against
  # the issuer's published JWKS. The thumbprint is required by the API but is IGNORED for an endpoint
  # secured by a well-known CA (the Alethia issuer is), so this fixed value never needs maintenance — it
  # matches the current TLS chain root (GTS Root R4) purely for tidiness.
  AlethiaOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Ref IssuerUrl
      ClientIdList:
        - !Ref IssuerAudience
      ThumbprintList:
        - 932bed339aa69212c89375b79304b475490b89a0

  # A role Alethia assumes KEYLESSLY via AssumeRoleWithWebIdentity — no external id, no trust in an Alethia
  # AWS account. Only the issuer's fixed workload subject + audience may assume it; a wrong sub/aud is
  # rejected, so no other identity (not even a different Alethia token) can.
  AlethiaProvisionerRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Federated": "${ProviderArn}" },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${IssuerHost}:aud": "${IssuerAudience}",
                    "${IssuerHost}:sub": "${WorkloadSubject}"
                  }
                }
              }
            ]
          }
        - ProviderArn: !Ref AlethiaOidcProvider
          IssuerHost: !Select [1, !Split ['https://', !Ref IssuerUrl]]
      # Least-privilege provisioning policy (replaces AdministratorAccess). Scoped to exactly the
      # services Alethia's project templates create; the IAM block is action-enumerated and DENIES
      # attaching admin-grade managed policies to anything it creates (closes IAM escalation), plus
      # any organizations/account control. See infra/connector/aws/alethia-bootstrap.tf for the
      # canonical source; keep the two in sync (pnpm sync:connector-assets).
      Policies:
        - PolicyName: AlethiaProvisioner-Compute
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ComputeClusterNetworkScaling
                Effect: Allow
                Action: ['ec2:*', 'eks:*', 'autoscaling:*', 'application-autoscaling:*', 'elasticloadbalancing:*', 'events:*', 'cloudwatch:*', 'pricing:GetProducts', 'tag:GetResources', 'tag:GetTagKeys', 'tag:GetTagValues']
                Resource: '*'
        - PolicyName: AlethiaProvisioner-Data
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DataSecretsMessagingRegistry
                Effect: Allow
                Action: ['rds:*', 'elasticache:*', 'dynamodb:*', 's3:*', 'ecr:*', 'secretsmanager:*', 'kms:*', 'sqs:*', 'sns:*', 'ssm:*']
                Resource: '*'
        - PolicyName: AlethiaProvisioner-Edge
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DnsCertsWafLogs
                Effect: Allow
                Action: ['route53:*', 'route53domains:ListDomains', 'acm:*', 'wafv2:*', 'logs:*', 'firehose:*']
                Resource: '*'
        - PolicyName: AlethiaProvisioner-IAM
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: IamManageProvisionedPrincipals
                Effect: Allow
                Action:
                  - 'iam:CreateRole'
                  - 'iam:DeleteRole'
                  - 'iam:GetRole'
                  - 'iam:UpdateRole'
                  - 'iam:TagRole'
                  - 'iam:UntagRole'
                  - 'iam:UpdateAssumeRolePolicy'
                  - 'iam:PutRolePolicy'
                  - 'iam:DeleteRolePolicy'
                  - 'iam:GetRolePolicy'
                  - 'iam:AttachRolePolicy'
                  - 'iam:DetachRolePolicy'
                  - 'iam:ListRolePolicies'
                  - 'iam:ListAttachedRolePolicies'
                  - 'iam:ListRoleTags'
                  - 'iam:ListInstanceProfilesForRole'
                  - 'iam:CreatePolicy'
                  - 'iam:DeletePolicy'
                  - 'iam:GetPolicy'
                  - 'iam:CreatePolicyVersion'
                  - 'iam:DeletePolicyVersion'
                  - 'iam:GetPolicyVersion'
                  - 'iam:ListPolicyVersions'
                  - 'iam:ListPolicies'
                  - 'iam:CreateInstanceProfile'
                  - 'iam:DeleteInstanceProfile'
                  - 'iam:GetInstanceProfile'
                  - 'iam:AddRoleToInstanceProfile'
                  - 'iam:RemoveRoleFromInstanceProfile'
                  - 'iam:TagInstanceProfile'
                  - 'iam:CreateOpenIDConnectProvider'
                  - 'iam:DeleteOpenIDConnectProvider'
                  - 'iam:GetOpenIDConnectProvider'
                  - 'iam:TagOpenIDConnectProvider'
                  - 'iam:UpdateOpenIDConnectProviderThumbprint'
                  - 'iam:AddClientIDToOpenIDConnectProvider'
                  - 'iam:CreateUser'
                  - 'iam:DeleteUser'
                  - 'iam:GetUser'
                  - 'iam:TagUser'
                  - 'iam:PutUserPolicy'
                  - 'iam:DeleteUserPolicy'
                  - 'iam:GetUserPolicy'
                  - 'iam:ListUserPolicies'
                  - 'iam:AttachUserPolicy'
                  - 'iam:DetachUserPolicy'
                  - 'iam:CreateAccessKey'
                  - 'iam:DeleteAccessKey'
                  - 'iam:ListAccessKeys'
                Resource: '*'
              - Sid: PassRoleToProvisionedServices
                Effect: Allow
                Action: 'iam:PassRole'
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:PassedToService: ['eks.amazonaws.com', 'ec2.amazonaws.com', 'rds.amazonaws.com', 'monitoring.rds.amazonaws.com', 'elasticache.amazonaws.com', 'firehose.amazonaws.com', 'application-autoscaling.amazonaws.com']
              - Sid: CreateServiceLinkedRolesForProvisionedServices
                Effect: Allow
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:AWSServiceName: ['eks.amazonaws.com', 'eks-nodegroup.amazonaws.com', 'spot.amazonaws.com', 'elasticache.amazonaws.com', 'rds.amazonaws.com', 'elasticloadbalancing.amazonaws.com']
              - Sid: DenyAttachAdminGradePolicies
                Effect: Deny
                Action: ['iam:AttachRolePolicy', 'iam:AttachUserPolicy', 'iam:PutRolePolicy', 'iam:PutUserPolicy']
                Resource: '*'
                Condition:
                  ArnEquals:
                    iam:PolicyARN: ['arn:aws:iam::aws:policy/AdministratorAccess', 'arn:aws:iam::aws:policy/IAMFullAccess', 'arn:aws:iam::aws:policy/PowerUserAccess']
              - Sid: DenyOrgAndAccountControl
                Effect: Deny
                Action: ['organizations:*', 'account:*', 'iam:CreateAccountAlias', 'iam:DeleteAccountAlias']
                Resource: '*'

Outputs:
  RoleArn:
    Description: 'The ARN of the created role. Copy this back into the Alethia dashboard.'
    Value: !GetAtt AlethiaProvisionerRole.Arn
