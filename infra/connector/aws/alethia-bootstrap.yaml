AWSTemplateFormatVersion: '2010-09-09'
Description: 'Alethia Platform: keyless cross-account IAM role, federated directly from the Alethia OIDC issuer (no access keys, no external id).'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Trust configuration"
        Parameters:
          - IssuerUrl
          - IssuerAudience
          - WorkloadSubject
      - Label:
          default: "Resource customization"
        Parameters:
          - RoleName
    ParameterLabels:
      IssuerUrl:
        default: "Alethia OIDC Issuer URL"
      IssuerAudience:
        default: "Token Audience"
      WorkloadSubject:
        default: "Workload Subject"
      RoleName:
        default: "IAM Role Name"

Parameters:
  IssuerUrl:
    Type: String
    Default: 'https://alethialabs.io/api/oidc'
    Description: 'The Alethia control-plane OIDC issuer this account will trust. Override only for a self-hosted Alethia.'

  IssuerAudience:
    Type: String
    Default: 'sts.amazonaws.com'
    Description: 'The audience the minted assertion carries (pinned in the trust policy). Do not change.'

  WorkloadSubject:
    Type: String
    Default: 'alethia-connector'
    Description: 'The fixed workload subject Alethia mints (pinned in the trust policy). Do not change.'

  RoleName:
    Type: String
    Default: 'AlethiaProvisionerRole'
    Description: 'The name of the IAM role to be created.'

Resources:
  # The Alethia issuer as an IAM OIDC identity provider. AWS validates each assertion's signature against
  # the issuer's published JWKS. The thumbprint is required by the API but is IGNORED for an endpoint
  # secured by a well-known CA (the Alethia issuer is), so this fixed value never needs maintenance — it
  # matches the current TLS chain root (GTS Root R4) purely for tidiness.
  AlethiaOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Ref IssuerUrl
      ClientIdList:
        - !Ref IssuerAudience
      ThumbprintList:
        - 932bed339aa69212c89375b79304b475490b89a0

  # A role Alethia assumes KEYLESSLY via AssumeRoleWithWebIdentity — no external id, no trust in an Alethia
  # AWS account. Only the issuer's fixed workload subject + audience may assume it; a wrong sub/aud is
  # rejected, so no other identity (not even a different Alethia token) can.
  AlethiaProvisionerRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Federated": "${ProviderArn}" },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${IssuerHost}:aud": "${IssuerAudience}",
                    "${IssuerHost}:sub": "${WorkloadSubject}"
                  }
                }
              }
            ]
          }
        - ProviderArn: !Ref AlethiaOidcProvider
          IssuerHost: !Select [1, !Split ['https://', !Ref IssuerUrl]]
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

Outputs:
  RoleArn:
    Description: 'The ARN of the created role. Copy this back into the Alethia dashboard.'
    Value: !GetAtt AlethiaProvisionerRole.Arn
