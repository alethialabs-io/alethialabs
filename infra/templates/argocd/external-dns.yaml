apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: "1.15.0"
    helm:
      values: |
        fullnameOverride: external-dns
        interval: 30m
        policy: sync
        provider: aws
        registry: txt
        triggerLoopOnEvent: true
        serviceAccount:
          name: external-dns-sa
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::{{ .AWSAccountID }}:role/{{ .ClusterName }}-external-dns
        domainFilters:
          - {{ .DomainName }}
        txtOwnerId: {{ .Environment }}-{{ .Region }}-{{ .DNSZoneID }}
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
