{{- /* external-dns only renders when DNS is enabled, a domain exists, AND the cloud (or
       DNS connector) has a working external-dns backend — DNSProvider() returns "" otherwise
       and the whole app is skipped instead of deploying a broken controller. */ -}}
{{- if and .DNSEnabled .DomainName .DNSProvider }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: "1.15.0"
    helm:
      values: |
        fullnameOverride: external-dns
        interval: 30m
        policy: sync
        provider: {{ .DNSProvider }}
        registry: txt
        triggerLoopOnEvent: true
        serviceAccount:
          name: external-dns-sa
          annotations:
            {{- if eq .Provider "aws" }}
            eks.amazonaws.com/role-arn: arn:aws:iam::{{ .AWSAccountID }}:role/{{ .ClusterName }}-external-dns
            {{- else if eq .Provider "gcp" }}
            iam.gke.io/gcp-service-account: {{ .GCPExternalDNSSA }}
            {{- else if eq .Provider "azure" }}
            azure.workload.identity/client-id: {{ .AzureExternalDNSClient }}
            {{- end }}
        {{- if eq .Provider "azure" }}
        podLabels:
          azure.workload.identity/use: "true"
        {{- end }}
        domainFilters:
          - {{ .DomainName }}
        txtOwnerId: {{ .Environment }}-{{ .Region }}-{{ .DNSZoneID }}
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
{{- end }}
