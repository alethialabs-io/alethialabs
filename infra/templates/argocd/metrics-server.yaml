apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    targetRevision: "3.12.1"
    helm:
      values: |
        # Kubelets that serve SELF-SIGNED certs without IP SANs (Talos default,
        # kind, k3s, minikube) fail metrics-server's scrape TLS verification
        # ("x509: cannot validate certificate ... doesn't contain any IP SANs"),
        # so the Deployment never becomes Ready and the Application sits
        # Progressing/Degraded forever — proven empirically on kind (default
        # values: never Ready; with this flag: Ready in ~30s). `args` APPENDS to
        # the chart's defaultArgs. Tradeoff: the kubelet scrape skips cert
        # verification (upstream's documented answer for non-CA-signed kubelets);
        # the CA-signed alternative (serverTLSBootstrap + a CSR approver) is
        # per-distro work — if wired later, gate this flag off per provider.
        args:
          - --kubelet-insecure-tls
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 100m
            memory: 200Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
