apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.9.12"
    helm:
      values: |
        installCRDs: true
        serviceAccount:
          create: true
          name: external-secrets-operator-sa
        {{- if and (eq .Provider "aws") .IRSAExternalSecretsArn }}
          annotations:
            eks.amazonaws.com/role-arn: {{ .IRSAExternalSecretsArn }}
        {{- else if and (eq .Provider "gcp") .GCPExternalSecretsSA }}
          annotations:
            iam.gke.io/gcp-service-account: {{ .GCPExternalSecretsSA }}
        {{- else if and (eq .Provider "azure") .AzureExternalSecretsClient }}
          annotations:
            azure.workload.identity/client-id: {{ .AzureExternalSecretsClient }}
            azure.workload.identity/tenant-id: {{ .AzureTenantID }}
        {{- end }}
        {{- if and (eq .Provider "azure") .AzureExternalSecretsClient }}
        podLabels:
          azure.workload.identity/use: "true"
        {{- end }}
        {{- if and (eq .Provider "alibaba") .AlibabaExternalSecretsRoleArn }}
        {{- /* RRSA: the alibaba store reads a projected OIDC token (audience sts.aliyuncs.com);
               ESO does not mount one itself, so project it onto the controller pod. */}}
        extraVolumes:
          - name: oidc-token
            projected:
              sources:
                - serviceAccountToken:
                    path: oidc-token
                    expirationSeconds: 7200
                    audience: "sts.aliyuncs.com"
        extraVolumeMounts:
          - name: oidc-token
            mountPath: /var/run/secrets/tokens
        {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
{{- /* Per-cloud ClusterSecretStores. Each renders ONLY when its workload-identity fact is
       present (fail-closed, like external-dns) — without the identity the store could never
       authenticate and every ExternalSecret would sit in a permanent error state.
       Hetzner deliberately has NO cloud secret store (no cloud secret manager / IAM) —
       use the Vault connector instead. */}}
{{- if and (eq .Provider "aws") .IRSAExternalSecretsArn }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: secretstore-aws
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Region }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-operator-sa
            namespace: external-secrets-operator
{{- end }}
{{- if and (eq .Provider "gcp") .GCPExternalSecretsSA }}
---
{{- /* Pod-based Workload Identity: the SA annotation above gives the controller pod the
       GSA's identity, so gcpsm needs only the projectID (no auth block). */}}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: secretstore-gcp
spec:
  provider:
    gcpsm:
      projectID: {{ .GCPProjectID }}
{{- end }}
{{- if and (eq .Provider "azure") .AzureExternalSecretsClient .AzureKeyVaultURI }}
---
{{- /* Pod-based Workload Identity: client-id/tenant-id annotations + the
       azure.workload.identity/use pod label above; no serviceAccountRef needed. */}}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: secretstore-azure
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: {{ .AzureKeyVaultURI }}
{{- end }}
{{- if and (eq .Provider "alibaba") .AlibabaExternalSecretsRoleArn }}
---
{{- /* RRSA auth: the controller exchanges the projected OIDC token (extraVolumes above)
       for the RAM role via the cluster's RRSA OIDC provider. */}}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: secretstore-alibaba
spec:
  provider:
    alibaba:
      regionID: {{ .Region }}
      auth:
        rrsa:
          oidcProviderArn: {{ .AlibabaOIDCProviderArn }}
          oidcTokenFilePath: /var/run/secrets/tokens/oidc-token
          roleArn: {{ .AlibabaExternalSecretsRoleArn }}
          sessionName: external-secrets
{{- end }}
