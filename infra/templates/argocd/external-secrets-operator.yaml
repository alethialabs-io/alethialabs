apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.9.12"
    helm:
      values: |
        installCRDs: true
        serviceAccount:
          create: true
          name: external-secrets-operator-sa
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
{{- /* The AWS SecretsManager store must only exist on AWS clusters — unguarded it was
       applied on every cloud, where it can never authenticate. Other clouds get their
       own stores as per-cloud identity lands; the operator itself is cloud-agnostic. */}}
{{- if eq .Provider "aws" }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: secretstore-aws
  namespace: external-secrets-operator
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Region }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-operator-sa
            namespace: external-secrets-operator
{{- end }}
