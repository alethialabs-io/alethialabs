apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.9.12"
    helm:
      values: |
        installCRDs: true
        serviceAccount:
          create: true
          name: external-secrets-operator-sa
        {{- if and (eq .Provider "aws") .IRSAExternalSecretsArn }}
          annotations:
            eks.amazonaws.com/role-arn: {{ .IRSAExternalSecretsArn }}
        {{- else if and (eq .Provider "gcp") .GCPExternalSecretsSA }}
          annotations:
            iam.gke.io/gcp-service-account: {{ .GCPExternalSecretsSA }}
        {{- else if and (eq .Provider "azure") .AzureExternalSecretsClient }}
          annotations:
            azure.workload.identity/client-id: {{ .AzureExternalSecretsClient }}
            azure.workload.identity/tenant-id: {{ .AzureTenantID }}
        {{- end }}
        {{- if and (eq .Provider "azure") .AzureExternalSecretsClient }}
        podLabels:
          azure.workload.identity/use: "true"
        {{- end }}
        {{- if and (eq .Provider "alibaba") .AlibabaExternalSecretsRoleArn }}
        {{- /* RRSA: the alibaba store reads a projected OIDC token (audience sts.aliyuncs.com);
               ESO does not mount one itself, so project it onto the controller pod. */}}
        extraVolumes:
          - name: oidc-token
            projected:
              sources:
                - serviceAccountToken:
                    path: oidc-token
                    expirationSeconds: 7200
                    audience: "sts.aliyuncs.com"
        extraVolumeMounts:
          - name: oidc-token
            mountPath: /var/run/secrets/tokens
        {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
{{- /* The per-cloud ClusterSecretStores are NOT rendered here. Mixing the ClusterSecretStore CR
       into the operator's own apply file made the whole (client-side) `kubectl apply` race the
       operator's CRD + validating webhook on a fresh cluster — and could poison the file's apply so
       the operator itself never installed, deadlocking the retry (#1208). The store is now rendered
       from Go (externalSecretsStoreManifest) and applied by EnsureExternalSecretsStore AFTER this
       Application, once the operator's CRD/webhook are up. */}}
