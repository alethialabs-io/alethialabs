<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="100%" fill="none">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#52525B"/></marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8B5CF6"/></marker>
  </defs>
  <rect width="820" height="480" rx="12" fill="#18181B"/>
  <rect x="0.5" y="0.5" width="819" height="479" rx="12" fill="none" stroke="#3F3F46"/>
  <text x="410" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#FAFAFA">GitOps &amp; ArgoCD — Post-Provisioning Installation</text>

  <!-- Installation Flow (horizontal) -->
  <text x="410" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#A1A1AA">Installation Flow</text>

  <rect x="20" y="80" width="120" height="50" rx="6" fill="#27272A" stroke="#22C55E"/>
  <text x="80" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#22C55E">TF Apply</text>
  <text x="80" y="116" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">infra provisioned</text>
  <line x1="140" y1="105" x2="160" y2="105" stroke="#52525B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="168" y="80" width="120" height="50" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="228" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#FAFAFA">kubeconfig</text>
  <text x="228" y="116" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">eks/gke/aks CLI</text>
  <line x1="288" y1="105" x2="308" y2="105" stroke="#52525B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="316" y="80" width="130" height="50" rx="6" fill="#27272A" stroke="#8B5CF6"/>
  <text x="381" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#8B5CF6">Helm Install</text>
  <text x="381" y="116" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">ArgoCD chart</text>
  <line x1="446" y1="105" x2="466" y2="105" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <rect x="474" y="80" width="120" height="50" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="534" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#FAFAFA">Infra Facts</text>
  <text x="534" y="116" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">TF outputs → Helm</text>
  <line x1="594" y1="105" x2="614" y2="105" stroke="#52525B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="622" y="80" width="170" height="50" rx="6" fill="#27272A" stroke="#8B5CF6"/>
  <text x="707" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#8B5CF6">App of Apps</text>
  <text x="707" y="116" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">deploy child apps</text>

  <!-- Divider -->
  <line x1="30" y1="150" x2="790" y2="150" stroke="#3F3F46" stroke-dasharray="4 4"/>

  <!-- App of Apps detail -->
  <text x="410" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#A1A1AA">App of Apps Pattern</text>

  <!-- Parent App -->
  <rect x="290" y="192" width="240" height="50" rx="8" fill="#8B5CF610" stroke="#8B5CF6"/>
  <text x="410" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8B5CF6">Parent Application</text>
  <text x="410" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#A1A1AA">watches manifests/applications/</text>

  <!-- Fan out arrows -->
  <line x1="330" y1="242" x2="100" y2="280" stroke="#52525B" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="370" y1="242" x2="260" y2="280" stroke="#52525B" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="410" y1="242" x2="410" y2="280" stroke="#52525B" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="450" y1="242" x2="560" y2="280" stroke="#52525B" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="490" y1="242" x2="720" y2="280" stroke="#52525B" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Child apps -->
  <rect x="30" y="284" width="140" height="44" rx="6" fill="#27272A" stroke="#FF990060"/>
  <text x="100" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#FAFAFA">AWS LB Controller</text>
  <text x="100" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">ALB/NLB ingress</text>

  <rect x="188" y="284" width="140" height="44" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="258" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#FAFAFA">External DNS</text>
  <text x="258" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">auto DNS records</text>

  <rect x="346" y="284" width="140" height="44" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="416" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#FAFAFA">External Secrets</text>
  <text x="416" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">cloud → k8s secrets</text>

  <rect x="504" y="284" width="140" height="44" rx="6" fill="#27272A" stroke="#FF990060"/>
  <text x="574" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#FAFAFA">Karpenter</text>
  <text x="574" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">node provisioning</text>

  <rect x="660" y="284" width="140" height="44" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="730" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#FAFAFA">Metrics Server</text>
  <text x="730" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">HPA metrics</text>

  <!-- Infra Facts detail -->
  <line x1="30" y1="350" x2="790" y2="350" stroke="#3F3F46" stroke-dasharray="4 4"/>
  <text x="410" y="376" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#A1A1AA">Infrastructure Facts (Terraform outputs → Helm values)</text>

  <rect x="40" y="392" width="170" height="36" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="125" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#FAFAFA">cluster.endpoint</text>

  <rect x="230" y="392" width="150" height="36" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="305" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#FAFAFA">database.endpoint</text>

  <rect x="400" y="392" width="140" height="36" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="470" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#FAFAFA">cache.endpoint</text>

  <rect x="560" y="392" width="110" height="36" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="615" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#FAFAFA">dns.domain</text>

  <rect x="690" y="392" width="110" height="36" rx="6" fill="#27272A" stroke="#3F3F46"/>
  <text x="745" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#FAFAFA">oidcProviderArn</text>

  <!-- Bottom note -->
  <text x="410" y="456" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">Git push a new YAML to manifests/applications/ → ArgoCD auto-deploys. Git is the source of truth.</text>
</svg>
