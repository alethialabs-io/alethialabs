<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="100%" role="img" aria-label="Runner scaling: the in-app scaler sizes a Hetzner VM warm pool by queue depth; VMs self-register via a bootstrap token">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="400" rx="12"/>
  <rect x="0" y="0" width="840" height="400" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="399" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · MANAGED FLEET</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">In-app scaler sizes a Hetzner VM warm pool by queue depth</text>

  <rect class="d-surface" x="28" y="150" width="150" height="80" rx="8"/>
  <text class="d-label" x="103" y="184" text-anchor="middle" font-size="13" font-weight="600">Job queue</text>
  <text class="d-sub mono" x="103" y="202" text-anchor="middle" font-size="10">QUEUED depth</text>
  <text class="d-sub mono" x="103" y="216" text-anchor="middle" font-size="9">Postgres jobs</text>

  <rect class="d-emph" x="228" y="142" width="176" height="96" rx="8"/>
  <text class="d-emph-text" x="316" y="176" text-anchor="middle" font-size="13" font-weight="600">In-app scaler</text>
  <text class="d-emph-text mono" x="316" y="194" text-anchor="middle" font-size="9" opacity="0.82">lib/fleet · 60s loop</text>
  <text class="d-emph-text mono" x="316" y="209" text-anchor="middle" font-size="9" opacity="0.82">size warm pool</text>
  <text class="d-emph-text mono" x="316" y="224" text-anchor="middle" font-size="9" opacity="0.82">create|drain|destroy</text>

  <rect class="d-surface" x="454" y="150" width="164" height="80" rx="8"/>
  <text class="d-label" x="536" y="182" text-anchor="middle" font-size="13" font-weight="600">FleetProvider</text>
  <text class="d-sub mono" x="536" y="200" text-anchor="middle" font-size="10">FLEET_PROVIDER=hcloud</text>
  <text class="d-sub mono" x="536" y="214" text-anchor="middle" font-size="9">create / destroy VMs</text>

  <rect class="d-surface2" x="668" y="150" width="150" height="80" rx="8"/>
  <rect class="d-surface2" x="662" y="144" width="150" height="80" rx="8"/>
  <rect class="d-surface" x="656" y="138" width="150" height="80" rx="8"/>
  <text class="d-label" x="731" y="168" text-anchor="middle" font-size="13" font-weight="600">Hetzner VMs</text>
  <text class="d-sub mono" x="731" y="186" text-anchor="middle" font-size="10">warm pool</text>
  <text class="d-sub mono" x="731" y="200" text-anchor="middle" font-size="9">cloud-init → runner</text>
  <text class="d-sub mono" x="731" y="212" text-anchor="middle" font-size="9">image (GHCR)</text>

  <line class="d-edge" x1="178" y1="190" x2="228" y2="190" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="182" y="182" font-size="9">reads depth</text>
  <line class="d-edge" x1="404" y1="190" x2="454" y2="190" marker-end="url(#ar)"/>
  <line class="d-edge" x1="618" y1="185" x2="654" y2="182" marker-end="url(#ar)"/>

  <path class="d-edge" d="M700 218 V300 H180 V232" marker-end="url(#ar)"/>
  <rect class="d-surface" x="300" y="286" width="336" height="30" rx="6"/>
  <text class="d-sub mono" x="316" y="305" font-size="10">self-register · ALETHIA_RUNNER_BOOTSTRAP_TOKEN → claims jobs</text>

  <text class="d-sub mono" x="28" y="352" font-size="9">actions recorded to fleet_actions ledger (create | drain | destroy | noop) · retired: AWS ECS Fargate + Lambda + EventBridge</text>

  <text class="d-sub mono" x="812" y="388" text-anchor="end" font-size="12">[ · ]</text>
</svg>
