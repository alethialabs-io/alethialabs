<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" width="100%" role="img" aria-label="Domain model: organization owns N projects, each project owns N environments, components attach per environment">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="470" rx="12"/>
  <rect x="0" y="0" width="840" height="470" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="469" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · DOMAIN MODEL</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">Organization → projects → environments → components</text>

  <!-- Spine -->
  <rect class="d-surface" x="40" y="92" width="210" height="48" rx="8"/>
  <text class="d-label" x="145" y="115" text-anchor="middle" font-size="13" font-weight="600">Organization</text>
  <text class="d-sub mono" x="145" y="130" text-anchor="middle" font-size="9">tenancy boundary · org_id</text>

  <line class="d-edge" x1="145" y1="140" x2="145" y2="176" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="156" y="162" font-size="9">1:N</text>

  <rect class="d-surface" x="40" y="176" width="210" height="52" rx="8"/>
  <text class="d-label" x="145" y="198" text-anchor="middle" font-size="13" font-weight="600">Project</text>
  <text class="d-sub mono" x="145" y="214" text-anchor="middle" font-size="9">an app · 1 cloud identity</text>

  <!-- Cloud identity to the side -->
  <rect class="d-surface2" x="282" y="180" width="150" height="44" rx="8"/>
  <text class="d-label" x="357" y="200" text-anchor="middle" font-size="12">Cloud identity</text>
  <text class="d-sub mono" x="357" y="214" text-anchor="middle" font-size="9">keyless · per-provider</text>
  <line class="d-edge" x1="250" y1="202" x2="282" y2="202" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="258" y="194" font-size="9">N:1</text>

  <line class="d-edge" x1="145" y1="228" x2="145" y2="270" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="156" y="253" font-size="9">1:N</text>

  <!-- Environment (stacked to imply N) -->
  <rect class="d-surface2" x="52" y="282" width="210" height="52" rx="8"/>
  <rect class="d-surface2" x="46" y="276" width="210" height="52" rx="8"/>
  <rect class="d-emph" x="40" y="270" width="210" height="52" rx="8"/>
  <text class="d-emph-text" x="145" y="292" text-anchor="middle" font-size="13" font-weight="600">Environment</text>
  <text class="d-emph-text mono" x="145" y="308" text-anchor="middle" font-size="9" opacity="0.82">dev · staging · prod · N per project</text>

  <text class="d-sub mono" x="40" y="360" font-size="9">stage {development|staging|production} · lifecycle {persistent|ephemeral}</text>
  <text class="d-sub mono" x="40" y="376" font-size="9">status on project_environments · one is_default env per project</text>

  <!-- Component groups -->
  <line class="d-edge" x1="250" y1="296" x2="300" y2="296" marker-end="url(#ar)"/>

  <rect class="d-surface" x="300" y="252" width="252" height="200" rx="8"/>
  <text class="d-label" x="316" y="276" font-size="12" font-weight="600">Singletons</text>
  <text class="d-sub mono" x="316" y="290" font-size="9">unique (project_id, environment_id)</text>
  <text class="d-sub mono" x="316" y="316" font-size="11">project_network</text>
  <text class="d-sub mono" x="316" y="338" font-size="11">project_cluster</text>
  <text class="d-sub mono" x="316" y="360" font-size="11">project_dns</text>
  <text class="d-sub mono" x="316" y="382" font-size="11">observability</text>
  <text class="d-sub mono" x="316" y="404" font-size="11">repositories</text>
  <text class="d-sub mono" x="316" y="434" font-size="9">one per environment</text>

  <rect class="d-surface" x="568" y="252" width="244" height="200" rx="8"/>
  <text class="d-label" x="584" y="276" font-size="12" font-weight="600">Multi-instance</text>
  <text class="d-sub mono" x="584" y="290" font-size="9">unique (project, env, name)</text>
  <text class="d-sub mono" x="584" y="316" font-size="11">databases · caches</text>
  <text class="d-sub mono" x="584" y="338" font-size="11">queues · topics</text>
  <text class="d-sub mono" x="584" y="360" font-size="11">nosql_tables</text>
  <text class="d-sub mono" x="584" y="382" font-size="11">registries · secrets</text>
  <text class="d-sub mono" x="584" y="404" font-size="11">addons</text>
  <text class="d-sub mono" x="584" y="434" font-size="9">zero-or-many per environment</text>

  <line class="d-edge" x1="552" y1="352" x2="568" y2="352"/>

  <text class="d-sub mono" x="792" y="458" text-anchor="end" font-size="12">[ · ]</text>
</svg>
