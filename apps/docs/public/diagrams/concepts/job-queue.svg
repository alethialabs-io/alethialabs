<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="100%" role="img" aria-label="Job queue: work is queued in Postgres and claimed atomically with FOR UPDATE SKIP LOCKED so exactly one runner executes each job">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="420" rx="12"/>
  <rect x="0" y="0" width="840" height="420" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="419" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · JOB QUEUE</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">Atomic claim — exactly one runner per job</text>

  <!-- producers -->
  <rect class="d-surface" x="28" y="112" width="140" height="52" rx="8"/>
  <text class="d-label" x="98" y="138" text-anchor="middle" font-size="13" font-weight="600">Console</text>
  <text class="d-sub mono" x="98" y="154" text-anchor="middle" font-size="9">Plan / Apply / Destroy</text>
  <rect class="d-surface" x="28" y="176" width="140" height="52" rx="8"/>
  <text class="d-label" x="98" y="202" text-anchor="middle" font-size="13" font-weight="600">alethia CLI</text>
  <text class="d-sub mono" x="98" y="218" text-anchor="middle" font-size="9">project plan/apply</text>

  <!-- queue -->
  <rect class="d-emph" x="212" y="120" width="196" height="100" rx="8"/>
  <text class="d-emph-text" x="310" y="148" text-anchor="middle" font-size="13" font-weight="600">jobs (Postgres)</text>
  <text class="d-emph-text mono" x="310" y="168" text-anchor="middle" font-size="9" opacity="0.82">claim_next_job()</text>
  <text class="d-emph-text mono" x="310" y="184" text-anchor="middle" font-size="9" opacity="0.82">FOR UPDATE</text>
  <text class="d-emph-text mono" x="310" y="198" text-anchor="middle" font-size="9" opacity="0.82">SKIP LOCKED</text>
  <text class="d-emph-text mono" x="310" y="212" text-anchor="middle" font-size="9" opacity="0.7">config_snapshot frozen</text>

  <!-- runners racing -->
  <rect class="d-surface" x="452" y="112" width="160" height="52" rx="8"/>
  <text class="d-label" x="532" y="138" text-anchor="middle" font-size="13" font-weight="600">Runner A</text>
  <text class="d-sub mono" x="532" y="154" text-anchor="middle" font-size="9">locks the row → claims</text>
  <rect class="d-surface2" x="452" y="176" width="160" height="52" rx="8"/>
  <text class="d-label" x="532" y="202" text-anchor="middle" font-size="13" font-weight="600">Runner B</text>
  <text class="d-sub mono" x="532" y="218" text-anchor="middle" font-size="9">skips it → next or none</text>

  <line class="d-edge" x1="168" y1="138" x2="212" y2="150" marker-end="url(#ar)"/>
  <line class="d-edge" x1="168" y1="202" x2="212" y2="190" marker-end="url(#ar)"/>
  <line class="d-edge" x1="408" y1="150" x2="452" y2="138" marker-end="url(#ar)"/>
  <line class="d-edge" x1="408" y1="190" x2="452" y2="202" marker-end="url(#ar)"/>

  <!-- execution -->
  <rect class="d-surface" x="656" y="120" width="156" height="100" rx="8"/>
  <text class="d-label" x="734" y="146" text-anchor="middle" font-size="13" font-weight="600">Execute</text>
  <text class="d-sub mono" x="734" y="166" text-anchor="middle" font-size="9">mint cloud creds</text>
  <text class="d-sub mono" x="734" y="182" text-anchor="middle" font-size="9">run tofu · stream logs</text>
  <text class="d-sub mono" x="734" y="198" text-anchor="middle" font-size="9">PUT /status</text>
  <line class="d-edge" x1="612" y1="138" x2="656" y2="150" marker-end="url(#ar)"/>

  <!-- lifecycle -->
  <rect class="d-surface" x="28" y="288" width="784" height="90" rx="8"/>
  <text class="d-sub mono" x="44" y="312" font-size="9">JOB LIFECYCLE</text>
  <rect class="d-surface2" x="44" y="324" width="120" height="38" rx="6"/><text class="d-label" x="104" y="348" text-anchor="middle" font-size="12">QUEUED</text>
  <rect class="d-surface2" x="196" y="324" width="120" height="38" rx="6"/><text class="d-label" x="256" y="348" text-anchor="middle" font-size="12">CLAIMED</text>
  <rect class="d-surface2" x="348" y="324" width="130" height="38" rx="6"/><text class="d-label" x="413" y="348" text-anchor="middle" font-size="12">PROCESSING</text>
  <rect class="d-emph" x="510" y="324" width="120" height="38" rx="6"/><text class="d-emph-text" x="570" y="348" text-anchor="middle" font-size="12">SUCCESS</text>
  <rect class="d-surface2" x="662" y="324" width="130" height="38" rx="6"/><text class="d-label" x="727" y="348" text-anchor="middle" font-size="11">FAILED · CANCELLED</text>
  <line class="d-edge" x1="164" y1="343" x2="196" y2="343" marker-end="url(#ar)"/>
  <line class="d-edge" x1="316" y1="343" x2="348" y2="343" marker-end="url(#ar)"/>
  <line class="d-edge" x1="478" y1="343" x2="510" y2="343" marker-end="url(#ar)"/>
  <line class="d-edge" x1="630" y1="343" x2="662" y2="343" marker-end="url(#ar)"/>

  <text class="d-sub mono" x="812" y="404" text-anchor="end" font-size="12">[ · ]</text>
</svg>
