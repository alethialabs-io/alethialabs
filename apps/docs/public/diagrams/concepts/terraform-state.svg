<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="100%" role="img" aria-label="OpenTofu state: the runner uses an HTTP backend through the Console state proxy with a per-job token; state lands in S3-compatible storage keyed by project, environment and region">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="400" rx="12"/>
  <rect x="0" y="0" width="840" height="400" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="399" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · TOFU STATE</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">State flows through the Console proxy — the runner holds no storage key</text>

  <!-- Runner -->
  <rect class="d-surface" x="28" y="140" width="176" height="96" rx="8"/>
  <text class="d-label" x="116" y="170" text-anchor="middle" font-size="13" font-weight="600">Runner</text>
  <text class="d-sub mono" x="116" y="190" text-anchor="middle" font-size="10">tofu backend "http"</text>
  <text class="d-sub mono" x="116" y="208" text-anchor="middle" font-size="9">no object-storage creds</text>
  <text class="d-sub mono" x="116" y="222" text-anchor="middle" font-size="9">TF_HTTP_PASSWORD = per-job</text>

  <!-- State proxy -->
  <rect class="d-emph" x="332" y="132" width="196" height="112" rx="8"/>
  <text class="d-emph-text" x="430" y="162" text-anchor="middle" font-size="13" font-weight="600">Console state proxy</text>
  <text class="d-emph-text mono" x="430" y="184" text-anchor="middle" font-size="9" opacity="0.82">/api/jobs/{id}/state</text>
  <text class="d-emph-text mono" x="430" y="200" text-anchor="middle" font-size="9" opacity="0.82">per-job token · key-scoped</text>
  <text class="d-emph-text mono" x="430" y="216" text-anchor="middle" font-size="9" opacity="0.82">object key derived server-side</text>
  <text class="d-emph-text mono" x="430" y="232" text-anchor="middle" font-size="9" opacity="0.7">fenced locking</text>

  <!-- Storage -->
  <rect class="d-surface" x="656" y="140" width="156" height="96" rx="8"/>
  <text class="d-label" x="734" y="170" text-anchor="middle" font-size="13" font-weight="600">S3-compatible</text>
  <text class="d-sub mono" x="734" y="190" text-anchor="middle" font-size="9">SeaweedFS default</text>
  <text class="d-sub mono" x="734" y="204" text-anchor="middle" font-size="9">MinIO · S3 · R2 · Garage</text>
  <text class="d-sub mono" x="734" y="222" text-anchor="middle" font-size="9">swappable endpoint</text>

  <line class="d-edge" x1="204" y1="188" x2="332" y2="188" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="214" y="180" font-size="9">state read/write</text>
  <line class="d-edge" x1="528" y1="188" x2="656" y2="188" marker-end="url(#ar)"/>

  <!-- key layout -->
  <rect class="d-surface2" x="28" y="288" width="500" height="72" rx="8"/>
  <text class="d-sub mono" x="44" y="312" font-size="9">PER-PROJECT / ENV / REGION KEY</text>
  <text class="d-label mono" x="44" y="334" font-size="11">{project}-{environment}-{region}/tofu.tfstate</text>
  <text class="d-sub mono" x="44" y="352" font-size="9">isolates projects and environments · persisted after each resource op → resumable retries</text>

  <text class="d-sub mono" x="560" y="312" font-size="9">plan artifacts stored separately;</text>
  <text class="d-sub mono" x="560" y="328" font-size="9">config-hash validated so a stale</text>
  <text class="d-sub mono" x="560" y="344" font-size="9">plan can't be applied.</text>

  <text class="d-sub mono" x="812" y="384" text-anchor="end" font-size="12">[ · ]</text>
</svg>
