  <line x1="250" y1="150" x2="284" y2="150" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <line x1="530" y1="150" x2="564" y2="150" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

