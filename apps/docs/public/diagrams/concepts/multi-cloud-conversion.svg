<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="100%" role="img" aria-label="Multi-cloud conversion: duplicating a project onto another cloud maps regions, instances, engines and capacity, and surfaces warnings">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="400" rx="12"/>
  <rect x="0" y="0" width="840" height="400" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="399" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · CONVERSION</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">Duplicate a project onto another cloud</text>

  <!-- source -->
  <rect class="d-surface" x="28" y="130" width="160" height="96" rx="8"/>
  <text class="d-label" x="108" y="162" text-anchor="middle" font-size="13" font-weight="600">Source project</text>
  <text class="d-sub mono" x="108" y="182" text-anchor="middle" font-size="10">provider: aws</text>
  <text class="d-sub mono" x="108" y="200" text-anchor="middle" font-size="9">Duplicate &amp; Edit</text>
  <text class="d-sub mono" x="108" y="214" text-anchor="middle" font-size="9">pick new cloud identity</text>

  <!-- converter -->
  <rect class="d-emph" x="248" y="122" width="180" height="112" rx="8"/>
  <text class="d-emph-text" x="338" y="150" text-anchor="middle" font-size="13" font-weight="600">convertProjectConfig</text>
  <text class="d-emph-text mono" x="338" y="172" text-anchor="middle" font-size="9" opacity="0.82">region map</text>
  <text class="d-emph-text mono" x="338" y="188" text-anchor="middle" font-size="9" opacity="0.82">instance-type map</text>
  <text class="d-emph-text mono" x="338" y="204" text-anchor="middle" font-size="9" opacity="0.82">engine · capacity clamp</text>
  <text class="d-emph-text mono" x="338" y="220" text-anchor="middle" font-size="9" opacity="0.82">provider_config keys</text>

  <!-- target -->
  <rect class="d-surface" x="488" y="130" width="160" height="96" rx="8"/>
  <text class="d-label" x="568" y="162" text-anchor="middle" font-size="13" font-weight="600">Target project</text>
  <text class="d-sub mono" x="568" y="182" text-anchor="middle" font-size="10">provider: gcp</text>
  <text class="d-sub mono" x="568" y="200" text-anchor="middle" font-size="9">defaults applied</text>
  <text class="d-sub mono" x="568" y="214" text-anchor="middle" font-size="9">+ deploys apps (GitOps)</text>

  <!-- warnings -->
  <rect class="d-surface" x="688" y="122" width="124" height="112" rx="8"/>
  <text class="d-label" x="750" y="148" text-anchor="middle" font-size="12" font-weight="600">Warnings</text>
  <text class="d-sub mono" x="750" y="168" text-anchor="middle" font-size="9">unmapped types</text>
  <text class="d-sub mono" x="750" y="184" text-anchor="middle" font-size="9">unit changes</text>
  <text class="d-sub mono" x="750" y="200" text-anchor="middle" font-size="9">review before</text>
  <text class="d-sub mono" x="750" y="214" text-anchor="middle" font-size="9">submit</text>

  <line class="d-edge" x1="188" y1="178" x2="248" y2="178" marker-end="url(#ar)"/>
  <line class="d-edge" x1="428" y1="178" x2="488" y2="178" marker-end="url(#ar)"/>
  <path class="d-edge" d="M338 234 V266 H750 V234" marker-end="url(#ar)"/>

  <text class="d-sub mono" x="28" y="316" font-size="9">CANNOT CONVERT (cleared, reconfigure manually):</text>
  <text class="d-sub mono" x="28" y="336" font-size="10">IAM roles / service accounts · cluster admin ARNs · existing network refs · DNS hosted zones · WAF rules</text>

  <text class="d-sub mono" x="812" y="384" text-anchor="end" font-size="12">[ · ]</text>
</svg>
