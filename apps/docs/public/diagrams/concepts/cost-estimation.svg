<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="100%" role="img" aria-label="Cost estimation in two layers: a real-time cost sidebar during design and a precise Infracost breakdown after tofu plan">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="380" rx="12"/>
  <rect x="0" y="0" width="840" height="380" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="379" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · COST</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">Two layers: instant estimate, then precise Infracost</text>

  <!-- Layer 1: sidebar -->
  <rect class="d-surface" x="28" y="96" width="180" height="70" rx="8"/>
  <text class="d-label" x="118" y="124" text-anchor="middle" font-size="13" font-weight="600">Design form</text>
  <text class="d-sub mono" x="118" y="142" text-anchor="middle" font-size="9">edits capabilities</text>
  <text class="d-sub mono" x="118" y="154" text-anchor="middle" font-size="9">region selected</text>

  <rect class="d-emph" x="256" y="92" width="196" height="78" rx="8"/>
  <text class="d-emph-text" x="354" y="120" text-anchor="middle" font-size="13" font-weight="600">Cost sidebar</text>
  <text class="d-emph-text mono" x="354" y="138" text-anchor="middle" font-size="9" opacity="0.82">real-time · simple formulas</text>
  <text class="d-emph-text mono" x="354" y="152" text-anchor="middle" font-size="9" opacity="0.82">AWS Pricing API · 24h cache</text>
  <text class="d-emph-text mono" x="354" y="164" text-anchor="middle" font-size="9" opacity="0.82">Σ hourly × 730</text>

  <rect class="d-surface" x="500" y="96" width="312" height="70" rx="8"/>
  <text class="d-label" x="516" y="122" font-size="12" font-weight="600">Approximate monthly $</text>
  <text class="d-sub mono" x="516" y="140" font-size="9">major cost drivers · instant feedback</text>
  <text class="d-sub mono" x="516" y="156" font-size="9">fallback rates when the API is unavailable</text>

  <line class="d-edge" x1="208" y1="131" x2="256" y2="131" marker-end="url(#ar)"/>
  <line class="d-edge" x1="452" y1="131" x2="500" y2="131" marker-end="url(#ar)"/>

  <!-- Divider -->
  <line class="d-grid" x1="28" y1="200" x2="812" y2="200"/>
  <text class="d-sub mono" x="28" y="222" font-size="9">AFTER PLAN</text>

  <!-- Layer 2: Infracost -->
  <rect class="d-surface" x="28" y="238" width="150" height="70" rx="8"/>
  <text class="d-label" x="103" y="266" text-anchor="middle" font-size="13" font-weight="600">tofu plan</text>
  <text class="d-sub mono" x="103" y="284" text-anchor="middle" font-size="9">tofu show -json</text>
  <text class="d-sub mono" x="103" y="296" text-anchor="middle" font-size="9">→ plan JSON</text>

  <rect class="d-surface" x="226" y="238" width="170" height="70" rx="8"/>
  <text class="d-label" x="311" y="266" text-anchor="middle" font-size="13" font-weight="600">Infracost</text>
  <text class="d-sub mono" x="311" y="284" text-anchor="middle" font-size="9">breakdown --path</text>
  <text class="d-sub mono" x="311" y="296" text-anchor="middle" font-size="9">per-resource costs</text>

  <rect class="d-surface" x="444" y="238" width="180" height="70" rx="8"/>
  <text class="d-label" x="534" y="266" text-anchor="middle" font-size="12" font-weight="600">execution_metadata</text>
  <text class="d-sub mono" x="534" y="284" text-anchor="middle" font-size="9">.cost_breakdown</text>

  <rect class="d-surface" x="672" y="238" width="140" height="70" rx="8"/>
  <text class="d-label" x="742" y="266" text-anchor="middle" font-size="13" font-weight="600">Plan tab</text>
  <text class="d-sub mono" x="742" y="284" text-anchor="middle" font-size="9">precise total</text>
  <text class="d-sub mono" x="742" y="296" text-anchor="middle" font-size="9">sign-off view</text>

  <line class="d-edge" x1="178" y1="273" x2="226" y2="273" marker-end="url(#ar)"/>
  <line class="d-edge" x1="396" y1="273" x2="444" y2="273" marker-end="url(#ar)"/>
  <line class="d-edge" x1="624" y1="273" x2="672" y2="273" marker-end="url(#ar)"/>

  <text class="d-sub mono" x="812" y="360" text-anchor="end" font-size="12">[ · ]</text>
</svg>
