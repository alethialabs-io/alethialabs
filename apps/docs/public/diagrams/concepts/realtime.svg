<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="100%" role="img" aria-label="Realtime: a Postgres trigger emits NOTIFY; the console holds one LISTEN per instance and fans events out to browsers over SSE">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="380" rx="12"/>
  <rect x="0" y="0" width="840" height="380" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="379" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · REALTIME</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">Postgres NOTIFY, one LISTEN per instance, fanned to SSE</text>

  <!-- Runner writes -->
  <rect class="d-surface" x="28" y="150" width="140" height="66" rx="8"/>
  <text class="d-label" x="98" y="178" text-anchor="middle" font-size="13" font-weight="600">Runner</text>
  <text class="d-sub mono" x="98" y="196" text-anchor="middle" font-size="9">POST /jobs/{id}/logs</text>
  <text class="d-sub mono" x="98" y="208" text-anchor="middle" font-size="9">flush ≤ 2s</text>

  <!-- Postgres -->
  <rect class="d-surface" x="204" y="142" width="176" height="82" rx="8"/>
  <text class="d-label" x="292" y="170" text-anchor="middle" font-size="13" font-weight="600">Postgres</text>
  <text class="d-sub mono" x="292" y="190" text-anchor="middle" font-size="9">INSERT job_logs</text>
  <text class="d-sub mono" x="292" y="204" text-anchor="middle" font-size="9">AFTER INSERT trigger</text>
  <text class="d-sub mono" x="292" y="216" text-anchor="middle" font-size="9">→ NOTIFY channel</text>

  <!-- Console LISTEN -->
  <rect class="d-emph" x="416" y="142" width="176" height="82" rx="8"/>
  <text class="d-emph-text" x="504" y="170" text-anchor="middle" font-size="13" font-weight="600">Console</text>
  <text class="d-emph-text mono" x="504" y="190" text-anchor="middle" font-size="9" opacity="0.82">1 LISTEN / instance</text>
  <text class="d-emph-text mono" x="504" y="204" text-anchor="middle" font-size="9" opacity="0.82">filter by org_id</text>
  <text class="d-emph-text mono" x="504" y="216" text-anchor="middle" font-size="9" opacity="0.82">lib/realtime</text>

  <!-- Browser -->
  <rect class="d-surface" x="628" y="150" width="184" height="66" rx="8"/>
  <text class="d-label" x="720" y="178" text-anchor="middle" font-size="13" font-weight="600">Browser</text>
  <text class="d-sub mono" x="720" y="196" text-anchor="middle" font-size="9">EventSource · SSE</text>
  <text class="d-sub mono" x="720" y="208" text-anchor="middle" font-size="9">live log viewer</text>

  <line class="d-edge" x1="168" y1="183" x2="204" y2="183" marker-end="url(#ar)"/>
  <line class="d-edge" x1="380" y1="183" x2="416" y2="183" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="384" y="175" font-size="9">NOTIFY</text>
  <line class="d-edge" x1="592" y1="183" x2="628" y2="183" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="596" y="175" font-size="9">SSE</text>

  <!-- channels -->
  <rect class="d-surface2" x="204" y="256" width="388" height="60" rx="8"/>
  <text class="d-sub mono" x="220" y="278" font-size="9">BROADCAST TABLES</text>
  <text class="d-label" x="220" y="300" font-size="12">job_logs (INSERT) · jobs (UPDATE) · runners (UPDATE) · projects (UPDATE)</text>
  <path class="d-edge" d="M292 256 V224" marker-end="url(#ar)"/>

  <text class="d-sub mono" x="628" y="280" font-size="9">end-to-end latency</text>
  <text class="d-label" x="628" y="300" font-size="12">~2–3 seconds</text>

  <text class="d-sub mono" x="812" y="360" text-anchor="end" font-size="12">[ · ]</text>
</svg>
