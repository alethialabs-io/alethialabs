<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="100%" role="img" aria-label="Three authentication paths into the Console control plane: Console web (Better Auth), CLI (device code), and Runner (token or keyless OIDC)">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="400" rx="12"/>
  <rect x="0" y="0" width="840" height="400" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="399" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · AUTHENTICATION</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">One control plane, three auth paths</text>

  <!-- Console web -->
  <rect class="d-surface" x="28" y="88" width="248" height="150" rx="8"/>
  <text class="d-label" x="44" y="114" font-size="13" font-weight="600">Console (web)</text>
  <text class="d-sub mono" x="44" y="132" font-size="10">Better Auth · Drizzle</text>
  <text class="d-sub mono" x="44" y="156" font-size="11">OAuth 2.0</text>
  <text class="d-sub mono" x="44" y="174" font-size="9">GitHub · Google · GitLab · Bitbucket</text>
  <text class="d-sub mono" x="44" y="196" font-size="11">email 6-digit OTP</text>
  <text class="d-sub mono" x="44" y="220" font-size="9">→ session JWT · HTTP-only cookie</text>

  <!-- CLI -->
  <rect class="d-surface" x="296" y="88" width="248" height="150" rx="8"/>
  <text class="d-label" x="312" y="114" font-size="13" font-weight="600">alethia (CLI)</text>
  <text class="d-sub mono" x="312" y="132" font-size="10">Device Code · RFC 8628</text>
  <text class="d-sub mono" x="312" y="156" font-size="11">alethia login → browser</text>
  <text class="d-sub mono" x="312" y="174" font-size="9">6-char verification code</text>
  <text class="d-sub mono" x="312" y="196" font-size="11">POST /api/auth/cli/exchange</text>
  <text class="d-sub mono" x="312" y="220" font-size="9">→ access 1h · refresh 90d</text>

  <!-- Runner -->
  <rect class="d-surface" x="564" y="88" width="248" height="150" rx="8"/>
  <text class="d-label" x="580" y="114" font-size="13" font-weight="600">Runner (agent)</text>
  <text class="d-sub mono" x="580" y="132" font-size="10">token · keyless OIDC</text>
  <text class="d-sub mono" x="580" y="156" font-size="11">X-Runner-ID / X-Runner-Token</text>
  <text class="d-sub mono" x="580" y="174" font-size="9">SHA-256 hash in runners.token_hash</text>
  <text class="d-sub mono" x="580" y="196" font-size="11">cloud auth = OIDC assertion</text>
  <text class="d-sub mono" x="580" y="220" font-size="9">AssumeRole · WIF · federated id</text>

  <!-- Control plane -->
  <rect class="d-emph" x="296" y="300" width="248" height="56" rx="8"/>
  <text class="d-emph-text" x="420" y="324" text-anchor="middle" font-size="13" font-weight="600">Console control plane</text>
  <text class="d-emph-text mono" x="420" y="342" text-anchor="middle" font-size="9" opacity="0.82">PDP · set app.current_org · RLS on org_id</text>

  <line class="d-edge" x1="152" y1="238" x2="360" y2="298" marker-end="url(#ar)"/>
  <line class="d-edge" x1="420" y1="238" x2="420" y2="298" marker-end="url(#ar)"/>
  <line class="d-edge" x1="688" y1="238" x2="480" y2="298" marker-end="url(#ar)"/>

  <text class="d-sub mono" x="812" y="388" text-anchor="end" font-size="12">[ · ]</text>
</svg>
