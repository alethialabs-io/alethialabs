<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="100%" role="img" aria-label="GitOps: after tofu apply the Runner installs ArgoCD, which syncs an App-of-Apps from Git into the cluster">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="420" rx="12"/>
  <rect x="0" y="0" width="840" height="420" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="419" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · GITOPS</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">ArgoCD syncs an App-of-Apps from Git</text>

  <!-- tofu apply -->
  <rect class="d-surface" x="28" y="112" width="150" height="66" rx="8"/>
  <text class="d-label" x="103" y="140" text-anchor="middle" font-size="13" font-weight="600">tofu apply</text>
  <text class="d-sub mono" x="103" y="158" text-anchor="middle" font-size="9">cluster + outputs</text>
  <text class="d-sub mono" x="103" y="170" text-anchor="middle" font-size="9">kubeconfig</text>

  <!-- ArgoCD install -->
  <rect class="d-emph" x="216" y="104" width="168" height="82" rx="8"/>
  <text class="d-emph-text" x="300" y="132" text-anchor="middle" font-size="13" font-weight="600">ArgoCD</text>
  <text class="d-emph-text mono" x="300" y="150" text-anchor="middle" font-size="9" opacity="0.82">helm upgrade --install</text>
  <text class="d-emph-text mono" x="300" y="164" text-anchor="middle" font-size="9" opacity="0.82">admin secret stays</text>
  <text class="d-emph-text mono" x="300" y="178" text-anchor="middle" font-size="9" opacity="0.82">in-cluster</text>

  <!-- infra facts -->
  <rect class="d-surface2" x="216" y="210" width="168" height="52" rx="8"/>
  <text class="d-label" x="300" y="234" text-anchor="middle" font-size="12" font-weight="600">infra facts</text>
  <text class="d-sub mono" x="300" y="250" text-anchor="middle" font-size="9">tofu outputs → Helm values</text>

  <!-- App of Apps -->
  <rect class="d-surface" x="424" y="112" width="180" height="66" rx="8"/>
  <text class="d-label" x="514" y="140" text-anchor="middle" font-size="13" font-weight="600">App of Apps</text>
  <text class="d-sub mono" x="514" y="158" text-anchor="middle" font-size="9">parent Application</text>
  <text class="d-sub mono" x="514" y="170" text-anchor="middle" font-size="9">watches a directory</text>

  <!-- child apps -->
  <rect class="d-surface" x="644" y="88" width="168" height="240" rx="8"/>
  <text class="d-label" x="660" y="112" font-size="12" font-weight="600">Child applications</text>
  <text class="d-sub mono" x="660" y="138" font-size="11">external-dns</text>
  <text class="d-sub mono" x="660" y="162" font-size="11">external-secrets</text>
  <text class="d-sub mono" x="660" y="186" font-size="11">ingress controller</text>
  <text class="d-sub mono" x="660" y="210" font-size="11">storage class</text>
  <text class="d-sub mono" x="660" y="234" font-size="11">metrics-server</text>
  <text class="d-sub mono" x="660" y="258" font-size="11">autoscaler</text>
  <text class="d-sub mono" x="660" y="290" font-size="9">per-cloud decisions:</text>
  <text class="d-sub mono" x="660" y="304" font-size="9">installed / skipped + reason</text>

  <line class="d-edge" x1="178" y1="145" x2="216" y2="145" marker-end="url(#ar)"/>
  <line class="d-edge" x1="384" y1="145" x2="424" y2="145" marker-end="url(#ar)"/>
  <line class="d-edge" x1="604" y1="145" x2="644" y2="145" marker-end="url(#ar)"/>
  <path class="d-edge" d="M300 210 V196" marker-end="url(#ar)"/>
  <path class="d-edge" d="M384 236 H514 V178" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="392" y="228" font-size="9">values</text>

  <!-- Git -->
  <rect class="d-surface" x="28" y="288" width="180" height="60" rx="8"/>
  <text class="d-label" x="118" y="314" text-anchor="middle" font-size="13" font-weight="600">Git repo</text>
  <text class="d-sub mono" x="118" y="332" text-anchor="middle" font-size="9">source of truth · manifests/</text>
  <path class="d-edge" d="M208 318 H514 V178" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="360" y="310" font-size="9">continuous sync (drift detection)</text>

  <text class="d-sub mono" x="812" y="404" text-anchor="end" font-size="12">[ · ]</text>
</svg>
