<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="100%" fill="none">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#52525B"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8B5CF6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#71717A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" rx="12" fill="#18181B"/>
  <rect x="0.5" y="0.5" width="819" height="479" rx="12" fill="none" stroke="#3F3F46"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#FAFAFA">Platform Architecture</text>

  <!-- User -->
  <rect x="30" y="190" width="80" height="80" rx="40" fill="#27272A" stroke="#3F3F46"/>
  <text x="70" y="224" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#A1A1AA">👤</text>
  <text x="70" y="248" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#FAFAFA">User</text>

  <!-- Console -->
  <rect x="160" y="120" width="160" height="72" rx="8" fill="#27272A" stroke="#3F3F46"/>
  <text x="240" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFA">Console</text>
  <text x="240" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#A1A1AA">Web Control Plane</text>
  <text x="240" y="184" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">Next.js · TypeScript</text>

  <!-- Alethia -->
  <rect x="160" y="268" width="160" height="72" rx="8" fill="#27272A" stroke="#3F3F46"/>
  <text x="240" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFA">Alethia</text>
  <text x="240" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#A1A1AA">CLI Tool</text>
  <text x="240" y="332" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">Go · Cobra · Bubble Tea</text>

  <!-- Arrows: User → Console, User → Alethia -->
  <line x1="110" y1="210" x2="155" y2="170" stroke="#52525B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="110" y1="250" x2="155" y2="290" stroke="#52525B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Job Queue -->
  <rect x="370" y="180" width="140" height="100" rx="8" fill="#27272A" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="440" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFA">Job Queue</text>
  <text x="440" y="235" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#A1A1AA">PostgreSQL</text>
  <text x="440" y="255" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">FOR UPDATE SKIP LOCKED</text>
  <text x="440" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">Atomic Claiming</text>

  <!-- Arrows: Console → Queue, Alethia → Queue -->
  <line x1="320" y1="156" x2="365" y2="210" stroke="#52525B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="304" x2="365" y2="250" stroke="#52525B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Runner -->
  <rect x="560" y="190" width="140" height="80" rx="8" fill="#27272A" stroke="#3F3F46"/>
  <text x="630" y="222" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFA">Runner</text>
  <text x="630" y="242" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#A1A1AA">Execution Agent</text>
  <text x="630" y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">Go · ECS Fargate</text>

  <!-- Arrow: Queue → Runner -->
  <line x1="510" y1="230" x2="555" y2="230" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <text x="533" y="222" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8B5CF6">claim</text>

  <!-- Cloud Providers -->
  <rect x="680" y="74" width="110" height="40" rx="6" fill="#27272A" stroke="#FF9900"/>
  <text x="735" y="98" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#FF9900">AWS</text>

  <rect x="680" y="126" width="110" height="40" rx="6" fill="#27272A" stroke="#4285F4"/>
  <text x="735" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#4285F4">GCP</text>

  <rect x="680" y="178" width="110" height="40" rx="6" fill="#27272A" stroke="#0078D4"/>
  <text x="735" y="202" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#0078D4">Azure</text>

  <!-- Group label for cloud -->
  <rect x="670" y="60" width="130" height="170" rx="8" fill="none" stroke="#3F3F46" stroke-dasharray="4 4"/>
  <text x="735" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">Cloud Providers</text>

  <!-- Arrow: Runner → Cloud group -->
  <line x1="700" y1="230" x2="700" y2="234" stroke="none"/>
  <path d="M660,210 Q670,145 675,145" stroke="#52525B" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Postgres LISTEN/NOTIFY feedback loop -->
  <rect x="370" y="370" width="140" height="56" rx="8" fill="#27272A" stroke="#8B5CF6" stroke-dasharray="4 4"/>
  <text x="440" y="394" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8B5CF6">Postgres LISTEN/NOTIFY</text>
  <text x="440" y="412" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#A1A1AA">WebSocket · postgres_changes</text>

  <!-- Arrow: Runner → Realtime (logs) -->
  <path d="M630,270 L630,398 L515,398" stroke="#8B5CF6" stroke-width="1.5" fill="none" marker-end="url(#arrow-accent)" stroke-dasharray="6 3"/>
  <text x="580" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8B5CF6" transform="rotate(-90 580 340)">Log Streaming</text>

  <!-- Arrow: Realtime → Console -->
  <path d="M370,390 L240,390 L240,196" stroke="#8B5CF6" stroke-width="1.5" fill="none" marker-end="url(#arrow-accent)" stroke-dasharray="6 3"/>

  <!-- Arrow: Realtime → Alethia -->
  <path d="M396,370 L300,340" stroke="#71717A" stroke-width="1" fill="none" marker-end="url(#arrow-muted)" stroke-dasharray="4 3"/>
  <text x="336" y="362" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#71717A">HTTP poll</text>

  <!-- Legend -->
  <line x1="30" y1="454" x2="60" y2="454" stroke="#52525B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="68" y="458" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">Data flow</text>

  <line x1="140" y1="454" x2="170" y2="454" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow-accent)"/>
  <text x="178" y="458" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#71717A">Realtime</text>
</svg>
