<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="100%" role="img" aria-label="Platform overview: Console and CLI queue jobs in Postgres; the Runner claims them, runs OpenTofu against a cloud, and streams logs back over SSE">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="400" rx="12"/>
  <rect x="0" y="0" width="840" height="400" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="399" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · PLATFORM</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">Console + CLI queue jobs; the Runner executes OpenTofu</text>

  <!-- Console -->
  <rect class="d-surface" x="28" y="110" width="150" height="58" rx="8"/>
  <text class="d-label" x="103" y="136" text-anchor="middle" font-size="13" font-weight="600">Console</text>
  <text class="d-sub mono" x="103" y="153" text-anchor="middle" font-size="9">web · Next.js · TS</text>

  <!-- CLI -->
  <rect class="d-surface" x="28" y="196" width="150" height="58" rx="8"/>
  <text class="d-label" x="103" y="222" text-anchor="middle" font-size="13" font-weight="600">alethia</text>
  <text class="d-sub mono" x="103" y="239" text-anchor="middle" font-size="9">CLI · Go · Cobra</text>

  <!-- Job queue -->
  <rect class="d-emph" x="248" y="150" width="164" height="64" rx="8"/>
  <text class="d-emph-text" x="330" y="178" text-anchor="middle" font-size="13" font-weight="600">Job queue</text>
  <text class="d-emph-text mono" x="330" y="196" text-anchor="middle" font-size="9" opacity="0.82">Postgres · atomic claim</text>

  <!-- Runner -->
  <rect class="d-surface" x="482" y="150" width="150" height="64" rx="8"/>
  <text class="d-label" x="557" y="176" text-anchor="middle" font-size="13" font-weight="600">Runner</text>
  <text class="d-sub mono" x="557" y="194" text-anchor="middle" font-size="9">agent · Go · tofu</text>

  <!-- Cloud -->
  <rect class="d-surface" x="702" y="150" width="112" height="64" rx="8"/>
  <text class="d-label" x="758" y="176" text-anchor="middle" font-size="13" font-weight="600">Cloud</text>
  <text class="d-sub mono" x="758" y="194" text-anchor="middle" font-size="9">AWS·GCP·Azure</text>
  <text class="d-sub mono" x="758" y="206" text-anchor="middle" font-size="9">Alibaba·Hetzner</text>

  <line class="d-edge" x1="178" y1="139" x2="246" y2="172" marker-end="url(#ar)"/>
  <line class="d-edge" x1="178" y1="225" x2="246" y2="192" marker-end="url(#ar)"/>
  <line class="d-edge" x1="412" y1="182" x2="482" y2="182" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="416" y="174" font-size="9">claim</text>
  <line class="d-edge" x1="632" y1="182" x2="702" y2="182" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="636" y="174" font-size="9">apply</text>

  <!-- SSE loop back -->
  <path class="d-edge" d="M557 214 V300 H103 V254" marker-end="url(#ar)"/>
  <rect class="d-surface2" x="248" y="286" width="300" height="30" rx="6"/>
  <text class="d-sub mono" x="264" y="305" font-size="10">LISTEN/NOTIFY → SSE · live logs + job status</text>

  <text class="d-sub mono" x="28" y="352" font-size="9">Runner claims a job atomically, mints short-lived cloud credentials, runs tofu, and streams results back.</text>

  <text class="d-sub mono" x="812" y="386" text-anchor="end" font-size="12">[ · ]</text>
</svg>
