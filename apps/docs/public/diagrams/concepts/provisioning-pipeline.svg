<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="100%" role="img" aria-label="Provisioning pipeline: design to tofu plan, a fail-closed verify gate, tofu apply, then ArgoCD">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="380" rx="12"/>
  <rect x="0" y="0" width="840" height="380" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="379" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · PROVISIONING</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">Plan, verify (fail-closed), apply, then GitOps</text>

  <!-- Design -->
  <rect class="d-surface" x="28" y="140" width="132" height="66" rx="8"/>
  <text class="d-label" x="94" y="168" text-anchor="middle" font-size="13" font-weight="600">Design</text>
  <text class="d-sub mono" x="94" y="186" text-anchor="middle" font-size="9">config snapshot</text>
  <text class="d-sub mono" x="94" y="198" text-anchor="middle" font-size="9">ProjectConfig → tfvars</text>

  <!-- Plan -->
  <rect class="d-surface" x="196" y="140" width="132" height="66" rx="8"/>
  <text class="d-label" x="262" y="168" text-anchor="middle" font-size="13" font-weight="600">PLAN</text>
  <text class="d-sub mono" x="262" y="186" text-anchor="middle" font-size="10">tofu plan</text>
  <text class="d-sub mono" x="262" y="198" text-anchor="middle" font-size="9">plan JSON + Infracost</text>

  <!-- Verify gate (emphasis) -->
  <rect class="d-emph" x="364" y="132" width="140" height="82" rx="8"/>
  <text class="d-emph-text" x="434" y="160" text-anchor="middle" font-size="13" font-weight="600">Verify gate</text>
  <text class="d-emph-text mono" x="434" y="178" text-anchor="middle" font-size="9" opacity="0.85">fail-closed</text>
  <text class="d-emph-text mono" x="434" y="192" text-anchor="middle" font-size="9" opacity="0.85">core/verify</text>
  <text class="d-emph-text mono" x="434" y="204" text-anchor="middle" font-size="9" opacity="0.85">signed receipt</text>

  <!-- Apply -->
  <rect class="d-surface" x="540" y="140" width="132" height="66" rx="8"/>
  <text class="d-label" x="606" y="168" text-anchor="middle" font-size="13" font-weight="600">DEPLOY</text>
  <text class="d-sub mono" x="606" y="186" text-anchor="middle" font-size="10">tofu apply</text>
  <text class="d-sub mono" x="606" y="198" text-anchor="middle" font-size="9">outputs → kubeconfig</text>

  <!-- ArgoCD -->
  <rect class="d-surface" x="708" y="140" width="108" height="66" rx="8"/>
  <text class="d-label" x="762" y="168" text-anchor="middle" font-size="13" font-weight="600">ArgoCD</text>
  <text class="d-sub mono" x="762" y="186" text-anchor="middle" font-size="9">install +</text>
  <text class="d-sub mono" x="762" y="198" text-anchor="middle" font-size="9">app manifests</text>

  <line class="d-edge" x1="160" y1="173" x2="196" y2="173" marker-end="url(#ar)"/>
  <line class="d-edge" x1="328" y1="173" x2="364" y2="173" marker-end="url(#ar)"/>
  <line class="d-edge" x1="504" y1="173" x2="540" y2="173" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="510" y="165" font-size="9">pass</text>
  <line class="d-edge" x1="672" y1="173" x2="708" y2="173" marker-end="url(#ar)"/>

  <!-- Block branch -->
  <path class="d-edge" d="M434 214 V270 H300 V282" marker-end="url(#ar)"/>
  <rect class="d-surface2" x="196" y="282" width="208" height="46" rx="8"/>
  <text class="d-label" x="300" y="304" text-anchor="middle" font-size="12" font-weight="600">Blocked before apply</text>
  <text class="d-sub mono" x="300" y="320" text-anchor="middle" font-size="9">unless authorized verify.Override</text>
  <text class="d-sub mono" x="446" y="248" font-size="9">hard failure</text>

  <text class="d-sub mono" x="540" y="300" font-size="9">report forwarded on execution_metadata["verify_result"]</text>
  <text class="d-sub mono" x="540" y="316" font-size="9">rendered in the Console Plan tab</text>

  <text class="d-sub mono" x="812" y="366" text-anchor="end" font-size="12">[ · ]</text>
</svg>
