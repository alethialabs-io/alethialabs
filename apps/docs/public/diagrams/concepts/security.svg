<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="100%" role="img" aria-label="Security: the Alethia OIDC issuer mints short-lived assertions that all four managed clouds federate against; no static keys are stored">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="420" rx="12"/>
  <rect x="0" y="0" width="840" height="420" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="419" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · SECURITY</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">Zero stored credentials — one OIDC issuer, four clouds</text>

  <!-- Issuer -->
  <rect class="d-emph" x="28" y="128" width="216" height="150" rx="8"/>
  <text class="d-emph-text" x="136" y="158" text-anchor="middle" font-size="13" font-weight="600">Alethia OIDC issuer</text>
  <text class="d-emph-text mono" x="136" y="180" text-anchor="middle" font-size="9" opacity="0.82">${APP_URL}/api/oidc</text>
  <text class="d-emph-text mono" x="136" y="200" text-anchor="middle" font-size="9" opacity="0.82">mint ≤10min RS256</text>
  <text class="d-emph-text mono" x="136" y="216" text-anchor="middle" font-size="9" opacity="0.82">sub=alethia-connector</text>
  <text class="d-emph-text mono" x="136" y="232" text-anchor="middle" font-size="9" opacity="0.82">audience-scoped</text>
  <text class="d-emph-text mono" x="136" y="256" text-anchor="middle" font-size="9" opacity="0.7">JWKS published · key rotates</text>
  <text class="d-emph-text mono" x="136" y="270" text-anchor="middle" font-size="9" opacity="0.7">zero-downtime</text>

  <!-- Clouds -->
  <rect class="d-surface" x="312" y="112" width="220" height="46" rx="8"/>
  <text class="d-label" x="332" y="140" font-size="12" font-weight="600">AWS</text>
  <text class="d-sub mono" x="516" y="140" text-anchor="end" font-size="9">AssumeRoleWithWebIdentity</text>

  <rect class="d-surface" x="312" y="168" width="220" height="46" rx="8"/>
  <text class="d-label" x="332" y="196" font-size="12" font-weight="600">GCP</text>
  <text class="d-sub mono" x="516" y="196" text-anchor="end" font-size="9">Workload Identity Federation</text>

  <rect class="d-surface" x="312" y="224" width="220" height="46" rx="8"/>
  <text class="d-label" x="332" y="252" font-size="12" font-weight="600">Azure</text>
  <text class="d-sub mono" x="516" y="252" text-anchor="end" font-size="9">Federated identity (Entra)</text>

  <rect class="d-surface" x="312" y="280" width="220" height="46" rx="8"/>
  <text class="d-label" x="332" y="308" font-size="12" font-weight="600">Alibaba</text>
  <text class="d-sub mono" x="516" y="308" text-anchor="end" font-size="9">AssumeRoleWithOIDC</text>

  <line class="d-edge" x1="244" y1="180" x2="312" y2="135" marker-end="url(#ar)"/>
  <line class="d-edge" x1="244" y1="195" x2="312" y2="191" marker-end="url(#ar)"/>
  <line class="d-edge" x1="244" y1="210" x2="312" y2="247" marker-end="url(#ar)"/>
  <line class="d-edge" x1="244" y1="225" x2="312" y2="303" marker-end="url(#ar)"/>
  <text class="d-sub mono" x="252" y="120" font-size="9">assertion</text>

  <!-- Short-lived creds -->
  <rect class="d-surface2" x="600" y="128" width="212" height="82" rx="8"/>
  <text class="d-label" x="616" y="152" font-size="12" font-weight="600">Short-lived creds</text>
  <text class="d-sub mono" x="616" y="172" font-size="9">~1h · auto-refresh via token file</text>
  <text class="d-sub mono" x="616" y="188" font-size="9">no access key · no SA JSON</text>
  <text class="d-sub mono" x="616" y="202" font-size="9">revoke = delete the role/SP</text>
  <line class="d-edge" x1="532" y1="191" x2="600" y2="175" marker-end="url(#ar)"/>

  <!-- Backstops -->
  <rect class="d-surface" x="600" y="228" width="212" height="98" rx="8"/>
  <text class="d-label" x="616" y="252" font-size="12" font-weight="600">Runtime backstops</text>
  <text class="d-sub mono" x="616" y="272" font-size="9">RLS on org_id (unbypassable)</text>
  <text class="d-sub mono" x="616" y="288" font-size="9">state proxy · per-job token</text>
  <text class="d-sub mono" x="616" y="304" font-size="9">untrusted BYO → container sandbox</text>
  <text class="d-sub mono" x="616" y="320" font-size="9">domain-allowlist egress</text>

  <text class="d-sub mono" x="28" y="360" font-size="9">only long-lived secret: the issuer signing key (ALETHIA_OIDC_SIGNING_KEY), held on the control plane, never shared.</text>

  <text class="d-sub mono" x="812" y="404" text-anchor="end" font-size="12">[ · ]</text>
</svg>
