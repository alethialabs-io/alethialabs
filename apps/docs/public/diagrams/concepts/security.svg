<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="100%" fill="none" font-family="'Geist', 'Inter', system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7" fill="#71717A"/></marker>
    <marker id="a-mint" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7" fill="#D4D4D8"/></marker>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0 L0 0 0 26" fill="none" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/></pattern>
  </defs>

  <!-- canvas (dark signature theme) -->
  <rect width="860" height="520" rx="14" fill="#0C0C0D"/>
  <rect width="860" height="520" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="859" height="519" rx="14" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <!-- title -->
  <text x="40" y="46" font-family="'Space Grotesk','Geist',system-ui,sans-serif" font-size="18" font-weight="600" fill="#FAFAFA">Zero-credential federation</text>
  <text x="40" y="68" font-size="12.5" fill="#A1A1AA">One OIDC issuer mints a short-lived assertion. Each cloud federates it for a ~1&#8202;hour credential. Nothing static is stored.</text>
  <text x="820" y="46" text-anchor="end" font-family="'Geist Mono',monospace" font-size="12" letter-spacing="1.5" fill="#71717A">[&#183;] SECURITY</text>

  <!-- ISSUER (trust root) -->
  <rect x="300" y="96" width="260" height="86" rx="10" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.17"/>
  <text x="430" y="124" text-anchor="middle" font-family="'Space Grotesk','Geist',system-ui,sans-serif" font-size="15" font-weight="600" fill="#FAFAFA">
    <tspan font-family="'Geist Mono',monospace" fill="#D4D4D8">[&#183;]</tspan><tspan dx="8">Alethia OIDC issuer</tspan>
  </text>
  <text x="430" y="145" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="10.5" fill="#A1A1AA">${APP_URL}/api/oidc</text>
  <text x="430" y="166" text-anchor="middle" font-size="11" fill="#A1A1AA">Signs a &#8804;10&#8202;min assertion &#183; sub=alethia-connector &#183; per-cloud aud</text>

  <!-- mint fan-out line -->
  <line x1="430" y1="182" x2="430" y2="212" stroke="#D4D4D8" stroke-width="1.5" marker-end="url(#a-mint)"/>
  <text x="446" y="201" font-family="'Geist Mono',monospace" font-size="10" fill="#D4D4D8">mint assertion (RS256, JWKS-verifiable)</text>
  <line x1="110" y1="214" x2="750" y2="214" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>

  <!-- AWS -->
  <g>
    <line x1="110" y1="214" x2="110" y2="238" stroke="#52525B" stroke-width="1.5"/>
    <rect x="30" y="238" width="160" height="234" rx="9" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="30" y="238" width="160" height="30" rx="9" fill="#FFFFFF" fill-opacity="0.03"/>
    <text x="110" y="258" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="11.5" letter-spacing="1" fill="#FAFAFA">AWS</text>
    <rect x="46" y="284" width="128" height="52" rx="6" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="110" y="305" text-anchor="middle" font-size="11" font-weight="500" fill="#E4E4E7">AssumeRoleWith</text>
    <text x="110" y="320" text-anchor="middle" font-size="11" font-weight="500" fill="#E4E4E7">WebIdentity</text>
    <text x="110" y="352" text-anchor="middle" font-size="10" fill="#A1A1AA">IAM OIDC provider</text>
    <text x="110" y="366" text-anchor="middle" font-size="10" fill="#71717A">no ExternalId</text>
    <line x1="110" y1="378" x2="110" y2="400" stroke="#52525B" stroke-width="1.5" marker-end="url(#a)"/>
    <rect x="46" y="404" width="128" height="30" rx="6" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="110" y="423" text-anchor="middle" font-size="10.5" fill="#D4D4D8">Temp creds &#183; ~1h</text>
    <line x1="110" y1="434" x2="110" y2="450" stroke="#52525B" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="110" y="464" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="10" fill="#A1A1AA">tofu apply</text>
  </g>

  <!-- GCP -->
  <g>
    <line x1="303" y1="214" x2="303" y2="238" stroke="#52525B" stroke-width="1.5"/>
    <rect x="223" y="238" width="160" height="234" rx="9" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="223" y="238" width="160" height="30" rx="9" fill="#FFFFFF" fill-opacity="0.03"/>
    <text x="303" y="258" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="11.5" letter-spacing="1" fill="#FAFAFA">GCP</text>
    <rect x="239" y="284" width="128" height="52" rx="6" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="303" y="305" text-anchor="middle" font-size="11" font-weight="500" fill="#E4E4E7">Workload Identity</text>
    <text x="303" y="320" text-anchor="middle" font-size="11" font-weight="500" fill="#E4E4E7">Federation</text>
    <text x="303" y="352" text-anchor="middle" font-size="10" fill="#A1A1AA">STS token exchange</text>
    <text x="303" y="366" text-anchor="middle" font-size="10" fill="#71717A">no SA key</text>
    <line x1="303" y1="378" x2="303" y2="400" stroke="#52525B" stroke-width="1.5" marker-end="url(#a)"/>
    <rect x="239" y="404" width="128" height="30" rx="6" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="303" y="423" text-anchor="middle" font-size="10.5" fill="#D4D4D8">Access token &#183; ~1h</text>
    <line x1="303" y1="434" x2="303" y2="450" stroke="#52525B" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="303" y="464" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="10" fill="#A1A1AA">tofu apply</text>
  </g>

  <!-- Azure -->
  <g>
    <line x1="557" y1="214" x2="557" y2="238" stroke="#52525B" stroke-width="1.5"/>
    <rect x="477" y="238" width="160" height="234" rx="9" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="477" y="238" width="160" height="30" rx="9" fill="#FFFFFF" fill-opacity="0.03"/>
    <text x="557" y="258" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="11.5" letter-spacing="1" fill="#FAFAFA">AZURE</text>
    <rect x="493" y="284" width="128" height="52" rx="6" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="557" y="305" text-anchor="middle" font-size="11" font-weight="500" fill="#E4E4E7">Federated Identity</text>
    <text x="557" y="320" text-anchor="middle" font-size="11" font-weight="500" fill="#E4E4E7">(Entra ID)</text>
    <text x="557" y="352" text-anchor="middle" font-size="10" fill="#A1A1AA">client assertion</text>
    <text x="557" y="366" text-anchor="middle" font-size="10" fill="#71717A">no client secret</text>
    <line x1="557" y1="378" x2="557" y2="400" stroke="#52525B" stroke-width="1.5" marker-end="url(#a)"/>
    <rect x="493" y="404" width="128" height="30" rx="6" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="557" y="423" text-anchor="middle" font-size="10.5" fill="#D4D4D8">ARM token &#183; ~1h</text>
    <line x1="557" y1="434" x2="557" y2="450" stroke="#52525B" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="557" y="464" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="10" fill="#A1A1AA">tofu apply</text>
  </g>

  <!-- Alibaba -->
  <g>
    <line x1="750" y1="214" x2="750" y2="238" stroke="#52525B" stroke-width="1.5"/>
    <rect x="670" y="238" width="160" height="234" rx="9" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="670" y="238" width="160" height="30" rx="9" fill="#FFFFFF" fill-opacity="0.03"/>
    <text x="750" y="258" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="11.5" letter-spacing="1" fill="#FAFAFA">ALIBABA</text>
    <rect x="686" y="284" width="128" height="52" rx="6" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="750" y="305" text-anchor="middle" font-size="11" font-weight="500" fill="#E4E4E7">AssumeRoleWith</text>
    <text x="750" y="320" text-anchor="middle" font-size="11" font-weight="500" fill="#E4E4E7">OIDC</text>
    <text x="750" y="352" text-anchor="middle" font-size="10" fill="#A1A1AA">RAM OIDC provider</text>
    <text x="750" y="366" text-anchor="middle" font-size="10" fill="#71717A">no AccessKey, no account</text>
    <line x1="750" y1="378" x2="750" y2="400" stroke="#52525B" stroke-width="1.5" marker-end="url(#a)"/>
    <rect x="686" y="404" width="128" height="30" rx="6" fill="#161618" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="750" y="423" text-anchor="middle" font-size="10.5" fill="#D4D4D8">STS creds &#183; ~1h</text>
    <line x1="750" y1="434" x2="750" y2="450" stroke="#52525B" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="750" y="464" text-anchor="middle" font-family="'Geist Mono',monospace" font-size="10" fill="#A1A1AA">tofu apply</text>
  </g>

  <!-- footer note -->
  <text x="40" y="500" font-size="11" fill="#71717A">Only long-lived secret: the issuer signing key (control plane, never shared). Revoke by deleting the role / WIF config / service principal in your cloud.</text>
</svg>
