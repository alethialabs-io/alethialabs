<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" width="100%" role="img" aria-label="Database schema domains in one Postgres database, with org-scoped RLS as the backstop and LISTEN/NOTIFY driving realtime">
  <style>
    .d-bg{fill:#fafafa}.d-surface{fill:#fff;stroke:#e4e4e7;stroke-width:1}.d-surface2{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1}.d-emph{fill:#18181b;stroke:#18181b}
    .d-title{fill:#18181b}.d-label{fill:#3f3f46}.d-sub{fill:#71717a}.d-emph-text{fill:#fff}
    .d-eyebrow{fill:#71717a;letter-spacing:.14em}.d-edge{stroke:#8a8a8d;stroke-width:1.5;fill:none}
    .d-edge-fill{fill:#8a8a8d}.d-grid{stroke:#f0f0f1;stroke-width:1}
    text{font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .mono{font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    @media (prefers-color-scheme:dark){
      .d-bg{fill:#101012}.d-surface{fill:#18181b;stroke:#2c2c30}.d-surface2{fill:#202023;stroke:#2c2c30}.d-emph{fill:#fafafa;stroke:#fafafa}
      .d-title{fill:#fafafa}.d-label{fill:#d4d4d8}.d-sub{fill:#8a8a8d}.d-emph-text{fill:#18181b}
      .d-eyebrow{fill:#8a8a8d}.d-edge{stroke:#71717a}.d-edge-fill{fill:#71717a}.d-grid{stroke:#1a1a1d}
    }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path class="d-grid" d="M28 0 H0 V28" fill="none"/></pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path class="d-edge-fill" d="M0,0 L8,3 L0,6"/></marker>
  </defs>
  <rect class="d-bg" x="0" y="0" width="840" height="470" rx="12"/>
  <rect x="0" y="0" width="840" height="470" rx="12" fill="url(#grid)"/>
  <rect class="d-surface" x="0.5" y="0.5" width="839" height="469" rx="12" fill="none"/>
  <text class="d-eyebrow mono" x="28" y="34" font-size="10">ALETHIA · SCHEMA</text>
  <text class="d-title" x="28" y="58" font-size="15" font-weight="600">One Postgres database, org-scoped by RLS</text>

  <!-- Core -->
  <rect class="d-surface" x="28" y="88" width="248" height="120" rx="8"/>
  <text class="d-label" x="44" y="112" font-size="12" font-weight="600">Core</text>
  <text class="d-sub mono" x="44" y="134" font-size="11">projects</text>
  <text class="d-sub mono" x="44" y="154" font-size="11">project_environments</text>
  <text class="d-sub mono" x="44" y="174" font-size="11">cloud_identities</text>
  <text class="d-sub mono" x="44" y="194" font-size="9">status lives on the environment</text>

  <!-- Components -->
  <rect class="d-surface" x="296" y="88" width="248" height="120" rx="8"/>
  <text class="d-label" x="312" y="112" font-size="12" font-weight="600">Components (per env)</text>
  <text class="d-sub mono" x="312" y="134" font-size="11">network · cluster · dns</text>
  <text class="d-sub mono" x="312" y="154" font-size="11">databases · caches · queues</text>
  <text class="d-sub mono" x="312" y="174" font-size="11">topics · nosql · secrets · addons</text>
  <text class="d-sub mono" x="312" y="194" font-size="9">component_status per row</text>

  <!-- Jobs -->
  <rect class="d-surface" x="564" y="88" width="248" height="120" rx="8"/>
  <text class="d-label" x="580" y="112" font-size="12" font-weight="600">Jobs</text>
  <text class="d-sub mono" x="580" y="134" font-size="11">jobs</text>
  <text class="d-sub mono" x="580" y="154" font-size="11">job_logs</text>
  <text class="d-sub mono" x="580" y="174" font-size="9">config_snapshot · execution_metadata</text>
  <text class="d-sub mono" x="580" y="194" font-size="9">claim_next_job() FOR UPDATE SKIP LOCKED</text>

  <!-- Runners -->
  <rect class="d-surface" x="28" y="224" width="248" height="104" rx="8"/>
  <text class="d-label" x="44" y="248" font-size="12" font-weight="600">Runners</text>
  <text class="d-sub mono" x="44" y="270" font-size="11">runners</text>
  <text class="d-sub mono" x="44" y="290" font-size="11">runner_usage_sessions</text>
  <text class="d-sub mono" x="44" y="310" font-size="11">runner_releases</text>

  <!-- Authz -->
  <rect class="d-surface" x="296" y="224" width="248" height="104" rx="8"/>
  <text class="d-label" x="312" y="248" font-size="12" font-weight="600">Authorization (PDP)</text>
  <text class="d-sub mono" x="312" y="270" font-size="11">role · permission · role_permission</text>
  <text class="d-sub mono" x="312" y="290" font-size="11">grants (allow/deny) · resource_hierarchy</text>
  <text class="d-sub mono" x="312" y="310" font-size="11">authz_activity_log</text>

  <!-- Audit / auth -->
  <rect class="d-surface" x="564" y="224" width="248" height="104" rx="8"/>
  <text class="d-label" x="580" y="248" font-size="12" font-weight="600">Auth &amp; audit</text>
  <text class="d-sub mono" x="580" y="270" font-size="11">user · session · account · verification</text>
  <text class="d-sub mono" x="580" y="290" font-size="9">git OAuth tokens live on account</text>
  <text class="d-sub mono" x="580" y="310" font-size="11">audit_log</text>

  <!-- RLS backstop -->
  <rect class="d-emph" x="28" y="352" width="480" height="52" rx="8"/>
  <text class="d-emph-text" x="48" y="376" font-size="13" font-weight="600">RLS backstop</text>
  <text class="d-emph-text mono" x="48" y="393" font-size="9" opacity="0.82">coarse policy on org_id · set_config('app.current_org', …) via PDP</text>

  <!-- Realtime -->
  <rect class="d-surface2" x="528" y="352" width="284" height="52" rx="8"/>
  <text class="d-label" x="548" y="376" font-size="12" font-weight="600">Realtime</text>
  <text class="d-sub mono" x="548" y="393" font-size="9">LISTEN/NOTIFY → SSE · jobs · job_logs · runners</text>

  <text class="d-sub mono" x="812" y="452" text-anchor="end" font-size="12">[ · ]</text>
</svg>
