# Vale — prose lint for the Alethia docs (Fumadocs MDX).
#
# Structure follows Diátaxis; prose follows a plain-language style guide built on
# Google's dev-docs style (a downloaded package) plus a small Alethia delta. See
# the `alethia-docs` skill and apps/docs/README.md for the authoring bar.
#
# Requires the `mdx2vast` preprocessor on $PATH to lint .mdx (npm i -g mdx2vast);
# Vale then auto-ignores fenced code, code spans, URLs, and JSX/ESM — only prose
# is checked. `vale sync` downloads the Google package into styles/ (gitignored).

StylesPath = styles
# Show warnings + errors; the huge suggestion tier (passive voice, acronym spell-outs,
# Latin abbreviations) is deliberately hidden — it's noise for technical dev docs.
MinAlertLevel = warning
# Vocab is a core option and must sit above any [glob] section.
Vocab = Alethia

# Downloaded at CI/sync time — never vendored (keeps third-party style source and
# its licensing out of the repo).
Packages = Google

# Glob is relative to this .vale.ini (apps/docs); the lint is always invoked as
# `vale content`, so this scopes styles to every MDX page under content/.
#
# We do NOT base on the whole Google package — enabling it wholesale floods 900+
# house-style false positives (spaced em-dashes, Latin abbreviations, unit spacing).
# Instead: base on the Alethia house style and cherry-pick a few high-signal Google
# prose checks as advisory (warning-level) rules.
[*.mdx]
BasedOnStyles = Alethia
# Advisory, non-blocking — reinforce present tense + active, direct voice (STE-aligned).
Google.Will = YES
Google.We = YES
Google.FirstPerson = YES
