extends: occurrence
message: "This sentence is long (over 30 words) ‚Äî consider splitting it."
# STE keeps procedural sentences ‚â§20 words and descriptive ‚â§25; 30 is a lenient
# dev-docs ceiling. Suggestion-level: pure advice ‚Äî hidden at the default `warning`
# floor so it never clutters CI, surfaced with `vale --minAlertLevel=suggestion`.
level: suggestion
scope: sentence
# Count word tokens per sentence; flag when more than `max`.
token: \b(\w+)\b
max: 30
