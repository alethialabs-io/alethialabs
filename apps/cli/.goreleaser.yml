# .goreleaser.yml
# Make sure to check the documentation at https://goreleaser.com
version: 2

# Project name for the binary
project_name: alethia

# The CLI is released on its own component tag (cli-vX.Y.Z, created by
# release-please). GoReleaser OSS has no tag_prefix stripping, so all
# user-facing version strings use `{{ trimprefix .Tag "cli-v" }}` to get a
# clean semver, and the workflow runs with --skip=validate (the cli- prefix
# is not semver).

before:
    hooks:
        - 'sh -c "cd apps/cli && go mod tidy"'

builds:
    - id: alethia
      dir: apps/cli
      main: ./
      binary: alethia
      ldflags:
          - -s -w -X github.com/alethialabs-io/alethialabs/apps/cli/internal/version.Version={{ trimprefix .Tag "cli-v" }}
      env:
          - CGO_ENABLED=0
          - ALETHIA_WEB_ORIGIN=https://beta.adp.itgix.com
      goos:
          - linux
          - darwin
          - windows
      goarch:
          - amd64
          - arm64


archives:
    - name_template: >-
          {{ .ProjectName }}_
          {{- title .Os }}_
          {{- if eq .Arch "amd64" }}x86_64
          {{- else if eq .Arch "386" }}i386
          {{- else }}{{ .Arch }}{{ end }}
          {{- if .Arm }}v{{ .Arm }}{{ end }}
      format_overrides:
          - goos: windows
            formats: ["zip"]

checksum:
    name_template: "checksums.txt"

snapshot:
    version_template: "{{ incpatch .Version }}-next"

changelog:
    sort: asc
    filters:
        exclude:
            - "^docs:"
            - "^test:"
            - "merge"

# Modelines, see https://goreleaser.com/customization/modelines/
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
brews:
    - name: alethia
      # The name of the GitHub repository for your Homebrew Tap.
      # Convention is 'homebrew-<project-name>'
      commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
      repository:
          owner: "alethialabs-io"
          name: "homebrew-alethialabs"
          branch: main
          token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

      directory: "Formula"
      # You can create a token with just 'public_repo' scope and set it here.
          # Or you can simply use GITHUB_TOKEN.

      commit_author:
          name: alethialabs-io
          email: contact@borislav.me

      # The project's homepage.
      homepage: "https://github.com/alethialabs-io/alethialabs"

      # A brief description of the project.
      description: "Alethia CLI for managing infrastructure configurations."

      license: "AGPL-3.0-only"

      # The install block for the formula.
      install: |
          bin.install "alethia"

      test: |
          system "#{bin}/alethia", "--version"

dockers:
    - image_templates:
          - 'ghcr.io/alethialabs-io/alethia:{{ trimprefix .Tag "cli-v" }}-amd64'
      use: buildx
      dockerfile: apps/cli/Dockerfile
      goos: linux
      goarch: amd64
      build_flag_templates:
          - "--platform=linux/amd64"
          - "--label=org.opencontainers.image.source=https://github.com/alethialabs-io/alethialabs"
          - '--label=org.opencontainers.image.version={{ trimprefix .Tag "cli-v" }}'
          - "--label=org.opencontainers.image.licenses=AGPL-3.0-only"
    - image_templates:
          - 'ghcr.io/alethialabs-io/alethia:{{ trimprefix .Tag "cli-v" }}-arm64'
      use: buildx
      dockerfile: apps/cli/Dockerfile
      goos: linux
      goarch: arm64
      build_flag_templates:
          - "--platform=linux/arm64"
          - "--label=org.opencontainers.image.source=https://github.com/alethialabs-io/alethialabs"
          - '--label=org.opencontainers.image.version={{ trimprefix .Tag "cli-v" }}'
          - "--label=org.opencontainers.image.licenses=AGPL-3.0-only"

docker_manifests:
    - name_template: 'ghcr.io/alethialabs-io/alethia:{{ trimprefix .Tag "cli-v" }}'
      image_templates:
          - 'ghcr.io/alethialabs-io/alethia:{{ trimprefix .Tag "cli-v" }}-amd64'
          - 'ghcr.io/alethialabs-io/alethia:{{ trimprefix .Tag "cli-v" }}-arm64'
    - name_template: "ghcr.io/alethialabs-io/alethia:latest"
      image_templates:
          - 'ghcr.io/alethialabs-io/alethia:{{ trimprefix .Tag "cli-v" }}-amd64'
          - 'ghcr.io/alethialabs-io/alethia:{{ trimprefix .Tag "cli-v" }}-arm64'
