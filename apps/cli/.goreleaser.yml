# .goreleaser.yml
# Make sure to check the documentation at https://goreleaser.com
version: 2

# Project name for the binary
project_name: alethia

# This runs (via release-cli.yml) inside a checkout of the alethialabs-io/alethia-cli release home,
# at its clean-semver tag vX.Y.Z — so GoReleaser creates the Release there and `{{ .Version }}` is a
# clean semver (0.3.0). release-please computes the version in the monorepo (cli-vX.Y.Z) and
# release-cli snapshots that source onto alethia-cli under the vX.Y.Z tag before this runs.

before:
    hooks:
        - 'sh -c "cd apps/cli && go mod tidy"'

builds:
    - id: alethia
      dir: apps/cli
      main: ./
      binary: alethia
      ldflags:
          - -s -w -X github.com/alethialabs-io/alethialabs/apps/cli/internal/version.Version={{ .Version }}
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - darwin
          - windows
      goarch:
          - amd64
          - arm64


archives:
    - name_template: >-
          {{ .ProjectName }}_
          {{- title .Os }}_
          {{- if eq .Arch "amd64" }}x86_64
          {{- else if eq .Arch "386" }}i386
          {{- else }}{{ .Arch }}{{ end }}
          {{- if .Arm }}v{{ .Arm }}{{ end }}
      format_overrides:
          - goos: windows
            formats: ["zip"]

checksum:
    name_template: "checksums.txt"

snapshot:
    version_template: "{{ incpatch .Version }}-next"

changelog:
    sort: asc
    filters:
        exclude:
            - "^docs:"
            - "^test:"
            - "merge"

# Modelines, see https://goreleaser.com/customization/modelines/
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
brews:
    - name: alethia
      # The name of the GitHub repository for your Homebrew Tap.
      # Convention is 'homebrew-<project-name>'
      commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
      repository:
          owner: "alethialabs-io"
          name: "homebrew-tap"
          branch: main
          token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

      directory: "Formula"
      # You can create a token with just 'public_repo' scope and set it here.
          # Or you can simply use GITHUB_TOKEN.

      commit_author:
          name: alethialabs-io
          email: contact@borislav.me

      # The project's homepage.
      homepage: "https://github.com/alethialabs-io/alethia-cli"

      # A brief description of the project.
      description: "Alethia CLI for managing infrastructure configurations."

      license: "AGPL-3.0-only"

      # The install block for the formula.
      install: |
          bin.install "alethia"

      test: |
          system "#{bin}/alethia", "--version"

# Windows package manager. GoReleaser publishes the manifest to the scoop bucket;
# users install with `scoop bucket add alethia <url> && scoop install alethia`.
scoops:
    - name: alethia
      repository:
          owner: "alethialabs-io"
          name: "scoop-bucket"
          branch: main
          token: "{{ .Env.SCOOP_TAP_GITHUB_TOKEN }}"
      commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
      commit_author:
          name: alethialabs-io
          email: contact@borislav.me
      homepage: "https://alethialabs.io"
      description: "Alethia CLI for managing multi-cloud Kubernetes infrastructure."
      license: "AGPL-3.0-only"

# Linux distro packages (.deb / .rpm / .apk) attached to the GitHub Release, so
# users can `dpkg -i` / `rpm -i` / `apk add` the CLI. Built from the linux archives.
nfpms:
    - id: alethia
      package_name: alethia
      vendor: "Alethia Labs"
      homepage: "https://alethialabs.io"
      maintainer: "Alethia Labs <contact@alethialabs.io>"
      description: "Alethia CLI for managing multi-cloud Kubernetes infrastructure."
      license: "AGPL-3.0-only"
      formats:
          - deb
          - rpm
          - apk
      bindir: /usr/bin

dockers:
    - image_templates:
          - 'ghcr.io/alethialabs-io/alethia:{{ .Version }}-amd64'
      use: buildx
      dockerfile: apps/cli/Dockerfile
      goos: linux
      goarch: amd64
      build_flag_templates:
          - "--platform=linux/amd64"
          - "--label=org.opencontainers.image.source=https://github.com/alethialabs-io/alethia-cli"
          - '--label=org.opencontainers.image.version={{ .Version }}'
          - "--label=org.opencontainers.image.licenses=AGPL-3.0-only"
    - image_templates:
          - 'ghcr.io/alethialabs-io/alethia:{{ .Version }}-arm64'
      use: buildx
      dockerfile: apps/cli/Dockerfile
      goos: linux
      goarch: arm64
      build_flag_templates:
          - "--platform=linux/arm64"
          - "--label=org.opencontainers.image.source=https://github.com/alethialabs-io/alethia-cli"
          - '--label=org.opencontainers.image.version={{ .Version }}'
          - "--label=org.opencontainers.image.licenses=AGPL-3.0-only"

docker_manifests:
    - name_template: 'ghcr.io/alethialabs-io/alethia:{{ .Version }}'
      image_templates:
          - 'ghcr.io/alethialabs-io/alethia:{{ .Version }}-amd64'
          - 'ghcr.io/alethialabs-io/alethia:{{ .Version }}-arm64'
    - name_template: "ghcr.io/alethialabs-io/alethia:latest"
      image_templates:
          - 'ghcr.io/alethialabs-io/alethia:{{ .Version }}-amd64'
          - 'ghcr.io/alethialabs-io/alethia:{{ .Version }}-arm64'
