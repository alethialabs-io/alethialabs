AWSTemplateFormatVersion: '2010-09-09'
Description: 'Alethia Platform: Cross-Account IAM Role for Infrastructure Management'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Security Configuration"
        Parameters:
          - ExternalId
          - AlethiaAwsAccountId
      - Label:
          default: "Resource Customization"
        Parameters:
          - RoleName
    ParameterLabels:
      RoleName:
        default: "IAM Role Name"
      ExternalId:
        default: "External ID"
      AlethiaAwsAccountId:
        default: "Alethia Account ID"

Parameters:
  AlethiaAwsAccountId:
    Type: String
    Default: '787587782604'
    Description: 'The AWS Account ID of the Alethia Platform.'

  ExternalId:
    Type: String
    Description: 'Unique External ID generated by Alethia to secure this connection.'

  RoleName:
    Type: String
    Default: 'AlethiaProvisionerRole'
    Description: 'The name of the IAM role to be created.'

Resources:
  AlethiaCrossAccountRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: !Sub '${RoleName}-${ExternalId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AlethiaAwsAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref ExternalId
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

Outputs:
  RoleArn:
    Description: 'The ARN of the created Role. Please copy this back to the Alethia dashboard.'
    Value: !GetAtt AlethiaCrossAccountRole.Arn
