# Mergify merge queue for the integration branch `dev`.
#
# Mergify reads THIS FILE ONLY FROM THE DEFAULT BRANCH (`main`) â€” config changes take effect only after they
# reach main (via the devâ†’stagingâ†’main train), not from a PR's base branch. So iterate carefully.
#
# It REPLACES the native GitHub merge queue (the `merge_queue` rule was removed from the Terraform-managed
# `protect-dev` ruleset, infra/github/main.tf). Why: the native queue re-ran required checks via the
# `merge_group` event, where the `merge_group`-only "Provisioning E2E (T1)" job fails on missing auth env and
# wedged EVERY queued PR. Mergify validates each PR on its own branch (no `merge_group`), so that wedge is gone.
#
# Behaviour: every NON-DRAFT PR into `dev` is AUTO-queued (merge_protections_settings.auto_merge_conditions â€”
# the current replacement for the deprecated `autoqueue`) and SQUASH-merged once the 8 protect-dev required
# checks pass. No `@mergifyio queue`, no `gh pr merge` â€” just open a non-draft PR; keep WIP as a draft.

queue_rules:
  - name: dev
    # queue_conditions decide which PRs THIS queue accepts â€” REQUIRED, or a PR can't be assigned to the queue
    # (its absence returned `queue_rule_name: null` before). merge_conditions decide WHEN to merge.
    queue_conditions:
      - base = dev
      - "-draft"
    merge_conditions:
      # The 8 protect-dev required checks (quoted â€” names contain `Â·`, `(`, `)`, `/`).
      - "check-success=TypeScript (lint Â· types Â· test Â· docs)"
      - "check-success=Go (build Â· vet Â· test Â· lint) (packages/core)"
      - "check-success=Go (build Â· vet Â· test Â· lint) (apps/cli)"
      - "check-success=Go (build Â· vet Â· test Â· lint) (apps/runner)"
      - "check-success=Integration (real Postgres + RLS)"
      - "check-success=Secret scan (gitleaks)"
      - "check-success=Docs prose (Vale Â· DiĂˇtaxis + plain-language)"
      - "check-success=Authz / open-core guards"
    # SQUASH matches featureâ†’dev convention (promotions devâ†’stagingâ†’main stay human `--merge`).
    merge_method: squash

# Merge protections: `auto_merge_conditions` below only fires once a merge_protections rule's
# `success_conditions` all pass. Without this block there were no success_conditions to satisfy, so
# auto-merge never triggered (the bug). This rule requires the 8 protect-dev checks on every PR into `dev`.
merge_protections:
  - name: dev required CI
    if:
      - base = dev
    success_conditions:
      - "check-success=TypeScript (lint Â· types Â· test Â· docs)"
      - "check-success=Go (build Â· vet Â· test Â· lint) (packages/core)"
      - "check-success=Go (build Â· vet Â· test Â· lint) (apps/cli)"
      - "check-success=Go (build Â· vet Â· test Â· lint) (apps/runner)"
      - "check-success=Integration (real Postgres + RLS)"
      - "check-success=Secret scan (gitleaks)"
      - "check-success=Docs prose (Vale Â· DiĂˇtaxis + plain-language)"
      - "check-success=Authz / open-core guards"

# Auto-queue: automatically queues + squash-merges a matching PR once the merge_protections
# success_conditions above pass. The current, non-deprecated auto-merge mechanism (no @mergifyio command).
merge_protections_settings:
  auto_merge_conditions:
    - base = dev
    - "-draft"
