apiVersion: v1
kind: Service
metadata:
  name: {{ include "alethia.fullname" . }}-docs
  labels:
    {{- include "alethia.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "alethia.selectorLabels" (dict "ctx" . "component" "docs") | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alethia.fullname" . }}-docs
  labels:
    {{- include "alethia.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.docs.replicas }}
  selector:
    matchLabels:
      {{- include "alethia.selectorLabels" (dict "ctx" . "component" "docs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alethia.selectorLabels" (dict "ctx" . "component" "docs") | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: docs
          image: {{ include "alethia.image.docs" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /docs
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.docs.resources | nindent 12 }}
