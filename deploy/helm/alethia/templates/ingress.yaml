{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "alethia.fullname" . }}
  labels:
    {{- include "alethia.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.domain | quote }}
      secretName: {{ include "alethia.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.domain | quote }}
      http:
        paths:
          # /docs* → docs, everything else → console.
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ include "alethia.fullname" . }}-docs
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "alethia.fullname" . }}-console
                port:
                  number: 3000
{{- end }}
