{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alethia.fullname" . }}-secrets
  labels:
    {{- include "alethia.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Connection strings + app role password (consumed by console/migrate/runner).
  ALETHIA_DATABASE_URL: {{ include "alethia.databaseUrl" . | quote }}
  ALETHIA_APP_DATABASE_URL: {{ include "alethia.appDatabaseUrl" . | quote }}
  ALETHIA_APP_DB_PASSWORD: {{ .Values.postgres.appPassword | quote }}
  ALETHIA_STORAGE_ENDPOINT: {{ include "alethia.storageEndpoint" . | quote }}
  CLI_JWT_SECRET: {{ required "secrets.cliJwtSecret is required (openssl rand -hex 32)" .Values.secrets.cliJwtSecret | quote }}
  BETTER_AUTH_SECRET: {{ required "secrets.betterAuthSecret is required (openssl rand -hex 32)" .Values.secrets.betterAuthSecret | quote }}
  {{- range $k, $v := .Values.secrets.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
