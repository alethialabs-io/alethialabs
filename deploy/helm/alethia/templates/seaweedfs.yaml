{{- if .Values.objectStore.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alethia.fullname" . }}-seaweedfs
  labels:
    {{- include "alethia.labels" . | nindent 4 }}
data:
  s3.json: |
    {
      "identities": [
        {
          "name": "alethia",
          "credentials": [
            {
              "accessKey": {{ .Values.objectStore.accessKey | default "alethia" | quote }},
              "secretKey": {{ .Values.objectStore.secretKey | default "alethia-dev-secret" | quote }}
            }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alethia.fullname" . }}-seaweedfs
  labels:
    {{- include "alethia.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "alethia.selectorLabels" (dict "ctx" . "component" "seaweedfs") | nindent 4 }}
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "alethia.fullname" . }}-seaweedfs
  labels:
    {{- include "alethia.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "alethia.fullname" . }}-seaweedfs
  replicas: 1
  selector:
    matchLabels:
      {{- include "alethia.selectorLabels" (dict "ctx" . "component" "seaweedfs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alethia.selectorLabels" (dict "ctx" . "component" "seaweedfs") | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seaweedfs
          image: {{ .Values.objectStore.image | quote }}
          args:
            - server
            - -dir=/data
            - -s3
            - -s3.config=/etc/seaweedfs/s3.json
            - -master.volumeSizeLimitMB=1024
            - -ip.bind=0.0.0.0
          ports:
            - name: s3
              containerPort: 8333
          readinessProbe:
            httpGet:
              path: /cluster/healthz
              port: 9333
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/seaweedfs
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "alethia.fullname" . }}-seaweedfs
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.objectStore.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.objectStore.persistence.size | quote }}
{{- end }}
