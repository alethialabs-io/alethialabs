AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Alethia self-host control plane — a single Graviton (ARM) EC2 instance running
  the docker-compose bundle (console + docs + runner + Postgres + object store),
  behind Caddy with automatic HTTPS. One-click via "Launch Stack".

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "DNS / TLS" }
        Parameters: [Domain, AcmeEmail]
      - Label: { default: "Instance" }
        Parameters: [InstanceType, KeyName, AllowedSshCidr, VolumeSize, UbuntuAmi]
    ParameterLabels:
      Domain: { default: "Domain (A record must point here after launch)" }
      AcmeEmail: { default: "Email for Let's Encrypt" }

Parameters:
  Domain:
    Type: String
    Description: Domain served by the control plane (leave blank for HTTP on the public IP).
    Default: ""
  AcmeEmail:
    Type: String
    Description: Contact email for Let's Encrypt certificates.
    Default: ""
  InstanceType:
    Type: String
    # Graviton (ARM) — the published images are arm64-only.
    Default: t4g.medium
    AllowedValues: [t4g.small, t4g.medium, t4g.large, t4g.xlarge]
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access.
  AllowedSshCidr:
    Type: String
    Description: CIDR allowed to reach SSH (22).
    Default: 0.0.0.0/0
  VolumeSize:
    Type: Number
    Description: Root EBS size (GB) — holds Docker data (Postgres + object store).
    Default: 30
    MinValue: 20
  UbuntuAmi:
    # Ubuntu 24.04 LTS arm64, resolved from Canonical's public SSM parameter.
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id

Conditions:
  HasDomain: !Not [!Equals [!Ref Domain, ""]]

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Alethia control plane (SSH + HTTP/HTTPS)
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: !Ref AllowedSshCidr }
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0 }
      Tags:
        - { Key: project, Value: alethia }
        - { Key: role, Value: control-plane }

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref UbuntuAmi
      KeyName: !Ref KeyName
      SecurityGroupIds: [!Ref SecurityGroup]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs: { VolumeSize: !Ref VolumeSize, VolumeType: gp3 }
      Tags:
        - { Key: Name, Value: alethia-cp }
        - { Key: project, Value: alethia }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -eux
          apt-get update && apt-get install -y git
          export DOMAIN="${Domain}"
          export ACME_EMAIL="${AcmeEmail}"
          curl -fsSL https://raw.githubusercontent.com/alethialabs-io/alethialabs/main/deploy/install.sh | sh

  EIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref Instance
      Domain: vpc

Outputs:
  PublicIp:
    Description: Point your domain's A record here, then re-run with the domain set.
    Value: !Ref EIP
  URL:
    Value: !If [HasDomain, !Sub "https://${Domain}", !Sub "http://${EIP}"]
