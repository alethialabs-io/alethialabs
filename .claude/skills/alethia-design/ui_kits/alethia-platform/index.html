<!-- @startingPoint section="Alethia Platform" subtitle="Full control-plane dashboard shell" viewport="1340x840" -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alethia — Control Plane</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: var(--canvas); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
  function Root() {
    const [authed, setAuthed] = React.useState(true);
    const [active, setActive] = React.useState("overview");
    const { SignIn, Sidebar, TopBar } = window.VxApp;
    const sc = window.VxScreens;
    const map = { overview: sc.Overview, plant: sc.PlantVine, clusters: sc.Clusters, jobs: sc.Jobs, integrations: sc.Integrations, tendrils: sc.Tendrils };
    const Screen = map[active];
    if (!authed) return <SignIn onAuth={() => setAuthed(true)} />;
    return (
      <div style={{ display: "flex", height: "100%", overflow: "hidden" }}>
        <Sidebar active={active} setActive={setActive} onLogout={() => setAuthed(false)} />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
          <TopBar active={active} />
          <main style={{ flex: 1, overflowY: "auto", padding: "30px 36px" }}>
            <div style={{ maxWidth: 1040, margin: "0 auto" }}><Screen /></div>
          </main>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
