<!-- @dsCard group="Brand" viewport="700x210" name="Logo & Lockups" subtitle="Alethia mark, wordmark, and the Alethia parent lockup" -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:28px 32px;background:var(--canvas);color:var(--text-primary);display:grid;grid-template-columns:96px 1fr;gap:26px 40px;align-items:center;}
  .cap{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-tertiary);margin-top:8px;}
  .col{display:flex;flex-direction:column;}
  svg{display:block;}
  .wm{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:-.01em;color:var(--text-primary);}
  .al{font-family:var(--font-mono);font-size:14px;font-weight:500;letter-spacing:.22em;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="col" style="align-items:center">
    <svg width="60" height="60" viewBox="0 0 32 32" fill="none">
      <path d="M4 25.5 L16 6 L28 25.5" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M10.5 25.5 L16 16.5 L21.5 25.5" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.4"/>
      <rect x="13.4" y="3.4" width="5.2" height="5.2" rx="1.1" transform="rotate(45 16 6)" fill="currentColor"/>
    </svg>
    <span class="cap">Mark</span>
  </div>
  <div class="col">
    <div style="display:flex;align-items:center;gap:11px">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
        <path d="M4 25.5 L16 6 L28 25.5" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M10.5 25.5 L16 16.5 L21.5 25.5" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.4"/>
        <rect x="13.4" y="3.4" width="5.2" height="5.2" rx="1.1" transform="rotate(45 16 6)" fill="currentColor"/>
      </svg>
      <span class="wm">Alethia</span>
    </div>
    <span class="cap">Primary wordmark</span>
  </div>
  <div></div>
  <div class="col">
    <span class="al">ALETHIA</span>
    <span class="cap">Parent lockup · holds the IP & knowledge</span>
  </div>
</body></html>
