<!-- @dsCard group="Brand" viewport="700x180" name="Iconography" subtitle="Lucide line icons + real provider/integration marks" -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px 26px;background:var(--canvas);}
  .cap{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-tertiary);margin:0 0 12px;}
  .row{display:flex;align-items:center;gap:20px;margin-bottom:18px;color:var(--text-secondary);}
  .row svg{width:22px;height:22px;}
  .marks{display:flex;align-items:center;gap:16px;}
  .marks img{width:26px;height:26px;object-fit:contain;}
  .chip{display:flex;align-items:center;gap:8px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-full);}
  .chip img{width:16px;height:16px;}
  .chip span{font-size:11px;color:var(--text-secondary);}
</style></head>
<body>
<p class="cap">Lucide · 1.5–2px stroke · round caps</p>
<div class="row">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l6-6-6-6M12 19h8"/></svg>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
</div>
<p class="cap">Cloud providers &amp; integrations · original brand marks (color preserved)</p>
<div class="marks">
  <img src="../assets/providers/aws.png" alt="AWS"/>
  <img src="../assets/providers/gcp.png" alt="GCP"/>
  <img src="../assets/providers/azure.png" alt="Azure"/>
  <img src="../assets/providers/alibaba.png" alt="Alibaba Cloud"/>
  <span style="width:1px;height:24px;background:var(--border)"></span>
  <div class="chip"><img src="../assets/integrations/github.png"/><span>GitHub</span></div>
  <div class="chip"><img src="../assets/integrations/gitlab.png"/><span>GitLab</span></div>
  <div class="chip"><img src="../assets/integrations/datadog.png"/><span>Datadog</span></div>
  <div class="chip"><img src="../assets/integrations/grafana.png"/><span>Grafana</span></div>
</div>
</body></html>
