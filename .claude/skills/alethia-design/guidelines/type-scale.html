<!-- @dsCard group="Type" viewport="700x190" name="Type Scale" subtitle="rem-based scale, UI base 14px" -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px 26px;background:var(--canvas);font-family:var(--font-sans);}
  table{width:100%;border-collapse:collapse;}
  td{padding:3px 0;vertical-align:baseline;color:var(--text-primary);}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);width:90px;}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);width:48px;text-align:right;padding-right:18px;}
</style></head>
<body>
<table>
  <tr><td class="tok">7xl</td><td class="px">72</td><td style="font-size:34px;font-family:var(--font-display);letter-spacing:-.03em">Aa</td></tr>
  <tr><td class="tok">5xl</td><td class="px">48</td><td style="font-size:28px;font-family:var(--font-display);letter-spacing:-.02em">Display heading</td></tr>
  <tr><td class="tok">2xl</td><td class="px">24</td><td style="font-size:20px;font-family:var(--font-display);font-weight:600">Section title</td></tr>
  <tr><td class="tok">md</td><td class="px">16</td><td style="font-size:16px">Lead paragraph</td></tr>
  <tr><td class="tok">base</td><td class="px">14</td><td style="font-size:14px;color:var(--text-secondary)">Body / UI default</td></tr>
  <tr><td class="tok">xs</td><td class="px">12</td><td style="font-size:12px;color:var(--text-tertiary)">Caption &amp; badge</td></tr>
  <tr><td class="tok">2xs</td><td class="px">11</td><td style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary)">Micro label</td></tr>
</table>
</body></html>
