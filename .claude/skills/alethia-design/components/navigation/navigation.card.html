<!DOCTYPE html>

<head>

<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  body { margin: 0; padding: 28px 32px; background: var(--canvas); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-tertiary); margin: 0 0 10px; }
  .block { margin-bottom: 26px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs } = window.AlethiaDesignSystem_8c015f;
  function Demo() {
    const [a, setA] = React.useState("plan");
    const [b, setB] = React.useState("aws");
    return (
      <div>
        <div className="block">
          <p className="lbl">Underline rail</p>
          <Tabs tabs={[{id:"plan",label:"Plan"},{id:"review",label:"Review"},{id:"logs",label:"Logs"},{id:"cost",label:"Cost"}]} value={a} onValueChange={setA} />
        </div>
        <div className="block">
          <p className="lbl">Pill group</p>
          <Tabs variant="pill" tabs={[{id:"aws",label:"AWS"},{id:"gcp",label:"GCP"},{id:"azure",label:"Azure"}]} value={b} onValueChange={setB} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
