<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--canvas); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Textarea, Select, Field, Label, Hint, Checkbox, Radio, Switch } = window.AlethiaDesignSystem_8c015f;
  function Demo() {
    return (
      <div className="grid">
        <Field>
          <Label htmlFor="n">Project name</Label>
          <Input id="n" defaultValue="api-backend" />
          <Hint>Used as the Terraform workspace name.</Hint>
        </Field>
        <Field>
          <Label htmlFor="c">CIDR block</Label>
          <Input id="c" mono defaultValue="10.0.0.0/16" />
          <Hint>Monospace input for technical values.</Hint>
        </Field>
        <Field>
          <Label htmlFor="r">Region</Label>
          <Select id="r" options={["eu-west-1","us-east-1","ap-southeast-2"]} defaultValue="eu-west-1" />
        </Field>
        <Field>
          <Label htmlFor="e">Error state</Label>
          <Input id="e" aria-invalid="true" defaultValue="bad value" />
          <Hint>aria-invalid renders the grayscale error treatment.</Hint>
        </Field>
        <div className="stack">
          <Label>Cluster options</Label>
          <Checkbox defaultChecked>Karpenter autoscaling</Checkbox>
          <Checkbox>Private endpoint only</Checkbox>
          <div style={{display:'flex',gap:'18px'}}>
            <Radio name="ha" defaultChecked>Multi-AZ</Radio>
            <Radio name="ha">Single zone</Radio>
          </div>
        </div>
        <div className="stack">
          <Label>Toggles</Label>
          <label style={{display:'flex',alignItems:'center',gap:'10px',fontSize:'13px',color:'var(--text-secondary)'}}><Switch defaultChecked/> ArgoCD self-healing</label>
          <label style={{display:'flex',alignItems:'center',gap:'10px',fontSize:'13px',color:'var(--text-secondary)'}}><Switch/> Zone-redundant HA</label>
          <Textarea placeholder="Deployment notes…" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
