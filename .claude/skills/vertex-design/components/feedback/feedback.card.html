<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--canvas); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 18px; margin-bottom: 18px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-tertiary); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { StatusBadge, Alert, Spinner } = window.VertexDesignSystem_8c015f;
  const Shield = () => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  const Tri = () => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Status — communicated without color</span>
          <StatusBadge status="active" />
          <StatusBadge status="processing" />
          <StatusBadge status="queued" />
          <StatusBadge status="idle" />
          <StatusBadge status="failed" />
          <StatusBadge status="disabled" />
          <StatusBadge status="live">Streaming logs</StatusBadge>
        </div>
        <div className="row" style={{gap:'14px'}}>
          <Alert title="Zero credentials stored" icon={<Shield/>} style={{flex:'1 1 280px'}}>
            Vertex uses cross-account IAM roles. No static keys are ever persisted.
          </Alert>
          <Alert variant="critical" title="This destroys 47 resources" icon={<Tri/>} style={{flex:'1 1 280px'}}>
            This action cannot be undone.
          </Alert>
        </div>
        <div className="row">
          <span className="lbl">Spinner</span>
          <Spinner size={16}/>
          <Spinner size={24}/>
          <span style={{fontSize:'13px',color:'var(--text-secondary)'}}>Terraform plan running…</span>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
