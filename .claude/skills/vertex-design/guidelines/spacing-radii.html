<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="From chips to hero containers" -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:24px 26px;background:var(--canvas);display:flex;gap:18px;align-items:flex-end;}
  .b{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .sq{width:62px;height:62px;background:var(--surface-muted);border:1px solid var(--border-strong);}
  .tok{font-family:var(--font-mono);font-size:9.5px;color:var(--text-tertiary);}
</style></head>
<body>
<div class="b"><div class="sq" style="border-radius:var(--radius-xs)"></div><span class="tok">xs · 4</span></div>
<div class="b"><div class="sq" style="border-radius:var(--radius-sm)"></div><span class="tok">sm · 6</span></div>
<div class="b"><div class="sq" style="border-radius:var(--radius-md)"></div><span class="tok">md · 8</span></div>
<div class="b"><div class="sq" style="border-radius:var(--radius-lg)"></div><span class="tok">lg · 10</span></div>
<div class="b"><div class="sq" style="border-radius:var(--radius-xl)"></div><span class="tok">xl · 14</span></div>
<div class="b"><div class="sq" style="border-radius:var(--radius-2xl)"></div><span class="tok">2xl · 18</span></div>
<div class="b"><div class="sq" style="border-radius:var(--radius-full)"></div><span class="tok">full</span></div>
</body></html>
