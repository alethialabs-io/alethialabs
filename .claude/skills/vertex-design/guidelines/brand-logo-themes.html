<!-- @dsCard group="Brand" viewport="700x150" name="Logo on Surfaces" subtitle="The mark holds on dark, light, and inverted ink" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px 26px;background:var(--gray-200);display:flex;gap:16px;}
  .panel{flex:1;height:104px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid rgba(0,0,0,.08);}
  .wm{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-.01em;}
  .d{background:var(--gray-1050);color:var(--gray-50);}
  .l{background:var(--gray-0);color:var(--gray-1000);}
  .ink{background:var(--gray-1000);color:var(--gray-0);}
</style></head>
<body>
<script>
  function mark(s){return `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none"><path d="M4 25.5 L16 6 L28 25.5" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/><path d="M10.5 25.5 L16 16.5 L21.5 25.5" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.4"/><rect x="13.4" y="3.4" width="5.2" height="5.2" rx="1.1" transform="rotate(45 16 6)" fill="currentColor"/></svg>`;}
  document.body.innerHTML = `
    <div class="panel d">${mark(28)}<span class="wm">Vertex</span></div>
    <div class="panel l">${mark(28)}<span class="wm">Vertex</span></div>
    <div class="panel ink">${mark(40)}</div>`;
</script>
</body></html>
