console:
  replicaCount: 1
  image:
    repository: ghcr.io/alethialabs-io/console
    pullPolicy: IfNotPresent
    tag: ""
  service:
    type: ClusterIP
    port: 3000
  resources: {}
  env: []

docs:
  replicaCount: 1
  image:
    repository: ghcr.io/alethialabs-io/docs
    pullPolicy: IfNotPresent
    tag: ""
  service:
    type: ClusterIP
    port: 3001
  resources: {}
  env: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: portal.local
      paths:
        - path: /
          pathType: Prefix
          backend:
            serviceName: console
        - path: /docs
          pathType: Prefix
          backend:
            serviceName: docs
  tls: []

secrets:
  # Choose standard kubernetes secret or ExternalSecrets operator
  provider: kubernetes # 'kubernetes' or 'externalSecrets'
  
  # For Kubernetes Secrets
  data:
    ALETHIA_DATABASE_URL: ""
    BETTER_AUTH_SECRET: ""
    CLI_JWT_SECRET: ""
    VINTNER_URL: "http://docs:3001"

  # For ExternalSecrets
  externalSecret:
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    target:
      name: portal-secrets
    data:
      - secretKey: ALETHIA_DATABASE_URL
        remoteRef:
          key: portal/secrets
          property: ALETHIA_DATABASE_URL
      - secretKey: BETTER_AUTH_SECRET
        remoteRef:
          key: portal/secrets
          property: BETTER_AUTH_SECRET
      - secretKey: CLI_JWT_SECRET
        remoteRef:
          key: portal/secrets
          property: CLI_JWT_SECRET

serviceAccount:
  create: true
  annotations: {}
  name: ""
