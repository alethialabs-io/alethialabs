apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "portal.fullname" . }}-vintner
  labels:
    {{- include "portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: vintner
spec:
  replicas: {{ .Values.vintner.replicaCount }}
  selector:
    matchLabels:
      {{- include "portal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vintner
  template:
    metadata:
      labels:
        {{- include "portal.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vintner
    spec:
      serviceAccountName: {{ include "portal.serviceAccountName" . }}
      containers:
        - name: vintner
          image: "{{ .Values.vintner.image.repository }}:{{ .Values.vintner.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.vintner.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "portal.fullname" . }}-secrets
          {{- with .Values.vintner.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.vintner.resources | nindent 12 }}
